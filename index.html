<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cyber Run 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@500;700&display=swap');
        
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background: #050505; color: white; display: flex; flex-direction: column; 
            height: 100vh; width: 100vw; overflow: hidden; touch-action: none;
        }
        
        .screen { display: none; position: absolute; width: 100%; height: 100%; top: 0; left: 0; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a0b2e, #000000); z-index: 10; }
        .active { display: flex; }
        
        h1 { font-family: 'Orbitron', sans-serif; font-size: 45px; color: #ff00ff; text-transform: uppercase; text-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff; margin-bottom: 20px; text-align: center;}
        
        .card { background: rgba(20, 0, 40, 0.7); padding: 30px; border-radius: 15px; border: 2px solid #00ffff; width: 85%; max-width: 400px; box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); backdrop-filter: blur(10px); }

        input, select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; font-family: 'Poppins', sans-serif; text-align: center; outline: none; }
        input, select { background: #fff; color: #000; font-weight: bold; }
        
        .btn-primary { background: linear-gradient(90deg, #ff00ff, #00ffff); color: #000; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn-secondary { background: transparent; border: 2px solid #ff00ff; color: #ff00ff; font-weight: bold; }
        
        /* Game Area */
        #game-screen { background: #000; z-index: 5; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* HUD - Cyberpunk Style */
        #hud { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 20; pointer-events: none; }
        .life-container { width: 45%; background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 10px; padding: 5px; }
        .life-bar { height: 15px; border-radius: 5px; transition: width 0.3s; }
        #p1-life { background: #00ffff; box-shadow: 0 0 10px #00ffff; width: 100%; }
        #p2-life { background: #ff00ff; box-shadow: 0 0 10px #ff00ff; width: 100%; }
        .name-tag { font-family: 'Orbitron'; font-size: 12px; margin-bottom: 5px; text-transform: uppercase; }

        #instruction-banner { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.8); color: #00ffff; padding: 10px 20px; border-radius: 20px; font-family: 'Orbitron'; font-size: 14px; text-align: center; border: 1px solid #00ffff; box-shadow: 0 0 15px #00ffff; z-index: 20; }
        
        /* Popups */
        .popup-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 30px; font-family: 'Orbitron'; text-shadow: 0 0 20px #ff00ff; z-index: 30; opacity: 0; pointer-events: none; }
        .anim-pop { animation: popFade 2s forwards; }
        
        @keyframes popFade { 0% { opacity: 1; transform: translate(-50%, -30%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -80%) scale(1.5); } }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1>Neon Run</h1>
        <div class="card">
            <input type="text" id="playerName" placeholder="Enter Your Name" required>
            <select id="playerGender">
                <option value="boy">I am the Boy</option>
                <option value="girl">I am the Girl</option>
            </select>
            <button id="btnCreateGame" class="btn-primary">Host Game</button>
            <p style="text-align: center; color: #00ffff; margin: 10px 0;">OR</p>
            <input type="text" id="joinCode" placeholder="Enter Room Code" style="text-transform: uppercase;">
            <button id="btnJoinGame" class="btn-secondary">Join Game</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <h2 style="color: #00ffff; font-family: 'Orbitron';">Waiting for Partner...</h2>
        <div class="card" style="text-align: center;">
            <p style="color: #fff;">Room Code:</p>
            <h1 id="displayCode" style="font-size: 50px; color: #ff00ff;">XXXXX</h1>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="hud">
            <div class="life-container">
                <div class="name-tag" id="name1" style="color:#00ffff;">Player 1</div>
                <div class="life-bar" id="p1-life"></div>
            </div>
            <div class="life-container" style="text-align: right;">
                <div class="name-tag" id="name2" style="color:#ff00ff;">Player 2</div>
                <div class="life-bar" id="p2-life" style="float: right;"></div>
            </div>
        </div>
        <div id="instruction-banner">Swipe L/R/Up. Double Tap to Share Life!</div>
        <div id="alertPopup" class="popup-msg">+20 LIFE SHARED 💖</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZmqyLmyWesuoj6djTbyfrOJ1v7_FCWcQ",
            authDomain: "game-bf78a.firebaseapp.com",
            projectId: "game-bf78a",
            storageBucket: "game-bf78a.firebasestorage.app",
            messagingSenderId: "860717231489",
            appId: "1:860717231489:web:f53331a96570be04cacc80"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- SOUND ENGINE (Web Audio API - Realistic sounds without files) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if(type === 'jump') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if(type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.8, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if(type === 'heal') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // --- IMAGE ASSETS (Replace these with your GitHub raw links later) ---
        const imgBg = new Image(); imgBg.src = 'https://images.unsplash.com/photo-1614850715649-1d0106293bd1?q=80&w=1000&auto=format&fit=crop'; // Cyberpunk bg
        const imgBoy = new Image(); imgBoy.src = 'https://cdn-icons-png.flaticon.com/512/4140/4140037.png'; // Boy Sprite 
        const imgGirl = new Image(); imgGirl.src = 'https://cdn-icons-png.flaticon.com/512/4140/4140047.png'; // Girl Sprite
        const imgObs = new Image(); imgObs.src = 'https://cdn-icons-png.flaticon.com/512/3255/3255283.png'; // Police Car / Barricade

        // --- GAME VARIABLES ---
        let gameId = "", playerNum = 0, gameDocRef = null;
        let animationFrameId, roadOffset = 0;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const horizonY = canvas.height * 0.4;
        
        let gameState = { 
            status: 'waiting', phase: 'finding', p1Name: "", p1Gender: "", p2Name: "", p2Gender: "",
            p1Lane: 0, p2Lane: 2, p1Jump: false, p2Jump: false,
            p1Life: 100, p2Life: 100, speedMult: 1, obstacle: null
        };

        // --- SWIPE & DOUBLE TAP CONTROLS ---
        let touchStartX = 0, touchStartY = 0, lastTap = 0;
        
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY;
            
            // Double Tap Logic for Life Sharing
            let currentTime = new Date().getTime();
            let tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0 && gameState.status === 'playing') {
                shareLife();
            }
            lastTap = currentTime;
        });

        document.addEventListener('touchend', async e => {
            if(gameState.status !== 'playing') return;
            let dx = e.changedTouches[0].screenX - touchStartX;
            let dy = e.changedTouches[0].screenY - touchStartY;
            let myLaneKey = playerNum === 1 ? 'p1Lane' : 'p2Lane';
            let myJumpKey = playerNum === 1 ? 'p1Jump' : 'p2Jump';

            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
                if (dx > 0 && gameState[myLaneKey] < 2) await updateDoc(gameDocRef, { [myLaneKey]: gameState[myLaneKey] + 1 });
                else if (dx < 0 && gameState[myLaneKey] > 0) await updateDoc(gameDocRef, { [myLaneKey]: gameState[myLaneKey] - 1 });
            } else if (Math.abs(dy) > Math.abs(dx) && dy < -40) {
                if(!gameState[myJumpKey]) {
                    playSound('jump');
                    await updateDoc(gameDocRef, { [myJumpKey]: true });
                    setTimeout(async () => await updateDoc(gameDocRef, { [myJumpKey]: false }), 800);
                }
            }
        });

        async function shareLife() {
            let myLifeKey = playerNum === 1 ? 'p1Life' : 'p2Life';
            let partnerLifeKey = playerNum === 1 ? 'p2Life' : 'p1Life';
            
            if(gameState[myLifeKey] > 30) {
                playSound('heal');
                await updateDoc(gameDocRef, {
                    [myLifeKey]: gameState[myLifeKey] - 20,
                    [partnerLifeKey]: Math.min(100, gameState[partnerLifeKey] + 20)
                });
                
                // Show Animation
                let popup = document.getElementById('alertPopup');
                popup.classList.remove('anim-pop');
                void popup.offsetWidth; // trigger reflow
                popup.classList.add('anim-pop');
            }
        }

        // --- UI LOGIC ---
        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('btnCreateGame').addEventListener('click', async () => {
            const name = document.getElementById('playerName').value.trim();
            if(!name) return; playerNum = 1;
            gameId = Math.random().toString(36).substring(2, 7).toUpperCase();
            gameDocRef = doc(db, "games", gameId);
            await setDoc(gameDocRef, { ...gameState, p1Name: name, p1Gender: document.getElementById('playerGender').value, status: 'waiting' });
            document.getElementById('displayCode').innerText = gameId;
            switchScreen('lobby-screen'); setupListeners();
            if(audioCtx.state === 'suspended') audioCtx.resume();
        });

        document.getElementById('btnJoinGame').addEventListener('click', async () => {
            const name = document.getElementById('playerName').value.trim();
            gameId = document.getElementById('joinCode').value.trim().toUpperCase();
            if(!name || gameId.length !== 5) return; playerNum = 2;
            gameDocRef = doc(db, "games", gameId);
            const snap = await getDoc(gameDocRef);
            if(snap.exists()) {
                await updateDoc(gameDocRef, { p2Name: name, p2Gender: document.getElementById('playerGender').value, status: 'playing' });
                setupListeners();
            }
            if(audioCtx.state === 'suspended') audioCtx.resume();
        });

        // --- SYNC ENGINE ---
        function setupListeners() {
            onSnapshot(gameDocRef, (docSnap) => {
                if(!docSnap.exists()) return;
                gameState = docSnap.data();

                if(gameState.status === 'playing' && !document.getElementById('game-screen').classList.contains('active')) {
                    switchScreen('game-screen');
                    document.getElementById('name1').innerText = gameState.p1Name;
                    document.getElementById('name2').innerText = gameState.p2Name;
                    startGameLoop();
                    if(playerNum === 1) hostEngine();
                }

                if(gameState.status === 'playing') {
                    // Update HUD
                    document.getElementById('p1-life').style.width = gameState.p1Life + "%";
                    document.getElementById('p2-life').style.width = gameState.p2Life + "%";
                    
                    if(gameState.phase === 'finding') document.getElementById('instruction-banner').innerText = "Navigate to Center (Lane 2) to Meet!";
                    else document.getElementById('instruction-banner').innerText = `Speed: ${gameState.speedMult.toFixed(1)}x | Double Tap to Share Life`;

                    // Game Over
                    if(gameState.p1Life <= 0 || gameState.p2Life <= 0) {
                        alert("Game Over! True Love Survives, but the Run ends here.");
                        window.location.reload();
                    }
                }
            });
        }

        // --- HOST LOGIC (Obstacles & Phases) ---
        function hostEngine() {
            setInterval(async () => {
                if(gameState.status !== 'playing') return;

                if(gameState.phase === 'finding' && gameState.p1Lane === 1 && gameState.p2Lane === 1) {
                    await updateDoc(gameDocRef, { phase: 'together' });
                } 
                else if(gameState.phase === 'together') {
                    if(gameState.p1Lane !== gameState.p2Lane) await updateDoc(gameDocRef, { p2Lane: gameState.p1Lane }); // Keep them together

                    if(!gameState.obstacle) {
                        await updateDoc(gameDocRef, { obstacle: { lane: Math.floor(Math.random() * 3), id: Date.now() } });
                    }
                    await updateDoc(gameDocRef, { speedMult: gameState.speedMult + 0.05 });
                }
            }, 1500);
        }

        // --- RENDERER (Pseudo-3D Cyberpunk & Sprite Animator) ---
        function project3D(x, y, z) {
            let scale = 300 / (300 + z);
            return { x: (x * scale) + (canvas.width / 2), y: (y * scale) + horizonY, scale: scale };
        }

        let localObsZ = 1500;
        let frameTick = 0, frameIndex = 0;

        function drawSprite(img, x, y, size) {
            // Basic sprite animation logic (Assuming a 4-frame sheet for running)
            frameTick++;
            if(frameTick > 10 / gameState.speedMult) { frameIndex = (frameIndex + 1) % 4; frameTick = 0; }
            
            // If the image is a sprite sheet, this crops it. If it's a single image, it just stretches it.
            // When you add your real sprite sheet, adjust the 'img.width / 4' part based on your columns.
            try {
                let fw = img.width / 4; 
                ctx.drawImage(img, frameIndex * fw, 0, fw, img.height, x - size/2, y - size, size, size);
            } catch(e) {
                // Fallback if image isn't loaded properly yet
                ctx.fillStyle = "pink"; ctx.fillRect(x - size/2, y - size, size, size);
            }
        }

        function startGameLoop() {
            function render() {
                if(gameState.status !== 'playing') return;
                
                // 1. Draw Cyberpunk Background & Floor
                ctx.drawImage(imgBg, 0, 0, canvas.width, horizonY); // Cityscape
                
                // Floor Gradient
                let grad = ctx.createLinearGradient(0, horizonY, 0, canvas.height);
                grad.addColorStop(0, "#110022"); grad.addColorStop(1, "#ff00ff");
                ctx.fillStyle = grad; ctx.fillRect(0, horizonY, canvas.width, canvas.height);

                let currentSpeed = 6 * gameState.speedMult;
                roadOffset = (roadOffset + currentSpeed) % 100;

                // 2. Draw Moving Neon Lanes
                ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 3; ctx.shadowBlur = 10; ctx.shadowColor = "#00ffff";
                for(let z = 1500; z > 0; z -= 100) {
                    let actualZ = z - roadOffset;
                    let pLeft = project3D(-250, 100, actualZ);
                    let pRight = project3D(250, 100, actualZ);
                    ctx.beginPath(); ctx.moveTo(pLeft.x, pLeft.y); ctx.lineTo(pRight.x, pRight.y); ctx.stroke();
                }
                ctx.shadowBlur = 0;

                // 3. Render Obstacle & Collision
                if(gameState.obstacle && gameState.phase === 'together') {
                    localObsZ -= (currentSpeed * 3);
                    let laneX = (gameState.obstacle.lane - 1) * 200;
                    let obsPos = project3D(laneX, 50, localObsZ);
                    
                    if(localObsZ > 50) {
                        let size = 150 * obsPos.scale;
                        ctx.drawImage(imgObs, obsPos.x - size/2, obsPos.y - size, size, size);
                    } else if (localObsZ > -50) {
                        // Collision Check!
                        let isHit = (gameState.p1Lane === gameState.obstacle.lane) && (!gameState.p1Jump && !gameState.p2Jump);
                        if(isHit && playerNum === 1) { // Host handles damage to avoid double hit
                            playSound('hit');
                            updateDoc(gameDocRef, { p1Life: gameState.p1Life - 15, p2Life: gameState.p2Life - 15, obstacle: null });
                            localObsZ = 1500;
                        }
                    } else {
                        localObsZ = 1500;
                        if(playerNum === 1) updateDoc(gameDocRef, { obstacle: null });
                    }
                }

                // 4. Render Players
                let p1X = (gameState.p1Lane - 1) * 200;
                let p2X = (gameState.p2Lane - 1) * 200;
                let p1Pos = project3D(p1X, gameState.p1Jump ? -150 : 50, 150);
                let p2Pos = project3D(p2X, gameState.p2Jump ? -150 : 50, 150);
                let p1Size = 140 * p1Pos.scale;
                let p2Size = 140 * p2Pos.scale;

                // Draw Link if together
                if(gameState.phase === 'together') {
                    ctx.strokeStyle = "#fff"; ctx.lineWidth = 4; ctx.shadowBlur = 15; ctx.shadowColor = "#ff00ff";
                    ctx.beginPath(); ctx.moveTo(p1Pos.x, p1Pos.y - p1Size/2); ctx.lineTo(p2Pos.x, p2Pos.y - p2Size/2); ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                // Draw Sprites
                drawSprite(gameState.p1Gender === 'boy' ? imgBoy : imgGirl, p1Pos.x, p1Pos.y, p1Size);
                drawSprite(gameState.p2Gender === 'boy' ? imgBoy : imgGirl, p2Pos.x, p2Pos.y, p2Size);

                animationFrameId = requestAnimationFrame(render);
            }
            render();
        }
    </script>
</body>
</html>
