<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Find You - Premium Edition 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Orbitron:wght@700;900&family=Poppins:wght@400;600&display=swap');
        
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: #000; color: white; display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; touch-action: none; }
        
        /* Premium UI Glassmorphism */
        .screen { display: none; position: absolute; width: 100%; height: 100%; top: 0; left: 0; flex-direction: column; align-items: center; justify-content: center; z-index: 10; background: radial-gradient(circle at center, rgba(20,20,30,0.9) 0%, rgba(5,5,5,1) 100%); backdrop-filter: blur(10px); }
        .active { display: flex; }
        
        h1.title { font-family: 'Cinzel', serif; font-size: 45px; color: #ff0844; text-transform: uppercase; text-shadow: 0 0 25px rgba(255,8,68,0.8); margin-bottom: 30px; letter-spacing: 2px; text-align: center; }
        
        .card { background: rgba(255, 255, 255, 0.05); padding: 35px; border-radius: 20px; border: 1px solid rgba(255, 8, 68, 0.3); width: 90%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,8,68,0.1); backdrop-filter: blur(15px); text-align: center; }

        input, select, button { width: 100%; padding: 16px; margin: 12px 0; border-radius: 12px; border: none; font-size: 16px; font-family: 'Poppins', sans-serif; text-align: center; outline: none; font-weight: 600; transition: all 0.3s ease; }
        input, select { background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        input:focus { border-color: #00f2fe; box-shadow: 0 0 15px rgba(0,242,254,0.3); }
        
        .btn-primary { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); color: #fff; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; box-shadow: 0 10px 20px rgba(255,8,68,0.4); }
        .btn-primary:active { transform: translateY(2px); box-shadow: 0 5px 10px rgba(255,8,68,0.4); }
        .btn-join { background: transparent; border: 2px solid #00f2fe; color: #00f2fe; box-shadow: 0 10px 20px rgba(0,242,254,0.1); }
        
        /* Game HUD */
        #game-screen { background: #000; z-index: 5; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        
        #hud { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 20; pointer-events: none; }
        .life-container { width: 38%; background: rgba(0,0,0,0.7); border: 2px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 6px; backdrop-filter: blur(5px); }
        .life-bar { height: 14px; border-radius: 6px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #p1-life { background: linear-gradient(90deg, #00c6ff, #0072ff); box-shadow: 0 0 15px rgba(0,198,255,0.6); width: 100%; }
        #p2-life { background: linear-gradient(90deg, #ff0844, #ffb199); box-shadow: 0 0 15px rgba(255,8,68,0.6); width: 100%; }
        .name-tag { font-family: 'Orbitron'; font-size: 13px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }

        /* Progress & Navigation */
        #progress-wrapper { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); width: 70%; z-index: 20; text-align: center; }
        #progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; box-shadow: inset 0 0 5px rgba(0,0,0,0.8); }
        #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00f2fe, #4facfe); border-radius: 10px; transition: width 0.5s linear; box-shadow: 0 0 15px #00f2fe; }
        #distance-text { font-family: 'Orbitron'; font-size: 12px; color: #aaa; margin-top: 8px; letter-spacing: 1px; }
        
        #compass { display: none; margin-top: 15px; padding: 10px 20px; background: rgba(0,0,0,0.8); border: 1px solid #00f2fe; border-radius: 20px; color: #00f2fe; font-family: 'Poppins'; font-size: 14px; font-weight: 600; box-shadow: 0 0 20px rgba(0,242,254,0.3); animation: pulse-border 2s infinite; }

        @keyframes pulse-border { 0% { box-shadow: 0 0 10px rgba(0,242,254,0.3); } 50% { box-shadow: 0 0 25px rgba(0,242,254,0.8); } 100% { box-shadow: 0 0 10px rgba(0,242,254,0.3); } }

        #controls-hint { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 12px 25px; border-radius: 25px; font-size: 13px; border: 1px solid rgba(255,255,255,0.2); z-index: 20; text-align: center; width: 85%; max-width: 350px; }
        .highlight { color: #00f2fe; font-weight: bold; }

        /* Cinematic Overlays */
        #level-overlay, #game-over-screen, #cinematic-screen { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; backdrop-filter: blur(10px); }
        
        #level-title { font-family: 'Cinzel'; font-size: 50px; color: #ff0844; text-shadow: 0 0 30px rgba(255,8,68,0.8); margin-bottom: 20px; letter-spacing: 4px; }
        #level-msg { font-size: 18px; color: #ddd; max-width: 80%; line-height: 1.6; }

        /* True Love Cinematic */
        .heart-particle { position: absolute; color: #ff0844; font-size: 24px; animation: explode 4s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; opacity: 0; text-shadow: 0 0 20px #ff0844; }
        
        @keyframes explode {
            0% { transform: scale(0.1) translate(0, 0) rotate(0deg); opacity: 1; }
            50% { opacity: 1; }
            100% { transform: scale(3) translate(var(--tx), var(--ty)) rotate(var(--rot)); opacity: 0; }
        }

        .true-love-text { font-family: 'Cinzel', serif; font-size: 50px; color: #fff; text-shadow: 0 0 20px #ff0844, 0 0 40px #ff0844, 0 0 60px #ff0844; z-index: 10; animation: heartBeat 1.5s infinite; text-align: center; line-height: 1.2; }
        .partner-names { font-family: 'Orbitron'; font-size: 28px; color: #00f2fe; margin-top: 30px; z-index: 10; text-shadow: 0 0 15px rgba(0,242,254,0.8); letter-spacing: 2px; }
        
        @keyframes heartBeat { 0% { transform: scale(1); } 14% { transform: scale(1.05); } 28% { transform: scale(1); } 42% { transform: scale(1.05); } 70% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1 class="title">Find You<br><span style="font-size: 20px; color: #00f2fe; font-family: 'Orbitron';">The Journey</span></h1>
        <div class="card">
            <input type="text" id="playerName" placeholder="Enter Your Name" required>
            <select id="playerGender">
                <option value="boy">I am the Boy</option>
                <option value="girl">I am the Girl</option>
            </select>
            <button id="btnCreateGame" class="btn-primary">Host Journey</button>
            <div style="margin: 20px 0; color: #666; font-size: 14px;">OR JOIN PARTNER</div>
            <input type="text" id="joinCode" placeholder="Enter 5-Letter Code">
            <button id="btnJoinGame" class="btn-join">Join Game</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <h2 style="color: #fff; font-family: 'Orbitron'; letter-spacing: 2px;">WAITING FOR DESTINY</h2>
        <div class="card" style="margin-top: 30px;">
            <p style="color: #aaa; margin: 0; font-size: 14px;">Share this code with your partner</p>
            <h1 id="displayCode" style="font-size: 55px; color: #00f2fe; margin: 15px 0; text-shadow: 0 0 20px rgba(0,242,254,0.5);">XXXXX</h1>
            <button id="btnShare" class="btn-primary" style="background: linear-gradient(135deg, #1D976C, #93F9B9); color: #000; font-weight: 900;">📱 WhatsApp Invite</button>
        </div>
    </div>

    <div id="level-overlay">
        <div id="level-title">LEVEL 1</div>
        <div id="level-msg"></div>
    </div>

    <div id="cinematic-screen">
        <div id="heart-container" style="position: absolute; width: 100%; height: 100%; top:0; left:0; z-index: 1;"></div>
        <div class="true-love-text">TRUE LOVE<br>NEVER ENDS</div>
        <div class="partner-names" id="final-names"></div>
    </div>

    <div id="game-over-screen">
        <h1 style="color: #ff0844; font-family: 'Cinzel'; font-size: 40px;">HEARTBROKEN</h1>
        <p style="color: #ccc; margin: 20px 0;">Distance and obstacles faded your love.</p>
        <button id="btnRestart" class="btn-primary" style="width: 250px;">Restart Journey</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="hud">
            <div class="life-container">
                <div class="name-tag" id="name1" style="color:#00f2fe;">P1</div>
                <div class="life-bar" id="p1-life"></div>
            </div>
            <div class="life-container" style="text-align: right;">
                <div class="name-tag" id="name2" style="color:#ff0844;">P2</div>
                <div class="life-bar" id="p2-life" style="float: right;"></div>
            </div>
        </div>
        
        <div id="progress-wrapper">
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <div id="distance-text">Distance to Partner: <span id="dist-val" style="color:#fff;">100%</span></div>
            <div id="compass"></div>
        </div>
        
        <div id="controls-hint">Swipe <span class="highlight">L/R</span> to Turn. Swipe <span class="highlight">UP</span> to Jump.<br><span style="color:#ffb199; font-weight: bold; font-size: 11px; display: block; margin-top: 5px;">Double Tap to transfer 20% Health!</span></div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // IMPORTANT: Replace with your actual Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCZmqyLmyWesuoj6djTbyfrOJ1v7_FCWcQ",
            authDomain: "game-bf78a.firebaseapp.com",
            projectId: "game-bf78a"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- AUDIO ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        
        function playSFX(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if(type === 'jump') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'hit') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.8, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'heal') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        // --- GAME ASSETS & SETUP ---
        const canvas = document.getElementById('gameCanvas'); 
        const ctx = canvas.getContext('2d');
        let width, height, horizon;

        function resize() { 
            width = canvas.width = window.innerWidth; 
            height = canvas.height = window.innerHeight; 
            horizon = height * 0.55; 
        }
        window.addEventListener('resize', resize); resize();

        let gameId = "", playerNum = 0, gameDocRef = null, isCinematic = false;
        
        let gameState = { 
            status: 'waiting', level: 1, progress: 0, 
            p1Name: "", p1Gender: "", p2Name: "", p2Gender: "",
            p1Lane: 0, p2Lane: 2, p1Jump: false, p2Jump: false, 
            p1Life: 100, p2Life: 100, items: [] 
        };

        const stageData = {
            1: { name: "THE SEPARATION", colors: ["#2a2a35", "#111"], road: "#333", line: "#fff", msg: "You are separated. Survive the traffic and follow the compass to find your partner." },
            2: { name: "THE DARK FOREST", colors: ["#0b160b", "#050a05"], road: "#2d1a11", line: "#5c4033", msg: "Congrats, you are able to next stage of love! Watch out for the obstacles hidden in the soil." },
            3: { name: "BURNING DESERT", colors: ["#ff7e5f", "#feb47b"], road: "#e0c38c", line: "#c2b280", msg: "The heat drains health. Grab health kits and keep moving!" },
            4: { name: "NEON NIGHTS", colors: ["#0f0c29", "#302b63"], road: "#000", line: "#00f2fe", msg: "Monsters and Police block the way. Coordinate your dodges!" },
            5: { name: "THE FINAL RUN", colors: ["#20002c", "#cbb4d4"], road: "#1a001a", line: "#ff0844", msg: "This is it. True love requires sacrifice. Meet in the center!" }
        };

        // --- INPUT HANDLING ---
        let touchX = 0, touchY = 0, lastTap = 0;
        document.addEventListener('touchstart', e => {
            touchX = e.touches[0].clientX; touchY = e.touches[0].clientY;
            let now = Date.now();
            if (now - lastTap < 300 && gameState.status === 'playing') {
                let myLife = playerNum === 1 ? 'p1Life' : 'p2Life';
                let ptLife = playerNum === 1 ? 'p2Life' : 'p1Life';
                if(gameState[myLife] > 20 && gameState[ptLife] < 100) {
                    playSFX('heal');
                    updateDoc(gameDocRef, { [myLife]: gameState[myLife] - 20, [ptLife]: Math.min(100, gameState[ptLife] + 20) });
                }
            }
            lastTap = now;
        });

        document.addEventListener('touchend', async e => {
            if(gameState.status !== 'playing' || isCinematic) return;
            let dx = e.changedTouches[0].clientX - touchX; 
            let dy = e.changedTouches[0].clientY - touchY;
            let myLaneKey = playerNum === 1 ? 'p1Lane' : 'p2Lane'; 
            let myJumpKey = playerNum === 1 ? 'p1Jump' : 'p2Jump';

            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
                let newLane = gameState[myLaneKey] + (dx > 0 ? 1 : -1);
                if (newLane >= -2 && newLane <= 2) await updateDoc(gameDocRef, { [myLaneKey]: newLane });
            } else if (dy < -50 && !gameState[myJumpKey]) {
                playSFX('jump');
                await updateDoc(gameDocRef, { [myJumpKey]: true });
                setTimeout(() => updateDoc(gameDocRef, { [myJumpKey]: false }), 700);
            }
        });

        // --- BUTTON LOGIC ---
        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('btnCreateGame').addEventListener('click', async () => {
            const name = document.getElementById('playerName').value.trim(); if(!name) return;
            playerNum = 1; gameId = Math.random().toString(36).substring(2, 7).toUpperCase();
            gameDocRef = doc(db, "games", gameId);
            await setDoc(gameDocRef, { ...gameState, p1Name: name, p1Gender: document.getElementById('playerGender').value });
            document.getElementById('displayCode').innerText = gameId; 
            switchScreen('lobby-screen'); setupSync();
        });

        document.getElementById('btnJoinGame').addEventListener('click', async () => {
            const name = document.getElementById('playerName').value.trim();
            gameId = document.getElementById('joinCode').value.trim().toUpperCase();
            if(!name || gameId.length !== 5) return alert("Enter valid Name and 5-letter Room Code.");
            playerNum = 2; gameDocRef = doc(db, "games", gameId);
            const snap = await getDoc(gameDocRef);
            if(snap.exists()) {
                await updateDoc(gameDocRef, { p2Name: name, p2Gender: document.getElementById('playerGender').value, status: 'playing' });
                setupSync();
            } else alert("Room not found!");
        });

        // WHATSAPP JOIN LINK GENERATOR
        document.getElementById('btnShare').addEventListener('click', () => {
            const currentUrl = window.location.href.split('?')[0];
            const text = `Hey! I am waiting for you in Find You & Run. Join using Room Code: *${gameId}* \nLink: ${currentUrl}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
        });

        document.getElementById('btnRestart').addEventListener('click', async () => {
            if(playerNum === 1) await updateDoc(gameDocRef, { level: 1, progress: 0, p1Life: 100, p2Life: 100, status: 'playing', items: [], p1Lane: 0, p2Lane: 2 });
            else alert("Waiting for Host to restart...");
        });

        // --- GAME SYNC ENGINE ---
        function setupSync() {
            onSnapshot(gameDocRef, (docSnap) => {
                if(!docSnap.exists()) return;
                let oldLevel = gameState.level;
                gameState = docSnap.data();

                if(gameState.status === 'playing' && !document.getElementById('game-screen').classList.contains('active')) {
                    switchScreen('game-screen');
                    document.getElementById('name1').innerText = gameState.p1Name; 
                    document.getElementById('name2').innerText = gameState.p2Name;
                    if(playerNum === 1) startHostEngine(); 
                    startGameLoop();
                }

                if(gameState.status === 'playing') {
                    // Update UI
                    document.getElementById('p1-life').style.width = Math.max(0, gameState.p1Life) + "%";
                    document.getElementById('p2-life').style.width = Math.max(0, gameState.p2Life) + "%";
                    document.getElementById('progress-fill').style.width = gameState.progress + "%";
                    document.getElementById('dist-val').innerText = (100 - gameState.progress) + "m";

                    // Compass System
                    let myLane = playerNum === 1 ? gameState.p1Lane : gameState.p2Lane;
                    let ptLane = playerNum === 1 ? gameState.p2Lane : gameState.p1Lane;
                    let compass = document.getElementById('compass');
                    
                    if(gameState.progress < 90) {
                        compass.style.display = 'inline-block';
                        if(myLane < ptLane) compass.innerHTML = `Partner is to your <span style="color:#fff">RIGHT 👉</span>`;
                        else if(myLane > ptLane) compass.innerHTML = `👈 Partner is to your <span style="color:#fff">LEFT</span>`;
                        else compass.innerHTML = `✨ You are aligned! Run! ✨`;
                    } else compass.style.display = 'none';

                    // Level Transitions
                    if(gameState.level > oldLevel) {
                        if(gameState.level > 5) triggerCinematicEnding();
                        else showLevelOverlay(gameState.level);
                    }

                    // Game Over
                    if(gameState.p1Life <= 0 || gameState.p2Life <= 0) switchScreen('game-over-screen');
                }
            });
        }

        // --- CINEMATIC EVENTS ---
        function showLevelOverlay(lvl) {
            isCinematic = true;
            document.getElementById('level-title').innerText = "LEVEL " + lvl;
            document.getElementById('level-msg').innerText = stageData[lvl].msg;
            document.getElementById('level-overlay').style.display = 'flex';
            setTimeout(() => { document.getElementById('level-overlay').style.display = 'none'; isCinematic = false; }, 3500);
        }

        function triggerCinematicEnding() {
            isCinematic = true;
            document.getElementById('final-names').innerText = `${gameState.p1Name} 💖 ${gameState.p2Name}`;
            let container = document.getElementById('heart-container'); container.innerHTML = '';
            
            for(let i=0; i<40; i++) {
                let h = document.createElement('div'); h.className = 'heart-particle'; h.innerHTML = '💖';
                h.style.left = '50%'; h.style.top = '50%';
                h.style.setProperty('--tx', (Math.random()*600 - 300) + 'px');
                h.style.setProperty('--ty', (Math.random()*600 - 300) + 'px');
                h.style.setProperty('--rot', (Math.random()*360) + 'deg');
                h.style.animationDelay = (Math.random() * 1.5) + 's';
                container.appendChild(h);
            }
            switchScreen('cinematic-screen');
        }

        // --- HOST LOGIC (SPAWNER) ---
        function startHostEngine() {
            setInterval(async () => {
                if(gameState.status !== 'playing' || isCinematic || gameState.p1Life <=0 || gameState.p2Life <=0) return;
                
                let speedFactor = 1 + (gameState.level * 0.2);
                let newProg = gameState.progress + (1.5 * speedFactor);

                if(newProg >= 100) {
                    await updateDoc(gameDocRef, { level: gameState.level + 1, progress: 0, items: [] });
                } else {
                    // Move existing items
                    let newItems = gameState.items.filter(i => i.z > -200).map(i => ({...i, z: i.z - (400 * speedFactor)}));
                    
                    // Spawn new items (Obstacles & Health)
                    if(Math.random() > 0.5 && newItems.length < 3) {
                        let type = Math.random() > 0.8 ? 'health' : (Math.random() > 0.5 ? 'police' : 'monster');
                        let lane = Math.floor(Math.random() * 5) - 2; // -2, -1, 0, 1, 2
                        newItems.push({ id: Date.now(), type, lane, z: 4000 });
                    }
                    await updateDoc(gameDocRef, { progress: newProg, items: newItems });
                }
            }, 500);
        }

        // --- ADVANCED 2.5D RENDERER ---
        let tick = 0, roadOffset = 0;

        function project(x, y, z, curveOffset) {
            let scale = 600 / (600 + z);
            let cx = x + (curveOffset * Math.pow(z/1000, 2)); // Dynamic road curving
            return { x: (cx * scale) + (width / 2), y: (y * scale) + horizon, s: scale };
        }

        // PLACEHOLDER DRAWING (Since external URLs fail without a server)
        function drawEntity(ctx, type, px, py, scale, isJump) {
            let size = 200 * scale;
            let bob = isJump ? -150 * scale : Math.sin(tick * 0.4) * 10 * scale;
            
            // Shadow
            ctx.fillStyle = "rgba(0,0,0,0.4)";
            ctx.beginPath(); ctx.ellipse(px, py + size/2, size*0.3, size*0.1, 0, 0, Math.PI*2); ctx.fill();

            // Entity Box (Replace these with drawImage if you host your assets)
            ctx.save(); ctx.translate(px, py + bob);
            
            if(type === 'boy' || type === 'girl') {
                ctx.fillStyle = type === 'boy' ? '#00f2fe' : '#ff0844';
                ctx.fillRect(-size/4, -size/2, size/2, size);
                ctx.fillStyle = "#fff"; ctx.font = `${size/3}px Arial`; ctx.fillText(type==='boy'?"👦":"👧", -size/6, -size/8);
            } else if (type === 'health') {
                ctx.fillStyle = '#00ff00'; ctx.fillRect(-size/4, -size/4, size/2, size/2);
                ctx.fillStyle = "#fff"; ctx.fillRect(-size/12, -size/5, size/6, size/2.5); ctx.fillRect(-size/5, -size/12, size/2.5, size/6);
            } else {
                ctx.fillStyle = type === 'police' ? '#0000ff' : '#555';
                ctx.fillRect(-size/3, -size/3, size/1.5, size/1.5);
                ctx.fillStyle = "#fff"; ctx.font = `${size/2}px Arial`; ctx.fillText(type==='police'?"🚓":"🧟", -size/4, size/8);
            }
            ctx.restore();
        }

        function startGameLoop() {
            if(gameState.level === 1) showLevelOverlay(1);

            function render() {
                if(gameState.status !== 'playing') return;
                requestAnimationFrame(render);
                if(isCinematic) return;

                tick++;
                let stage = stageData[gameState.level] || stageData[5];
                let speed = 20 + (gameState.level * 5);
                roadOffset = (roadOffset + speed) % 300;
                let curve = Math.sin(tick * 0.02) * 500; // Road bends

                // Draw Sky Background
                let bgGrad = ctx.createLinearGradient(0, 0, 0, horizon);
                bgGrad.addColorStop(0, stage.colors[0]); bgGrad.addColorStop(1, stage.colors[1]);
                ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, width, horizon);
                
                // Draw Ground
                ctx.fillStyle = stage.road; ctx.fillRect(0, horizon, width, height - horizon);

                // Draw Road Polygons (Pseudo 3D depth)
                for(let z = 4000; z > 0; z -= 300) {
                    let actualZ = z - roadOffset;
                    if(actualZ < 10) continue;
                    
                    let tl = project(-800, 0, actualZ, curve); let tr = project(800, 0, actualZ, curve);
                    let bl = project(-800, 0, actualZ - 300, curve); let br = project(800, 0, actualZ - 300, curve);
                    
                    // Road surface
                    ctx.fillStyle = (Math.floor(z/300) % 2 === 0) ? "rgba(0,0,0,0.2)" : "rgba(0,0,0,0.1)";
                    ctx.beginPath(); ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y); ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y); ctx.fill();

                    // Lane lines
                    ctx.strokeStyle = stage.line; ctx.lineWidth = 3 * tl.s;
                    for(let l = -2; l <= 2; l++) {
                        let pt1 = project(l*320, 0, actualZ, curve); let pt2 = project(l*320, 0, actualZ - 150, curve);
                        ctx.beginPath(); ctx.moveTo(pt1.x, pt1.y); ctx.lineTo(pt2.x, pt2.y); ctx.stroke();
                    }
                }

                // Render Items & Detect Collision
                let myLane = playerNum === 1 ? gameState.p1Lane : gameState.p2Lane;
                let myJump = playerNum === 1 ? gameState.p1Jump : gameState.p2Jump;

                // Sort items by Z index so closer items draw on top
                gameState.items.slice().sort((a,b) => b.z - a.z).forEach(item => {
                    if(item.z < 0) return;
                    let p = project(item.lane * 320, 0, item.z, curve);
                    drawEntity(ctx, item.type, p.x, p.y, p.s, false);

                    // Collision checking (Host only handles damage to avoid double-triggers)
                    if(playerNum === 1 && item.z < 200 && item.z > 0 && myLane === item.lane && !myJump) {
                        if(item.type === 'health') {
                            playSFX('heal'); updateDoc(gameDocRef, { p1Life: Math.min(100, gameState.p1Life+20), p2Life: Math.min(100, gameState.p2Life+20) });
                        } else {
                            playSFX('hit'); updateDoc(gameDocRef, { p1Life: gameState.p1Life-15, p2Life: gameState.p2Life-15 });
                        }
                        item.z = -1000; // Remove item
                    }
                });

                // Render Players
                let p1 = project(gameState.p1Lane * 320, 0, 150, curve);
                let p2 = project(gameState.p2Lane * 320, 0, 150, curve);

                // Show partner only if close to end (90%+) or if they are in the same lane (simulating distance)
                let showP1 = playerNum === 1 || gameState.progress > 90 || gameState.p1Lane === gameState.p2Lane;
                let showP2 = playerNum === 2 || gameState.progress > 90 || gameState.p1Lane === gameState.p2Lane;

                if(showP1) drawEntity(ctx, gameState.p1Gender, p1.x, p1.y, p1.s, gameState.p1Jump);
                if(showP2) drawEntity(ctx, gameState.p2Gender, p2.x, p2.y, p2.s, gameState.p2Jump);
            }
            render();
        }
    </script>
</body>
