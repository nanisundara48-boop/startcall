<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Journey to You 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@500;700&display=swap');
        
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: #000; color: white; display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; touch-action: none; }
        
        .screen { display: none; position: absolute; width: 100%; height: 100%; top: 0; left: 0; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a2e, #000); z-index: 10; }
        .active { display: flex; }
        
        h1 { font-family: 'Orbitron', sans-serif; font-size: 35px; color: #00f2fe; text-transform: uppercase; text-shadow: 0 0 15px #00f2fe; text-align: center; margin-bottom: 20px;}
        
        .card { background: rgba(10, 10, 20, 0.9); padding: 30px; border-radius: 20px; border: 2px solid #00f2fe; width: 90%; max-width: 400px; box-shadow: 0 0 25px rgba(0, 242, 254, 0.4); text-align: center; backdrop-filter: blur(10px);}

        input, select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-size: 16px; font-family: 'Poppins', sans-serif; text-align: center; outline: none; font-weight: bold; transition: 0.2s;}
        input, select { background: #fff; color: #000; }
        
        .btn-primary { background: linear-gradient(90deg, #00f2fe, #4facfe); color: #000; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }
        .btn-secondary { background: transparent; border: 2px solid #00f2fe; color: #00f2fe; }
        .btn-danger { background: linear-gradient(90deg, #ff0844, #ffb199); color: #fff; margin-top: 15px; }

        /* Game HUD */
        #game-screen { background: #000; z-index: 5; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #hud { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 20; pointer-events: none; }
        .life-container { width: 38%; background: rgba(0,0,0,0.7); border: 2px solid #fff; border-radius: 8px; padding: 5px; }
        .life-bar { height: 10px; border-radius: 4px; transition: width 0.3s; }
        #p1-life { background: #00f2fe; box-shadow: 0 0 10px #00f2fe; width: 100%; }
        #p2-life { background: #ff0844; box-shadow: 0 0 10px #ff0844; width: 100%; }
        .name-tag { font-family: 'Orbitron'; font-size: 10px; margin-bottom: 5px; text-transform: uppercase; }
        
        #nav-hud { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); border: 1px solid #00f2fe; padding: 10px 20px; border-radius: 20px; font-family: 'Orbitron'; font-size: 13px; color: #00f2fe; text-align: center; z-index: 20; width: 85%; }
        
        /* Turn & Warning Alerts */
        #alert-center { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-family: 'Orbitron'; font-size: 45px; color: #ffeb3b; text-shadow: 0 0 20px #ffeb3b; z-index: 25; text-align: center; display: none; pointer-events: none; }

        /* Emoji Bar */
        #emoji-bar { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 30; }
        .emoji-btn { background: rgba(255,255,255,0.2); border: 1px solid #fff; border-radius: 50%; width: 45px; height: 45px; font-size: 22px; cursor: pointer; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .floating-emoji { position: absolute; font-size: 40px; animation: floatUp 2s forwards ease-out; z-index: 40; pointer-events: none; }
        
        @keyframes floatUp { 0% { opacity: 1; transform: translate(-50%, 0) scale(1); } 100% { opacity: 0; transform: translate(-50%, -150px) scale(1.5); } }

        /* Overlays */
        #level-overlay, #game-over-screen { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 50; flex-direction: column; align-items: center; justify-content: center; text-align: center;}
        #level-title { font-family: 'Orbitron'; font-size: 35px; color: #00f2fe; margin-bottom: 10px; }
        #level-task { font-size: 16px; color: #ccc; width: 80%; }
        
        /* Final Love Animation */
        #final-screen { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 100; overflow: hidden; flex-direction: column; align-items: center; justify-content: center; }
        .heart-particle { position: absolute; font-size: 25px; animation: zoomOutHeart 3s forwards; }
        #final-text { font-family: 'Orbitron'; font-size: 32px; color: #fff; text-shadow: 0 0 20px #ff00ff; z-index: 110; opacity: 0; animation: fadeInText 3s 2s forwards; text-align: center;}
        
        @keyframes zoomOutHeart { 0% { transform: scale(0) translate(0,0); opacity: 1; } 100% { transform: scale(15) translate(var(--tx), var(--ty)); opacity: 0; } }
        @keyframes fadeInText { to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1>Journey To You</h1>
        <div class="card">
            <input type="text" id="playerName" placeholder="Enter Your Name" required>
            <select id="playerGender">
                <option value="boy">I am the Boy (Blue Car)</option>
                <option value="girl">I am the Girl (Pink Car)</option>
            </select>
            <button id="btnCreateGame" class="btn-primary">Start Journey</button>
            <div style="margin: 15px 0; color: #666;">OR</div>
            <input type="text" id="joinCode" placeholder="Enter Room Code" style="text-transform: uppercase;">
            <button id="btnJoinGame" class="btn-secondary">Join Partner</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <h2 style="color: #fff; font-family: 'Orbitron';">Locating Partner...</h2>
        <div class="card">
            <p style="color: #aaa; margin: 0;">Tell your partner to join with:</p>
            <h1 id="displayCode" style="font-size: 45px; color: #00f2fe; margin: 10px 0;">XXXXX</h1>
            <button id="btnShare" class="btn-primary" style="background: #25D366; color: #fff; border:none; margin-top: 15px;">Invite via WhatsApp</button>
        </div>
    </div>

    <div id="level-overlay">
        <div id="level-title">LEVEL 1</div>
        <div id="level-task">You are on separate routes! Swipe to avoid traffic and make turns to meet your partner.</div>
    </div>

    <div id="game-over-screen">
        <h1 style="color: #ff0844; font-family: 'Orbitron';">JOURNEY FAILED</h1>
        <p style="color: #ccc;">You crashed too many times.</p>
        <button id="btnRestart" class="btn-danger" style="width: 200px;">Try Again</button>
    </div>

    <div id="final-screen">
        <div id="final-text">TRUE LOVE NEVER ENDS<br><br><span id="finalNames" style="color: #ff00ff; font-size: 24px;"></span></div>
    </div>

    <div id="game-screen" class="screen">
        <div id="hud">
            <div class="life-container"><div class="name-tag" id="name1" style="color:#00f2fe;">P1</div><div class="life-bar" id="p1-life"></div></div>
            <div class="life-container" style="text-align:right;"><div class="name-tag" id="name2" style="color:#ff0844;">P2</div><div class="life-bar" id="p2-life" style="float: right;"></div></div>
        </div>
        <div id="nav-hud">GPS: Calculating Route...</div>
        
        <div id="alert-center">⬅️ SWIPE LEFT!</div>

        <div id="emoji-bar">
            <button class="emoji-btn" onclick="sendEmoji('❤️')">❤️</button>
            <button class="emoji-btn" onclick="sendEmoji('😂')">😂</button>
            <button class="emoji-btn" onclick="sendEmoji('😱')">😱</button>
            <button class="emoji-btn" onclick="sendEmoji('🚨')">🚨</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZmqyLmyWesuoj6djTbyfrOJ1v7_FCWcQ",
            authDomain: "game-bf78a.firebaseapp.com",
            projectId: "game-bf78a",
            storageBucket: "game-bf78a.firebasestorage.app",
            messagingSenderId: "860717231489",
            appId: "1:860717231489:web:f53331a96570be04cacc80"
        };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        function switchScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); if(document.getElementById(id)) document.getElementById(id).classList.add('active'); }

        // --- GAME & RENDER STATE ---
        let gameId = "", playerNum = 0, gameDocRef = null;
        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
        let horizonY = 0; function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; horizonY = canvas.height * 0.45; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        let gameState = { 
            status: 'waiting', level: 1, progress: 0, p1Name: "", p1Gender: "", p2Name: "", p2Gender: "",
            p1Lane: 1, p2Lane: 1, p1Life: 100, p2Life: 100, obstacle: null, turnEvent: null, latestEmoji: null
        };

        // Smooth Rendering Variables (The Secret to "Soft" Movement)
        let renderP1X = 1; let renderP2X = 1;
        let roadCurve = 0, targetCurve = 0;
        let scenery = []; // 3D Buildings/Trees

        const levels = {
            1: { bg: ["#000011", "#0a0a2a"], ground: "#111", title: "LEVEL 1: DIFFERENT ROUTES", task: "You are on separate roads. Make the sharp turns correctly to find your partner!", speed: 5 },
            2: { bg: ["#1a0000", "#3a0000"], ground: "#210", title: "LEVEL 2: CITY ESCAPE", task: "You met! Now dodge the traffic together. Speed slightly increased.", speed: 7 },
            3: { bg: ["#001a1a", "#003a3a"], ground: "#011", title: "LEVEL 3: NEON CHASERS", task: "More obstacles! Double-tap screen to share 20 Life if partner is low.", speed: 9 },
            4: { bg: ["#2a002a", "#4a004a"], ground: "#101", title: "LEVEL 4: SYNTHWAVE", task: "Sharp turns + Fast obstacles! Stay focused.", speed: 11 },
            5: { bg: ["#000", "#111"], ground: "#000", title: "LEVEL 5: GALAXY FINALE", task: "Maximum speed. The final test of your coordination!", speed: 14 }
        };

        let isTransitioning = false;

        // --- CONTROLS (Swipe to Steer & Turn) ---
        let touchX = 0, touchY = 0, lastTap = 0;
        document.addEventListener('touchstart', e => { touchX = e.changedTouches[0].screenX; touchY = e.changedTouches[0].screenY; 
            let now = new Date().getTime();
            if (now - lastTap < 300 && gameState.status === 'playing') shareLife();
            lastTap = now;
        });

        document.addEventListener('touchend', async e => {
            if(gameState.status !== 'playing' || isTransitioning) return;
            let dx = e.changedTouches[0].screenX - touchX;
            let dy = e.changedTouches[0].screenY - touchY;
            let myLaneKey = playerNum === 1 ? 'p1Lane' : 'p2Lane';
            
            if (Math.abs(dx) > 40) {
                // If there's an active TURN EVENT, swiping clears it
                if(gameState.turnEvent && playerNum === 1) { // Host handles turn logic
                    if((gameState.turnEvent === 'LEFT' && dx < 0) || (gameState.turnEvent === 'RIGHT' && dx > 0)) {
                        await updateDoc(gameDocRef, { turnEvent: null }); // Successfully turned
                        showHUDAlert("GOOD TURN!", "#00ff00");
                        return;
                    }
                }
                // Normal Lane Changing
                if (dx > 0 && gameState[myLaneKey] < 2) await updateDoc(gameDocRef, { [myLaneKey]: gameState[myLaneKey] + 1 });
                else if (dx < 0 && gameState[myLaneKey] > 0) await updateDoc(gameDocRef, { [myLaneKey]: gameState[myLaneKey] - 1 });
            }
        });

        // EMOJI SYSTEM
        window.sendEmoji = async function(emoji) {
            if(gameState.status === 'playing') await updateDoc(gameDocRef, { latestEmoji: { e: emoji, p: playerNum, id: Date.now() } });
        }

        async function shareLife() {
            let myLife = playerNum === 1 ? 'p1Life' : 'p2Life'; let ptLife = playerNum === 1 ? 'p2Life' : 'p1Life';
            if(gameState[myLife] > 20 && gameState[ptLife] < 100) await updateDoc(gameDocRef, { [myLife]: gameState[myLife] - 20, [ptLife]: Math.min(100, gameState[ptLife] + 20) });
        }

        function showHUDAlert(text, color) {
            let alert = document.getElementById('alert-center');
            alert.innerText = text; alert.style.color = color;
            alert.style.display = 'block'; setTimeout(() => alert.style.display = 'none', 1500);
        }

        // --- BUTTONS ---
        document.getElementById('btnCreateGame').addEventListener('click', async () => {
            const name = document.getElementById('playerName').value.trim();
            if(!name) return; playerNum = 1; gameId = Math.random().toString(36).substring(2, 7).toUpperCase();
            gameDocRef = doc(db, "games", gameId);
            await setDoc(gameDocRef, { ...gameState, p1Name: name, p1Gender: document.getElementById('playerGender').value });
            document.getElementById('displayCode').innerText = gameId; switchScreen('lobby-screen'); setupListeners();
        });

        document.getElementById('btnJoinGame').addEventListener('click', async () => {
            const name = document.getElementById('playerName').value.trim();
            gameId = document.getElementById('joinCode').value.trim().toUpperCase();
            if(!name || gameId.length !== 5) return; playerNum = 2;
            gameDocRef = doc(db, "games", gameId);
            const snap = await getDoc(gameDocRef);
            if(snap.exists()) { await updateDoc(gameDocRef, { p2Name: name, p2Gender: document.getElementById('playerGender').value, status: 'playing' }); setupListeners(); }
        });

        document.getElementById('btnRestart').addEventListener('click', async () => {
            document.getElementById('game-over-screen').style.display = 'none';
            if(playerNum === 1) await updateDoc(gameDocRef, { level: 1, progress: 0, p1Life: 100, p2Life: 100, status: 'playing', obstacle: null, turnEvent: null });
        });

        document.getElementById('btnShare').addEventListener('click', () => {
            const url = window.location.origin + window.location.pathname + '?game=' + gameId;
            const text = `Join my Journey! Room Code: *${gameId}* or click here: ${url}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
        });

        // --- SYNC ENGINE ---
        let lastEmojiId = 0;
        function setupListeners() {
            onSnapshot(gameDocRef, (docSnap) => {
                if(!docSnap.exists()) return;
                let oldLvl = gameState.level; gameState = docSnap.data();

                if(gameState.status === 'playing' && !document.getElementById('game-screen').classList.contains('active')) {
                    switchScreen('game-screen');
                    document.getElementById('name1').innerText = gameState.p1Name; document.getElementById('name2').innerText = gameState.p2Name;
                    startGameLoop(); if(playerNum === 1) hostEngine();
                }

                if(gameState.status === 'playing') {
                    document.getElementById('p1-life').style.width = Math.max(0, gameState.p1Life) + "%";
                    document.getElementById('p2-life').style.width = Math.max(0, gameState.p2Life) + "%";
                    
                    if(gameState.level > oldLvl) {
                        if(gameState.level > 5) triggerFinalLoveAnimation();
                        else showLevelOverlay(gameState.level);
                    }

                    // Handle Turns
                    if(gameState.turnEvent) {
                        targetCurve = gameState.turnEvent === 'LEFT' ? -30 : 30;
                        document.getElementById('alert-center').innerText = `⬅️ SWIPE ${gameState.turnEvent}! ➡️`;
                        document.getElementById('alert-center').style.color = "#ffeb3b";
                        document.getElementById('alert-center').style.display = 'block';
                    } else {
                        targetCurve = 0; document.getElementById('alert-center').style.display = 'none';
                    }

                    // Handle Emojis
                    if(gameState.latestEmoji && gameState.latestEmoji.id !== lastEmojiId) {
                        lastEmojiId = gameState.latestEmoji.id;
                        let div = document.createElement('div');
                        div.className = 'floating-emoji'; div.innerText = gameState.latestEmoji.e;
                        div.style.left = gameState.latestEmoji.p === 1 ? '20%' : '80%';
                        div.style.top = '60%';
                        document.getElementById('game-screen').appendChild(div);
                        setTimeout(() => div.remove(), 2000);
                    }

                    if(gameState.p1Life <= 0 || gameState.p2Life <= 0) document.getElementById('game-over-screen').style.display = 'flex';
                }
            });
        }

        function showLevelOverlay(lvl) {
            isTransitioning = true;
            document.getElementById('level-title').innerText = levels[lvl].title;
            document.getElementById('level-task').innerText = levels[lvl].task;
            document.getElementById('level-overlay').style.display = 'flex';
            setTimeout(() => { document.getElementById('level-overlay').style.display = 'none'; isTransitioning = false; }, 4000);
        }

        function triggerFinalLoveAnimation() {
            document.getElementById('game-screen').style.display = 'none';
            let finalScreen = document.getElementById('final-screen'); finalScreen.style.display = 'flex';
            document.getElementById('finalNames').innerText = `${gameState.p1Name} & ${gameState.p2Name}`;
            const colors = ['#ff0000', '#ff00ff', '#00ffff', '#ffff00', '#00ff00'];
            for(let i=0; i<80; i++) {
                let h = document.createElement('div'); h.innerHTML = '❤️'; h.className = 'heart-particle';
                h.style.color = colors[Math.floor(Math.random() * colors.length)]; h.style.left = '50%'; h.style.top = '50%';
                let angle = Math.random() * Math.PI * 2; let dist = 100 + Math.random() * 300;
                h.style.setProperty('--tx', (Math.cos(angle) * dist) + 'px'); h.style.setProperty('--ty', (Math.sin(angle) * dist) + 'px');
                h.style.animationDelay = (Math.random() * 2) + 's'; finalScreen.appendChild(h);
            }
        }

        // --- HOST PROGRESS ENGINE ---
        let lastTurnProg = 0; let lastObsProg = 0;
        function hostEngine() {
            setInterval(async () => {
                if(gameState.status !== 'playing' || isTransitioning || gameState.level > 5 || gameState.p1Life <= 0 || gameState.p2Life <= 0) return;

                // Slower progression, progressive speed
                let newProg = gameState.progress + 1; // 1% per second. A level takes ~100 seconds! Plenty of time.

                if(newProg >= 100) {
                    await updateDoc(gameDocRef, { level: gameState.level + 1, progress: 0, obstacle: null, turnEvent: null });
                    lastTurnProg = 0; lastObsProg = 0;
                } else {
                    await updateDoc(gameDocRef, { progress: newProg });
                    
                    // Trigger Turns (Level 1, 3, 4)
                    if([1, 3, 4].includes(gameState.level) && newProg - lastTurnProg > 15 && !gameState.turnEvent) {
                        lastTurnProg = newProg;
                        await updateDoc(gameDocRef, { turnEvent: Math.random() > 0.5 ? 'LEFT' : 'RIGHT' });
                        
                        // Fail condition for turn: if not cleared in 3 seconds
                        setTimeout(async () => {
                            let snap = await getDoc(gameDocRef);
                            if(snap.data().turnEvent) { // User missed the swipe!
                                updateDoc(gameDocRef, { p1Life: snap.data().p1Life - 20, p2Life: snap.data().p2Life - 20, turnEvent: null });
                            }
                        }, 3000);
                    }

                    // Spawn Obstacles (Distance between them increases making it fair)
                    if(!gameState.obstacle && newProg - lastObsProg > 5 && !gameState.turnEvent) {
                        lastObsProg = newProg;
                        await updateDoc(gameDocRef, { obstacle: { lane: Math.floor(Math.random() * 3), z: 3000, id: Date.now() } });
                    }
                }
            }, 1000);
        }

        // --- 3D CANVAS RENDERER ---
        let obsZ = 3000; let roadOffset = 0;
        
        function drawCar(x, y, scale, color) {
            ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
            ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.beginPath(); ctx.ellipse(0, 25, 50, 10, 0, 0, Math.PI*2); ctx.fill(); // Soft Shadow
            ctx.fillStyle = "#111"; ctx.fillRect(-40, 5, 15, 20); ctx.fillRect(25, 5, 15, 20);
            ctx.fillStyle = color; ctx.beginPath(); ctx.roundRect(-35, -5, 70, 25, 8); ctx.fill();
            ctx.fillStyle = "#222"; ctx.beginPath(); ctx.moveTo(-25, -5); ctx.lineTo(-15, -25); ctx.lineTo(15, -25); ctx.lineTo(25, -5); ctx.fill();
            ctx.fillStyle = "#ff0000"; ctx.fillRect(-30, 8, 12, 6); ctx.fillRect(18, 8, 12, 6);
            ctx.restore();
        }

        function drawObstacle(x, y, scale) {
            ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
            ctx.fillStyle = "#ff3300"; ctx.fillRect(-30, -20, 60, 40); // Simple block
            ctx.fillStyle = "#ffaa00"; ctx.fillRect(-20, -10, 40, 20); 
            ctx.restore();
        }

        // Generate static scenery (Buildings)
        for(let i=0; i<20; i++) scenery.push({ side: Math.random() > 0.5 ? 1 : -1, z: Math.random() * 3000, h: 100 + Math.random()*200 });

        function startGameLoop() {
            if(gameState.level === 1) showLevelOverlay(1);

            function render() {
                if(gameState.status !== 'playing' || isTransitioning || gameState.level > 5) { requestAnimationFrame(render); return; }
                
                let lvlData = levels[gameState.level];
                
                // BG & Ground
                let grad = ctx.createLinearGradient(0, 0, 0, horizonY);
                grad.addColorStop(0, lvlData.bg[0]); grad.addColorStop(1, lvlData.bg[1]);
                ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, horizonY);
                ctx.fillStyle = lvlData.ground; ctx.fillRect(0, horizonY, canvas.width, canvas.height);

                let speed = lvlData.speed; roadOffset = (roadOffset + speed) % 100;
                
                // Smooth road curve transitions
                roadCurve += (targetCurve - roadCurve) * 0.05;

                // Render Scenery (Buildings passing by)
                ctx.fillStyle = "rgba(0, 255, 255, 0.2)"; // Neon buildings
                scenery.forEach(s => {
                    s.z -= speed * 2; if(s.z < 0) s.z = 3000;
                    let zScale = 400 / (400 + s.z);
                    let xOffset = (canvas.width/2) + (s.side * 400 * zScale) + (roadCurve * (s.z*0.01));
                    let yPos = horizonY + ((canvas.height - horizonY) * zScale);
                    ctx.fillRect(xOffset - (30*zScale), yPos - (s.h*zScale), 60*zScale, s.h*zScale);
                });

                // Draw Curving Road
                let dx = 0; ctx.fillStyle = "#222";
                for(let i=0; i<canvas.height - horizonY; i+=5) {
                    let y = canvas.height - i; let z = (canvas.height - horizonY) / (y - horizonY);
                    dx += roadCurve * 0.05 * z;
                    let roadW = 500 / z; let projX = (canvas.width / 2) + dx;
                    let color = (i + roadOffset) % 100 < 50 ? "#333" : "#222";
                    ctx.fillStyle = color; ctx.fillRect(projX - roadW, y, roadW * 2, 5);
                    if(color === "#222") { ctx.fillStyle = "#fff"; ctx.fillRect(projX - roadW/3, y, 5, 5); ctx.fillRect(projX + roadW/3, y, 5, 5); }
                }

                // HUD updates
                let navText = document.getElementById('nav-hud');
                if(gameState.level === 1) navText.innerText = `GPS: Route ${gameState.progress}% to Partner. Follow directions!`;
                else navText.innerText = `GPS: Driving together! Dodge traffic!`;

                // Obstacle Logic
                if(gameState.obstacle) {
                    obsZ -= (speed * 4);
                    let zScale = 400 / (400 + obsZ);
                    let laneOffset = (gameState.obstacle.lane - 1) * 200;
                    let curveOff = (roadCurve * 0.05) * obsZ;
                    let oX = (canvas.width/2) + (laneOffset * zScale) + curveOff;
                    let oY = horizonY + ((canvas.height - horizonY) * zScale);

                    if(obsZ > 20) {
                        drawObstacle(oX, oY, zScale * 2);
                    } else if(obsZ > -50) {
                        // Soft Collision (Hitbox is small now)
                        let myLane = playerNum === 1 ? gameState.p1Lane : gameState.p2Lane;
                        if(myLane === gameState.obstacle.lane && playerNum === 1) {
                            updateDoc(gameDocRef, { p1Life: gameState.p1Life - 15, p2Life: gameState.p2Life - 15, obstacle: null });
                            obsZ = 3000;
                        }
                    } else {
                        obsZ = 3000; if(playerNum === 1) updateDoc(gameDocRef, { obstacle: null });
                    }
                }

                // --- Smooth Car Rendering ---
                // Target lanes
                let targetP1X = (gameState.p1Lane - 1) * 200;
                let targetP2X = (gameState.p2Lane - 1) * 200;
                
                // Interpolate (Glide effect)
                renderP1X += (targetP1X - renderP1X) * 0.15;
                renderP2X += (targetP2X - renderP2X) * 0.15;

                let carY = canvas.height - 100;
                let p1Proj = { x: (canvas.width/2) + renderP1X, y: carY };
                let p2Proj = { x: (canvas.width/2) + renderP2X, y: carY };

                let p1Color = gameState.p1Gender === 'boy' ? '#00f2fe' : '#ff0844';
                let p2Color = gameState.p2Gender === 'boy' ? '#00f2fe' : '#ff0844';

                // Separation Logic (Level 1)
                if(gameState.level === 1) {
                    if(playerNum === 1) drawCar(p1Proj.x, p1Proj.y, 1.2, p1Color);
                    else drawCar(p2Proj.x, p2Proj.y, 1.2, p2Color);
                } else {
                    drawCar(p1Proj.x, p1Proj.y, 1.2, p1Color);
                    drawCar(p2Proj.x, p2Proj.y, 1.2, p2Color);
                }

                requestAnimationFrame(render);
            }
            render();
        }
    </script>
</body>
</html>
