<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Journey to You 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@500;700&display=swap');
        
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: #000; color: white; display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; touch-action: none; }
        
        .screen { display: none; position: absolute; width: 100%; height: 100%; top: 0; left: 0; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a2e, #000); z-index: 10; }
        .active { display: flex; }
        
        h1 { font-family: 'Orbitron', sans-serif; font-size: 38px; color: #ff00ff; text-transform: uppercase; text-shadow: 0 0 15px #ff00ff; text-align: center; margin-bottom: 20px;}
        
        .card { background: rgba(20, 20, 30, 0.9); padding: 30px; border-radius: 15px; border: 2px solid #00ffff; width: 90%; max-width: 400px; box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); text-align: center; }

        input, select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; font-family: 'Poppins', sans-serif; text-align: center; outline: none; font-weight: bold; }
        input, select { background: #fff; color: #000; }
        
        .btn-primary { background: linear-gradient(90deg, #00ffff, #ff00ff); color: #000; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }
        .btn-secondary { background: transparent; border: 2px solid #00ffff; color: #00ffff; }
        
        /* Game HUD */
        #game-screen { background: #000; z-index: 5; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #hud { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 20; pointer-events: none; }
        .life-container { width: 40%; background: rgba(0,0,0,0.7); border: 2px solid #fff; border-radius: 8px; padding: 5px; }
        .life-bar { height: 12px; border-radius: 4px; transition: width 0.3s; }
        #p1-life { background: #00ffff; box-shadow: 0 0 10px #00ffff; width: 100%; }
        #p2-life { background: #ff00ff; box-shadow: 0 0 10px #ff00ff; width: 100%; }
        
        /* Direction / Nav HUD */
        #nav-hud { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); border: 2px solid #00ffff; padding: 10px 20px; border-radius: 20px; font-family: 'Orbitron'; font-size: 14px; color: #00ffff; text-align: center; text-shadow: 0 0 10px #00ffff; z-index: 20; width: 85%; }
        
        #instruction-banner { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.8); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; text-align: center; z-index: 20; width: 80%; }

        /* Level Transitions & Game Over */
        #level-overlay, #game-over-screen { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 50; flex-direction: column; align-items: center; justify-content: center; text-align: center;}
        #level-title { font-family: 'Orbitron'; font-size: 35px; color: #00ffff; margin-bottom: 10px; }
        #level-task { font-size: 16px; color: #fff; width: 80%; }

        /* Final Love Animation */
        #final-screen { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 100; overflow: hidden; flex-direction: column; align-items: center; justify-content: center; }
        .heart-particle { position: absolute; font-size: 20px; opacity: 1; animation: zoomOutHeart 3s forwards; }
        #final-text { font-family: 'Orbitron'; font-size: 30px; color: #fff; text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff; z-index: 110; opacity: 0; animation: fadeInText 3s 2s forwards; text-align: center;}
        
        @keyframes zoomOutHeart { 
            0% { transform: scale(0) translate(0,0); opacity: 1; } 
            100% { transform: scale(15) translate(var(--tx), var(--ty)); opacity: 0; } 
        }
        @keyframes fadeInText { to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1>Journey To You</h1>
        <div class="card">
            <input type="text" id="playerName" placeholder="Enter Your Name" required>
            <select id="playerGender">
                <option value="boy">I am the Boy (Blue Car)</option>
                <option value="girl">I am the Girl (Pink Car)</option>
            </select>
            <button id="btnCreateGame" class="btn-primary">Start Journey</button>
            <div style="margin: 15px 0; color: #aaa;">OR</div>
            <input type="text" id="joinCode" placeholder="Enter Room Code" style="text-transform: uppercase;">
            <button id="btnJoinGame" class="btn-secondary">Join Journey</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <h2 style="color: #fff; font-family: 'Orbitron';">Locating Partner...</h2>
        <div class="card">
            <p style="color: #aaa; margin: 0;">Share Room Code:</p>
            <h1 id="displayCode" style="font-size: 45px; color: #00ffff; margin: 10px 0;">XXXXX</h1>
        </div>
    </div>

    <div id="level-overlay">
        <div id="level-title">LEVEL 1</div>
        <div id="level-task">Drive through the dark city. Follow directions to find your partner!</div>
    </div>

    <div id="game-over-screen">
        <h1 style="color: #ff0000; font-family: 'Orbitron';">CAR CRASHED</h1>
        <button id="btnRestart" class="btn-primary" style="width: 200px; margin-top: 20px;">Restart Engine</button>
    </div>

    <div id="final-screen">
        <div id="final-text">
            TRUE LOVE NEVER ENDS<br><br>
            <span id="finalNames" style="color: #ff00ff; font-size: 24px;">Name 1 & Name 2</span>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="hud">
            <div class="life-container"><div class="life-bar" id="p1-life"></div></div>
            <div class="life-container"><div class="life-bar" id="p2-life" style="float: right;"></div></div>
        </div>
        <div id="nav-hud">GPS: Partner 500m ahead...</div>
        <div id="instruction-banner">Swipe Left/Right to Steer.</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZmqyLmyWesuoj6djTbyfrOJ1v7_FCWcQ",
            authDomain: "game-bf78a.firebaseapp.com",
            projectId: "game-bf78a",
            storageBucket: "game-bf78a.firebasestorage.app",
            messagingSenderId: "860717231489",
            appId: "1:860717231489:web:f53331a96570be04cacc80"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- FULL SCREEN ---
        function enterFullScreen() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen().catch(e => {});
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            if(document.getElementById(id)) document.getElementById(id).classList.add('active');
        }

        // --- GAME STATE ---
        let gameId = "", playerNum = 0, gameDocRef = null;
        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
        let horizonY = 0;
        
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; horizonY = canvas.height * 0.45; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        let gameState = { 
            status: 'waiting', level: 1, progress: 0, p1Name: "", p1Gender: "", p2Name: "", p2Gender: "",
            p1Lane: 1, p2Lane: 1, p1Life: 100, p2Life: 100, obstacle: null, curve: 0
        };

        const levels = {
            1: { bg: ["#000022", "#000000"], ground: "#111", title: "LEVEL 1: THE LOST HIGHWAY", nav: "Follow the curves to locate your partner. Avoid obstacles." },
            2: { bg: ["#330000", "#ff6600"], ground: "#331100", title: "LEVEL 2: DUST RIDER", nav: "You found each other! Now survive the desert monsters." },
            3: { bg: ["#001133", "#00ffff"], ground: "#002222", title: "LEVEL 3: NEON PURSUIT", nav: "Police barricades ahead! Steer carefully together." },
            4: { bg: ["#220033", "#ff00ff"], ground: "#110011", title: "LEVEL 4: SYNTHWAVE STORM", nav: "Extreme speed & sharp turns! Double tap to share life." },
            5: { bg: ["#000000", "#ffffff"], ground: "#222", title: "LEVEL 5: GALAXY DRIVE", nav: "The final stretch. Stay alive to prove your love!" }
        };

        let isTransitioning = false;

        // --- SWIPE CONTROLS ---
        let touchX = 0;
        document.addEventListener('touchstart', e => touchX = e.changedTouches[0].screenX );
        document.addEventListener('touchend', async e => {
            if(gameState.status !== 'playing' || isTransitioning) return;
            let dx = e.changedTouches[0].screenX - touchX;
            let myLane = playerNum === 1 ? 'p1Lane' : 'p2Lane';
            if (dx > 40 && gameState[myLane] < 2) await updateDoc(gameDocRef, { [myLane]: gameState[myLane] + 1 });
            else if (dx < -40 && gameState[myLane] > 0) await updateDoc(gameDocRef, { [myLane]: gameState[myLane] - 1 });
        });

        // --- BUTTONS ---
        document.getElementById('btnCreateGame').addEventListener('click', async () => {
            enterFullScreen(); const name = document.getElementById('playerName').value.trim();
            if(!name) return; playerNum = 1; gameId = Math.random().toString(36).substring(2, 7).toUpperCase();
            gameDocRef = doc(db, "games", gameId);
            await setDoc(gameDocRef, { ...gameState, p1Name: name, p1Gender: document.getElementById('playerGender').value });
            document.getElementById('displayCode').innerText = gameId; switchScreen('lobby-screen'); setupListeners();
        });

        document.getElementById('btnJoinGame').addEventListener('click', async () => {
            enterFullScreen(); const name = document.getElementById('playerName').value.trim();
            gameId = document.getElementById('joinCode').value.trim().toUpperCase();
            if(!name || gameId.length !== 5) return; playerNum = 2;
            gameDocRef = doc(db, "games", gameId);
            const snap = await getDoc(gameDocRef);
            if(snap.exists()) {
                await updateDoc(gameDocRef, { p2Name: name, p2Gender: document.getElementById('playerGender').value, status: 'playing' });
                setupListeners();
            }
        });

        document.getElementById('btnRestart').addEventListener('click', async () => {
            document.getElementById('game-over-screen').style.display = 'none';
            if(playerNum === 1) await updateDoc(gameDocRef, { level: 1, progress: 0, p1Life: 100, p2Life: 100, status: 'playing', obstacle: null });
        });

        // --- SYNC ---
        function setupListeners() {
            onSnapshot(gameDocRef, (docSnap) => {
                if(!docSnap.exists()) return;
                let oldLvl = gameState.level; gameState = docSnap.data();

                if(gameState.status === 'playing' && !document.getElementById('game-screen').classList.contains('active')) {
                    switchScreen('game-screen'); startGameLoop(); if(playerNum === 1) hostEngine();
                }

                if(gameState.status === 'playing') {
                    document.getElementById('p1-life').style.width = Math.max(0, gameState.p1Life) + "%";
                    document.getElementById('p2-life').style.width = Math.max(0, gameState.p2Life) + "%";
                    
                    if(gameState.level > oldLvl) {
                        if(gameState.level > 5) triggerFinalLoveAnimation();
                        else showLevelOverlay(gameState.level);
                    }

                    if(gameState.p1Life <= 0 || gameState.p2Life <= 0) document.getElementById('game-over-screen').style.display = 'flex';
                }
            });
        }

        function showLevelOverlay(lvl) {
            isTransitioning = true;
            document.getElementById('level-title').innerText = levels[lvl].title;
            document.getElementById('level-task').innerText = levels[lvl].nav;
            document.getElementById('level-overlay').style.display = 'flex';
            setTimeout(() => { document.getElementById('level-overlay').style.display = 'none'; isTransitioning = false; }, 3000);
        }

        function triggerFinalLoveAnimation() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('nav-hud').style.display = 'none';
            let finalScreen = document.getElementById('final-screen');
            finalScreen.style.display = 'flex';
            document.getElementById('finalNames').innerText = `${gameState.p1Name} & ${gameState.p2Name}`;

            // Generate Multicolored Hearts
            const colors = ['#ff0000', '#ff00ff', '#00ffff', '#ffff00', '#00ff00'];
            for(let i=0; i<60; i++) {
                let h = document.createElement('div');
                h.innerHTML = '❤️'; h.className = 'heart-particle';
                h.style.color = colors[Math.floor(Math.random() * colors.length)];
                h.style.left = '50%'; h.style.top = '50%';
                
                // Random directions for zoom out
                let angle = Math.random() * Math.PI * 2;
                let dist = 100 + Math.random() * 200;
                h.style.setProperty('--tx', (Math.cos(angle) * dist) + 'px');
                h.style.setProperty('--ty', (Math.sin(angle) * dist) + 'px');
                h.style.animationDelay = (Math.random() * 2) + 's';
                finalScreen.appendChild(h);
            }
        }

        // --- HOST LOGIC ---
        function hostEngine() {
            setInterval(async () => {
                if(gameState.status !== 'playing' || isTransitioning || gameState.level > 5 || gameState.p1Life <= 0 || gameState.p2Life <= 0) return;

                let spd = 1 + (gameState.level * 0.3);
                let newProg = gameState.progress + (8 * spd);
                let newCurve = Math.sin(newProg * 0.1) * (gameState.level * 0.5); // Dynamic curve

                if(newProg >= 100) {
                    await updateDoc(gameDocRef, { level: gameState.level + 1, progress: 0, obstacle: null, curve: 0 });
                } else {
                    await updateDoc(gameDocRef, { progress: newProg, curve: newCurve });
                    
                    if(!gameState.obstacle) {
                        let type = gameState.level % 2 === 0 ? 'monster' : 'police';
                        await updateDoc(gameDocRef, { obstacle: { lane: Math.floor(Math.random() * 3), type: type, z: 2000, id: Date.now() } });
                    }
                }
            }, 1000);
        }

        // --- 3D CANVAS RENDERER ---
        let obsZ = 2000;
        let roadOffset = 0;

        function drawCar(x, y, scale, color) {
            ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
            // Shadow
            ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.beginPath(); ctx.ellipse(0, 30, 60, 15, 0, 0, Math.PI*2); ctx.fill();
            // Tires
            ctx.fillStyle = "#111"; ctx.fillRect(-50, 10, 20, 25); ctx.fillRect(30, 10, 20, 25);
            // Body
            ctx.fillStyle = color; ctx.beginPath(); ctx.roundRect(-45, -10, 90, 30, 10); ctx.fill();
            // Roof
            ctx.fillStyle = "#222"; ctx.beginPath(); ctx.moveTo(-30, -10); ctx.lineTo(-20, -35); ctx.lineTo(20, -35); ctx.lineTo(30, -10); ctx.fill();
            // Tail lights
            ctx.fillStyle = "#ff0000"; ctx.shadowBlur = 10; ctx.shadowColor = "red"; ctx.fillRect(-40, 5, 15, 8); ctx.fillRect(25, 5, 15, 8);
            ctx.restore();
        }

        function drawObstacle(x, y, scale, type) {
            ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
            if(type === 'police') {
                ctx.fillStyle = "#000044"; ctx.fillRect(-40, -20, 80, 40); // Car body
                ctx.fillStyle = (Math.floor(Date.now()/100)%2 === 0) ? "#ff0000" : "#0000ff"; // Flashing siren
                ctx.shadowBlur = 20; ctx.shadowColor = ctx.fillStyle; ctx.fillRect(-15, -35, 30, 15);
            } else {
                ctx.fillStyle = "#00ff00"; ctx.beginPath(); ctx.arc(0, 0, 40, 0, Math.PI*2); ctx.fill(); // Monster blob
                ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(-15, -10, 5, 0, Math.PI*2); ctx.arc(15, -10, 5, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
        }

        function startGameLoop() {
            if(gameState.level === 1) showLevelOverlay(1);

            function render() {
                if(gameState.status !== 'playing' || isTransitioning || gameState.level > 5) {
                    requestAnimationFrame(render); return;
                }
                
                let lvlData = levels[gameState.level];
                
                // Draw Sky
                let grad = ctx.createLinearGradient(0, 0, 0, horizonY);
                grad.addColorStop(0, lvlData.bg[0]); grad.addColorStop(1, lvlData.bg[1]);
                ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, horizonY);
                
                // Draw Ground
                ctx.fillStyle = lvlData.ground; ctx.fillRect(0, horizonY, canvas.width, canvas.height);

                let speed = 10 + (gameState.level * 2);
                roadOffset = (roadOffset + speed) % 100;

                // --- Draw Curving Road (Pseudo-3D) ---
                let dx = 0; let ddx = gameState.curve * 0.05; // Curve logic
                ctx.fillStyle = "#333";
                
                for(let i=0; i<canvas.height - horizonY; i+=4) {
                    let y = canvas.height - i;
                    let z = (canvas.height - horizonY) / (y - horizonY); // Perspective depth
                    
                    dx += ddx * z; // Curve displacement
                    
                    let roadW = 400 / z; // Road width
                    let projX = (canvas.width / 2) + dx;
                    
                    // Alternating road lines for movement illusion
                    let color = (i + roadOffset) % 100 < 50 ? "#444" : "#222";
                    ctx.fillStyle = color;
                    ctx.fillRect(projX - roadW, y, roadW * 2, 4);
                    
                    // White lane dividers
                    if(color === "#222") {
                        ctx.fillStyle = "#fff";
                        ctx.fillRect(projX - roadW/3, y, 4, 4);
                        ctx.fillRect(projX + roadW/3, y, 4, 4);
                    }
                }

                // --- Update Nav HUD ---
                let dist = Math.floor(100 - gameState.progress) * 10;
                let navText = document.getElementById('nav-hud');
                if(gameState.level === 1) navText.innerText = `GPS: Partner ${dist}m away... Curve ahead!`;
                else navText.innerText = `GPS: Driving together! Dodge obstacles!`;

                // --- Draw Obstacle ---
                if(gameState.obstacle) {
                    obsZ -= (speed * 4);
                    let zScale = 200 / (200 + obsZ);
                    let laneOffset = (gameState.obstacle.lane - 1) * 150;
                    
                    // Add curve offset to obstacle
                    let curveOff = (gameState.curve * 0.05) * (obsZ * 0.5);
                    let oX = (canvas.width/2) + (laneOffset * zScale) + curveOff;
                    let oY = horizonY + ((canvas.height - horizonY) * zScale);

                    if(obsZ > 20) {
                        drawObstacle(oX, oY, zScale * 1.5, gameState.obstacle.type);
                    } else if(obsZ > -50) {
                        let myLane = playerNum === 1 ? gameState.p1Lane : gameState.p2Lane;
                        if(myLane === gameState.obstacle.lane && playerNum === 1) {
                            updateDoc(gameDocRef, { p1Life: gameState.p1Life - 25, p2Life: gameState.p2Life - 25, obstacle: null });
                            obsZ = 2000;
                        }
                    } else {
                        obsZ = 2000;
                        if(playerNum === 1) updateDoc(gameDocRef, { obstacle: null });
                    }
                }

                // --- Draw Cars ---
                let p1Color = gameState.p1Gender === 'boy' ? '#00ffff' : '#ff00ff';
                let p2Color = gameState.p2Gender === 'boy' ? '#00ffff' : '#ff00ff';
                
                let p1X = (canvas.width/2) + ((gameState.p1Lane - 1) * 100);
                let p2X = (canvas.width/2) + ((gameState.p2Lane - 1) * 100);
                let carY = canvas.height - 80;

                // Level 1 Visibility Logic (Can't see partner)
                if(gameState.level === 1) {
                    if(playerNum === 1) drawCar(p1X, carY, 1, p1Color);
                    else drawCar(p2X, carY, 1, p2Color);
                } else {
                    // Both visible
                    drawCar(p1X, carY, 1, p1Color);
                    drawCar(p2X, carY, 1, p2Color);
                }

                requestAnimationFrame(render);
            }
            render();
        }
    </script>
</body>
</html>
