<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Ludo Pro | Nani Creations</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-color: #0f0c29;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --neon-blue: #00f2fe;
            --neon-pink: #fe0979;
            --gold: #ffd700;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; }

        body {
            background: linear-gradient(to right, #0f0c29, #302b63, #24243e);
            color: white;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .screen { display: none; padding: 20px; flex-direction: column; align-items: center; justify-content: center; flex: 1; }
        .screen.active { display: flex; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        button {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
            transition: 0.3s;
        }

        button.btn-primary { background: var(--neon-blue); color: black; }
        button.btn-whatsapp { background: #25D366; border-color: #25D366; color: black; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        input {
            width: 100%; padding: 12px; margin-bottom: 10px;
            background: rgba(255,255,255,0.1); border: 1px solid var(--neon-blue);
            color: white; border-radius: 8px; text-align: center;
        }

        .top-bar { display: flex; justify-content: space-between; flex-wrap: wrap; margin-bottom: 20px; gap: 10px; }
        .highlight { color: var(--gold); font-weight: bold; }

        /* Video Chat Layout */
        .video-container { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 15px; }
        video { width: 48%; border-radius: 10px; border: 2px solid var(--neon-pink); background: #000; aspect-ratio: 4/3; object-fit: cover; }

        /* Ludo Board Framework (15x15 Grid) */
        .ludo-board {
            width: 90vw; height: 90vw; max-width: 380px; max-height: 380px;
            background: #fff;
            border: 3px solid var(--neon-blue);
            border-radius: 10px;
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            margin-bottom: 15px;
            position: relative;
        }

        .cell { border: 1px solid rgba(0,0,0,0.1); }
        .home-red { background: #ff4d4d; grid-area: 1 / 1 / 7 / 7; }
        .home-green { background: #4dff4d; grid-area: 1 / 10 / 7 / 16; }
        .home-blue { background: #4d4dff; grid-area: 10 / 1 / 16 / 7; }
        .home-yellow { background: #ffff4d; grid-area: 10 / 10 / 16 / 16; }
        .center-box { background: var(--gold); grid-area: 7 / 7 / 10 / 10; }

        .dice-container { display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%; max-width: 400px; }
        .dice { font-size: 40px; text-shadow: 0 0 10px var(--neon-blue); cursor: pointer; }

        .footer { text-align: center; padding: 15px; font-size: 12px; opacity: 0.6; }
    </style>
</head>
<body>

    <!-- 1. Login Page -->
    <div id="login-page" class="screen active">
        <div class="glass-panel">
            <h1 style="color: var(--neon-blue); margin-bottom: 10px;">Neon Ludo</h1>
            <p style="margin-bottom: 20px;">Sign in to start your streak</p>
            <button id="btn-login" onclick="login()">Enter Game Studio</button>
        </div>
    </div>

    <!-- 2. Lobby Page -->
    <div id="lobby-page" class="screen">
        <div class="glass-panel top-bar">
            <div>Streak: <span id="ui-streak" class="highlight">0</span> 🔥</div>
            <div>Coins: <span id="ui-coins" class="highlight">0</span> 🪙</div>
            <div>Matches: <span id="ui-matches">0</span></div>
            <div>Win Rate: <span id="ui-winrate">0</span>%</div>
        </div>
        
        <div class="glass-panel">
            <button onclick="alert('Bot logic setup pending!')" class="btn-secondary">Play with Bot</button>
            <button onclick="createMultiplayerRoom()" class="btn-primary">Create Room (-500 Coins)</button>
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 15px 0;">
            <input type="text" id="join-code" placeholder="Enter Room Code">
            <button onclick="joinRoom()" class="btn-primary">Join Room (-500 Coins)</button>
        </div>
    </div>

    <!-- 3. Game Room -->
    <div id="game-page" class="screen">
        <div class="glass-panel" style="padding: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
            <span id="room-id-display" style="font-weight: bold; font-size: 18px;">Room: ----</span>
            <button onclick="shareWhatsApp()" class="btn-whatsapp" style="width: auto; margin: 0; padding: 8px 15px; font-size: 14px;">WhatsApp Share</button>
        </div>

        <!-- Video Chat P2P -->
        <div class="video-container">
            <video id="local-video" autoplay muted playsinline></video>
            <video id="remote-video" autoplay playsinline></video>
        </div>

        <!-- Ludo Board UI Generation -->
        <div class="ludo-board" id="board">
            <div class="home-red"></div>
            <div class="home-green"></div>
            <div class="home-blue"></div>
            <div class="home-yellow"></div>
            <div class="center-box"></div>
            <!-- Dynamic Grid cells inserted via JS -->
        </div>

        <div class="dice-container glass-panel">
            <div id="turn-indicator" style="flex: 1; text-align: left;">Waiting...</div>
            <div id="dice-result" class="dice" onclick="rollDice()">🎲</div>
        </div>
    </div>

    <div class="footer">
        Powered by Nani Creations
    </div>

    <script>
        // --- 1. FIREBASE CONFIGURATION ---
        // REPLACE THESE WITH YOUR FIREBASE PROJECT DETAILS
        // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyCZmqyLmyWesuoj6djTbyfrOJ1v7_FCWcQ",
  authDomain: "game-bf78a.firebaseapp.com",
  databaseURL: "https://game-bf78a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "game-bf78a",
  storageBucket: "game-bf78a.firebasestorage.app",
  messagingSenderId: "860717231489",
  appId: "1:860717231489:web:f53331a96570be04cacc80"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
        // --- GLOBAL VARIABLES ---
        let currentUser = null;
        let currentRoom = null;
        let isPlayer1 = false;
        let peerConnection;
        let localStream;
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        // --- UI NAVIGATION ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- 2. AUTH & ECONOMY ---
        function login() {
            document.getElementById('btn-login').innerText = "Authenticating...";
            auth.signInAnonymously().then((cred) => {
                currentUser = cred.user;
                checkAndInitUser(currentUser.uid);
            }).catch(e => {
                console.log("Firebase Auth Error: Please add Firebase config.");
                alert("Please add your Firebase config in the code to connect!");
                document.getElementById('btn-login').innerText = "Enter Game Studio";
            });
        }

        function checkAndInitUser(uid) {
            const userRef = db.ref(`users/${uid}`);
            userRef.once('value', snapshot => {
                if (!snapshot.exists()) {
                    userRef.set({ coins: 5000, wins: 0, matches: 0, streak: 0 }); // New user gets 5000
                }
                userRef.on('value', updateLobbyUI);
                showScreen('lobby-page');
            });
        }

        function updateLobbyUI(snapshot) {
            const data = snapshot.val();
            if(!data) return;
            document.getElementById('ui-coins').innerText = data.coins;
            document.getElementById('ui-streak').innerText = data.streak;
            document.getElementById('ui-matches').innerText = data.matches;
            document.getElementById('ui-winrate').innerText = data.matches > 0 ? ((data.wins / data.matches) * 100).toFixed(1) : 0;
        }

        // --- 3. MULTIPLAYER & DATABASE SYNC ---
        async function createMultiplayerRoom() {
            const userRef = db.ref(`users/${currentUser.uid}`);
            const snap = await userRef.once('value');
            if (snap.val().coins < 500) return alert("You need 500 coins to play!");

            userRef.update({ coins: snap.val().coins - 500, matches: snap.val().matches + 1 });

            currentRoom = Math.random().toString(36).substring(2, 8).toUpperCase();
            isPlayer1 = true;
            
            db.ref(`rooms/${currentRoom}`).set({
                player1: currentUser.uid,
                state: 'waiting',
                board: { turn: currentUser.uid, dice: 1 }
            });

            startGameRoom();
            initWebRTC(true);
            listenForGameSync();
        }

        async function joinRoom() {
            const code = document.getElementById('join-code').value.toUpperCase();
            if(!code) return alert("Enter a code!");

            const roomRef = db.ref(`rooms/${code}`);
            const roomSnap = await roomRef.once('value');

            if (!roomSnap.exists()) return alert("Room not found!");
            if (roomSnap.val().state !== 'waiting') return alert("Room is full or game started!");

            const userRef = db.ref(`users/${currentUser.uid}`);
            const snap = await userRef.once('value');
            if (snap.val().coins < 500) return alert("You need 500 coins to play!");
            userRef.update({ coins: snap.val().coins - 500, matches: snap.val().matches + 1 });

            currentRoom = code;
            isPlayer1 = false;
            roomRef.update({ player2: currentUser.uid, state: 'playing' });

            startGameRoom();
            initWebRTC(false);
            listenForGameSync();
        }

        function startGameRoom() {
            document.getElementById('room-id-display').innerText = `Code: ${currentRoom}`;
            showScreen('game-page');
            document.getElementById('turn-indicator').innerText = isPlayer1 ? "Waiting for opponent..." : "Game On!";
        }

        function shareWhatsApp() {
            const text = `Let's play Ludo! Room Code: ${currentRoom}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
        }

        // --- 4. GAME PLAY LOGIC ---
        function rollDice() {
            if(!currentRoom) return;
            const diceRef = db.ref(`rooms/${currentRoom}/board`);
            diceRef.once('value', snap => {
                const data = snap.val();
                if(data.turn !== currentUser.uid) return alert("Not your turn!");

                const result = Math.floor(Math.random() * 6) + 1;
                // Switch turn logic (simplified for 2 players)
                db.ref(`rooms/${currentRoom}`).once('value', roomSnap => {
                    const rData = roomSnap.val();
                    const nextTurn = (rData.player1 === currentUser.uid) ? rData.player2 : rData.player1;
                    
                    diceRef.update({ dice: result, turn: result === 6 ? currentUser.uid : nextTurn });
                });
            });
        }

        function listenForGameSync() {
            db.ref(`rooms/${currentRoom}/board`).on('value', snapshot => {
                const data = snapshot.val();
                if(!data) return;
                
                document.getElementById('dice-result').innerText = `🎲 ${data.dice}`;
                
                if (data.turn === currentUser.uid) {
                    document.getElementById('turn-indicator').innerText = "Your Turn! Tap Dice.";
                    document.getElementById('turn-indicator').style.color = "var(--neon-green)";
                } else {
                    document.getElementById('turn-indicator').innerText = "Opponent's Turn...";
                    document.getElementById('turn-indicator').style.color = "white";
                }
            });
        }

        // --- 5. WEBRTC P2P VIDEO CHAT ---
        async function initWebRTC(isInitiator) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;
            } catch (e) {
                console.log("Camera/Mic access denied or unavailable.");
            }

            peerConnection = new RTCPeerConnection(servers);
            if(localStream) {
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            }

            peerConnection.ontrack = (event) => {
                document.getElementById('remote-video').srcObject = event.streams[0];
            };

            const roomRef = db.ref(`rooms/${currentRoom}`);

            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    roomRef.child(isInitiator ? 'callerCandidates' : 'calleeCandidates').push(event.candidate.toJSON());
                }
            };

            if (isInitiator) {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                roomRef.update({ offer: { type: offer.type, sdp: offer.sdp } });

                roomRef.on('value', async snapshot => {
                    const data = snapshot.val();
                    if (!peerConnection.currentRemoteDescription && data && data.answer) {
                        const answer = new RTCSessionDescription(data.answer);
                        await peerConnection.setRemoteDescription(answer);
                    }
                });

                roomRef.child('calleeCandidates').on('child_added', snapshot => {
                    peerConnection.addIceCandidate(new RTCIceCandidate(snapshot.val()));
                });
            } else {
                roomRef.once('value', async snapshot => {
                    const data = snapshot.val();
                    const offer = data.offer;
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    roomRef.update({ answer: { type: answer.type, sdp: answer.sdp } });
                });

                roomRef.child('callerCandidates').on('child_added', snapshot => {
                    peerConnection.addIceCandidate(new RTCIceCandidate(snapshot.val()));
                });
            }
        }
    </script>
</body>
</html>
