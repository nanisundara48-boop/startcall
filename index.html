<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Journey of Love 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600;800&family=Orbitron:wght@700;900&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        
        body { font-family: 'Poppins', sans-serif; color: white; height: 100vh; width: 100vw; overflow: hidden; touch-action: none; transition: background 1s ease;}
        
        /* DYNAMIC THEMES */
        body.theme-0 { background: linear-gradient(135deg, #1a0011, #0a0a2a); }
        body.theme-1 { background: linear-gradient(135deg, #2b0018, #4a0024); }
        body.theme-2 { background: linear-gradient(135deg, #001133, #003366); }
        body.theme-3 { background: linear-gradient(135deg, #330000, #4d0000); }
        body.theme-4 { background: linear-gradient(135deg, #002211, #004422); }
        body.theme-5 { background: linear-gradient(135deg, #110022, #220044); }
        body.theme-6 { background: linear-gradient(135deg, #441100, #661100); }
        body.theme-7 { background: linear-gradient(135deg, #001a1a, #003333); }

        .screen { display: none; position: absolute; width: 100%; height: 100%; top: 0; left: 0; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .active { display: flex; }
        
        h1 { font-family: 'Dancing Script', cursive; font-size: 65px; color: #ff007f; text-shadow: 0 0 25px rgba(255, 0, 127, 0.8); text-align: center; margin-bottom: 5px;}
        .subtitle { font-family: 'Orbitron', sans-serif; font-size: 14px; color: #00f2fe; margin-bottom: 30px; letter-spacing: 4px;}
        
        .card { background: rgba(10, 5, 20, 0.8); padding: 30px; border-radius: 25px; border: 1px solid rgba(0, 242, 254, 0.4); width: 90%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; backdrop-filter: blur(15px);}

        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: none; font-size: 16px; font-family: 'Poppins', sans-serif; text-align: center; font-weight: bold; transition: 0.3s;}
        input { background: rgba(255,255,255,0.9); color: #111; }
        input:focus { border: 2px solid #ff007f; outline: none; }
        
        .btn-primary { background: linear-gradient(90deg, #ff007f, #ff758c); color: #fff; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 0, 127, 0.4);}
        .btn-primary:active { transform: scale(0.95); }
        .btn-secondary { background: transparent; border: 1px solid #00f2fe; color: #00f2fe; }
        .btn-success { background: linear-gradient(90deg, #1D976C, #25D366); color: white; }
        .btn-share-life { background: #ffeb3b; color: #000; padding: 5px 10px; font-size: 12px; border-radius: 10px; cursor: pointer; margin-top: 5px; display: none; box-shadow: 0 0 10px #ffeb3b;}

        /* Floating Nav & Comm HUD */
        #top-nav { display: none; position: absolute; top: 15px; left: 15px; right: 15px; justify-content: space-between; z-index: 1000; pointer-events: none;}
        .glass-btn { pointer-events: auto; width: 45px; height: 45px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 20px; backdrop-filter: blur(10px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.3s; }
        .glass-btn:active { transform: scale(0.9); }
        .muted { background: rgba(255, 0, 0, 0.3); border-color: #ff0000; color: #ff5555;}
        
        /* Live Toast Notification */
        #toast-container { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); z-index: 3000; display: flex; flex-direction: column; gap: 10px; pointer-events: none;}
        .live-toast { background: rgba(0, 242, 254, 0.9); color: #000; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-family: 'Poppins'; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: toastAnim 3s forwards; }
        @keyframes toastAnim { 0% { opacity: 0; transform: translateY(-20px); } 10% { opacity: 1; transform: translateY(0); } 90% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-20px); } }

        /* Chat Panel */
        #chat-panel { display: none; position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 350px; background: rgba(10, 5, 20, 0.95); border: 1px solid #00f2fe; border-radius: 20px; z-index: 2000; flex-direction: column; backdrop-filter: blur(15px);}
        #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 80%; word-wrap: break-word; }
        .msg.me { background: linear-gradient(135deg, #00f2fe, #4facfe); color: black; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 600;}
        .msg.them { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        #chat-input-area { display: flex; padding: 10px; gap: 10px; border-top: 1px solid rgba(0,242,254,0.3); background: rgba(0,0,0,0.4); border-radius: 0 0 20px 20px;}
        #chat-input-area input { margin: 0; padding: 12px; border-radius: 20px; background: rgba(255,255,255,0.1); color: white; border: none;}
        #chat-input-area button { width: 50px; margin: 0; border-radius: 50%; }

        #emoji-bar { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 1500; }
        .emoji-btn { background: rgba(255,255,255,0.1); border: 1px solid #ff007f; border-radius: 50%; width: 45px; height: 45px; font-size: 22px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s;}
        .floating-emoji { position: absolute; font-size: 45px; animation: floatUpEmoji 2s forwards ease-out; z-index: 2500; pointer-events: none; }
        @keyframes floatUpEmoji { 0% { opacity: 1; transform: translate(-50%, 0) scale(1); } 100% { opacity: 0; transform: translate(-50%, -200px) scale(1.5); } }

        /* Game Area Base */
        #game-area { display: none; position: absolute; top:0; left:0; width: 100vw; height: 100vh; z-index: 5; flex-direction: column; align-items: center; justify-content: center;}
        canvas { display: none; position: absolute; top:0; left:0; width: 100vw; height: 100vh; z-index: 1; }
        
        #score-hud { position: absolute; top: 80px; width: 100%; padding: 0 20px; display: flex; justify-content: space-between; z-index: 20; pointer-events: none; }
        .score-box { background: rgba(0,0,0,0.6); border: 1px solid #00f2fe; border-radius: 15px; padding: 8px 20px; text-align: center; pointer-events: auto;}
        .score-box h3 { font-family: 'Orbitron'; font-size: 11px; color: #00f2fe; }
        .score-box p { font-size: 20px; font-weight: bold; color: #fff; margin:0; font-family: 'Orbitron';}
        .lives { font-size: 12px; color: #ff4d85; letter-spacing: 2px;}

        #level-title-hud { font-family: 'Orbitron'; font-size: 22px; color: #fff; text-shadow: 0 0 10px #ff007f; margin-top: 15px; z-index: 20; letter-spacing: 2px;}

        /* Level 1: THE SPARK */
        #spark-area { display: none; flex-direction: column; align-items: center; z-index: 10; }
        #spark-meter-bg { width: 250px; height: 25px; background: rgba(255,255,255,0.1); border: 2px solid #00f2fe; border-radius: 12px; margin-bottom: 40px; }
        #spark-meter-fill { width: 0%; height: 100%; background: #00f2fe; transition: width 0.1s;}
        .giant-heart { font-size: 120px; cursor: pointer; filter: drop-shadow(0 0 20px #ff007f); transition: 0.1s;}
        .giant-heart:active { transform: scale(0.8); }

        /* Level 2: Scramble */
        #scramble-area { display: none; z-index: 10; flex-direction: column; align-items: center; gap: 20px; width: 90%; max-width: 400px;}
        #scramble-word { font-family: 'Orbitron'; font-size: 35px; color: #fff; text-shadow: 0 0 15px #00f2fe; letter-spacing: 10px;}

        /* Level 3: TTT */
        .grid-game { display: grid; gap: 12px; z-index: 10; margin-top: 30px; }
        .ttt-cell { width: 90px; height: 90px; background: rgba(255,0,127,0.05); border: 2px solid rgba(255,0,127,0.6); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 50px; font-family: 'Orbitron'; cursor: pointer;}
        
        #sudden-death-area { display: none; z-index: 10; border: 2px solid #ffeb3b; width: 90%; height: 60%; position: absolute; border-radius: 25px; pointer-events: none;}
        .golden-heart { position: absolute; font-size: 60px; cursor: pointer; filter: drop-shadow(0 0 20px #ffeb3b); pointer-events: auto;}

        /* Level 4: Popper */
        #popper-area { display: none; position: absolute; top: 150px; left: 15px; right: 15px; bottom: 20px; z-index: 10; border: 2px dashed #00f2fe; border-radius: 25px; }
        .pop-target { position: absolute; font-size: 50px; cursor: pointer; }

        /* Level 6: Catch Kisses */
        #catcher-area { display: none; position: absolute; width: 100%; height: 100%; top:0; left:0; z-index: 10; overflow: hidden; pointer-events: none;}
        .falling-item { position: absolute; font-size: 40px; animation: fallDown 3.5s linear forwards; pointer-events: auto; cursor: pointer;}
        @keyframes fallDown { 0% { top: -50px; } 100% { top: 110vh; } }

        /* Level 7: Love Alignment */
        #align-area { display: none; flex-direction: column; align-items: center; z-index: 10; width: 90%; max-width: 400px; margin-top: 50px;}
        #align-track { width: 100%; height: 40px; border: 2px solid #00f2fe; border-radius: 20px; position: relative; overflow: hidden; background: rgba(255,255,255,0.1); }
        #align-center { position: absolute; width: 60px; height: 100%; left: 50%; transform: translateX(-50%); background: rgba(0, 242, 254, 0.3); border-left: 2px dashed #00f2fe; border-right: 2px dashed #00f2fe; }
        #align-heart { position: absolute; font-size: 30px; top: 2px; left: 0%; transform: translateX(-50%); filter: drop-shadow(0 0 10px #ff007f); }

        /* Overlays & Fail States */
        #overlay { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5,0,10,0.95); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 25px;}
        #ov-title { font-family: 'Orbitron'; font-size: 40px; color: #ff4d85; margin-bottom: 20px; text-shadow: 0 0 20px #ff4d85;}
        #ov-quote { font-size: 24px; color: #00f2fe; font-family: 'Dancing Script', cursive; margin-bottom: 30px; line-height: 1.5;}

        /* FINALE SCREEN (CONCENTRIC HEARTS) */
        #final-screen { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 4000; overflow: hidden; flex-direction: column; align-items: center; justify-content: center; }
        .concentric-heart { position: absolute; width: 50px; height: 50px; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); animation: pulseOut 4s infinite cubic-bezier(0.2, 0.8, 0.4, 1); opacity: 0; }
        .concentric-heart svg { width: 100%; height: 100%; overflow: visible; }
        @keyframes pulseOut { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; stroke-width: 3px;} 100% { transform: translate(-50%, -50%) scale(30); opacity: 0; stroke-width: 0.1px;} }
        
        #final-text { font-family: 'Dancing Script', cursive; font-size: 60px; z-index: 4100; opacity: 0; animation: fadeInText 3s 1s forwards; text-align: center; color: #fff; text-shadow: 0 0 20px #ff0055;}
        .final-names { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 30px; letter-spacing: 2px; text-transform: uppercase; color: #00f2fe;}
        @keyframes fadeInText { to { opacity: 1; transform: scale(1.05); } }
    </style>
</head>
<body class="theme-0">

    <div id="toast-container"></div>

    <div id="top-nav">
        <div style="display: flex; gap: 15px;">
            <div class="glass-btn" id="btnHome">🏠</div>
            <div class="glass-btn" id="btnRestart" style="display:none; color: #ffeb3b; border-color: #ffeb3b;">🔄</div>
        </div>
        <div style="display: flex; gap: 15px;">
            <div class="glass-btn" id="btnMic">🎤</div>
            <div class="glass-btn" id="btnChat">💬</div>
        </div>
    </div>

    <div id="emoji-bar" style="display: none;">
        <button class="emoji-btn" onclick="sendEmoji('❤️')">❤️</button>
        <button class="emoji-btn" onclick="sendEmoji('😍')">😍</button>
        <button class="emoji-btn" onclick="sendEmoji('😂')">😂</button>
        <button class="emoji-btn" onclick="sendEmoji('🥺')">🥺</button>
    </div>

    <div id="chat-panel">
        <div id="chat-msgs"></div>
        <div id="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type a message...">
            <button id="btnSendChat" class="btn-primary">➤</button>
        </div>
    </div>

    <div id="home-screen" class="screen active">
        <h1>Love Hub</h1>
        <div class="subtitle">THE ETERNAL JOURNEY</div>
        <div class="card">
            <input type="text" id="playerName" placeholder="Your Name" required>
            <button id="btnCreate" class="btn-primary">Start New Journey</button>
            <div style="margin: 20px 0; color: #00f2fe; font-size: 14px;">OR</div>

    <div id="lobby-screen" class="screen">
        <h2 style="color: #00f2fe; margin-bottom: 15px;">Waiting for Partner...</h2>
        <div class="card">
            <h1 id="displayCode" style="font-size: 55px; color: #fff; margin: 15px 0;">XXXXX</h1>
            <button id="btnShare" class="btn-success">Invite via WhatsApp</button>
            <button id="btnCopy" class="btn-secondary" style="margin-top:10px;">Copy Link</button>

    <div id="game-area">
        <h2 id="level-title-hud">LEVEL 1</h2>
        <div id="score-hud">
            <div class="score-box">
                <h3 id="name1">P1</h3><p id="score1">0</p>
                <div class="lives" id="lives1">❤️❤️❤️❤️</div>
                <button class="btn-share-life" id="btnShare1">Share Life 🎁</button>
            </div>
            <div class="score-box">
                <h3 id="name2">P2</h3><p id="score2">0</p>
                <div class="lives" id="lives2">❤️❤️❤️❤️</div>
                <button class="btn-share-life" id="btnShare2">Share Life 🎁</button>
            </div>
        </div>
        
        <div id="spark-area">
            <div id="spark-meter-bg"><div id="spark-meter-fill"></div></div>
            <div class="giant-heart" id="sparkBtn">💖</div>
            <div style="font-size: 14px; color: #ffb3c6; margin-top: 20px; font-weight: bold;">TAP FAST TOGETHER!</div>
        </div>

        <div id="scramble-area">
            <div id="scramble-progress" style="color:#00f2fe; font-weight:bold;">Word 1 of 5</div>
            <div id="scramble-word"></div>
            <input type="text" id="scramble-input" placeholder="Type the true word..." style="text-transform:uppercase;">
            <button id="btnScramble" class="btn-primary">Guess</button>
        </div>

        <div id="ttt-board" class="grid-game" style="grid-template-columns: repeat(3, 1fr);"></div>
        <div id="sudden-death-area"></div>
        
        <div id="popper-area"></div>
        
        <canvas id="game-canvas"></canvas>
        
        <div id="catcher-area"></div>

        <div id="align-area">
            <div id="align-track">
                <div id="align-center"></div>
                <div id="align-heart">❤️</div>
            </div>
            <button id="btnAlign" class="btn-primary" style="margin-top: 40px; padding: 20px; border-radius: 30px;">LOCK TARGET 🔒</button>
        </div>
    </div>

    <div id="overlay">
        <h1 id="ov-title">LEVEL 1</h1>
        <div id="ov-quote" class="quote"></div>
        <button id="ov-btn" class="btn-primary" style="display:none; width: 250px; margin-top: 20px;">Continue</button>
    </div>

    <div id="final-screen">
        <div id="final-text">Our Love is Eternal<br><br><span id="finalNames" class="final-names"></span></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc, collection, addDoc, query, orderBy, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyCZmqyLmyWesuoj6djTbyfrOJ1v7_FCWcQ",
            authDomain: "game-bf78a.firebaseapp.com",
            projectId: "game-bf78a",
            storageBucket: "game-bf78a.firebasestorage.app",
            messagingSenderId: "860717231489",
            appId: "1:860717231489:web:f53331a96570be04cacc80"
        };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        // AUDIO
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            let osc = audioCtx.createOscillator(); let g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            
            if(type === 'click') { osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1); g.gain.setValueAtTime(0.3, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); } 
            else if(type === 'match') { osc.type = 'triangle'; osc.frequency.setValueAtTime(500, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(1000, audioCtx.currentTime + 0.3); g.gain.setValueAtTime(0.3, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); osc.start(); osc.stop(audioCtx.currentTime + 0.3); } 
            else if(type === 'levelUp') { osc.type = 'square'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2); g.gain.setValueAtTime(0.2, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.6); osc.start(); osc.stop(audioCtx.currentTime + 0.6); } 
            else if(type === 'bad') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); g.gain.setValueAtTime(0.4, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4); osc.start(); osc.stop(audioCtx.currentTime + 0.4); }
        }

        let gameId = "", playerNum = 0, myName = "", docRef = null, messagesRef = null;
        let gState = { level: 1 };
        const quotes = [
            "“Love is a spark that ignites the soul.”", 
            "“Communication is the bridge between two hearts.”", 
            "“Every battle brings us closer.”", 
            "“Protect your heart from the broken pieces.”", 
            "“Navigate the cosmos of love together.”", 
            "“Catch every moment, hold every memory.”",
            "“Perfect alignment makes love eternal.”"
        ];
        const failQuotes = ["“Every setback is a setup for a stronger bond. Try again!”", "“True love never gives up.”", "“Don't worry, we got this together!”"];
        const allWords = ["FOREVER","SOULMATE","ETERNAL","ROMANCE","PASSION","DEVOTION","AFFECTION","DARLING","TREASURE","BELOVED","CHERISH","SWEETHEART","DESTINY","PROMISE","JOURNEY","KISSES","CUDDLE","TOGETHER","ALWAYS","INFINITE","ADORABLE","PRECIOUS","ENDLESS","MAGIC","GORGEOUS"];

        // UI UTILS
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); if(document.getElementById(id)) document.getElementById(id).classList.add('active'); }
        function showOverlay(title, quote, showBtn=false, btnAction=null, delay=4000) {
            document.getElementById('ov-title').innerText = title; document.getElementById('ov-quote').innerText = quote;
            let btn = document.getElementById('ov-btn');
            if(showBtn) { btn.style.display='block'; btn.onclick=()=>{ document.getElementById('overlay').style.display='none'; if(btnAction) btnAction(); }; }
            else { btn.style.display='none'; setTimeout(()=>document.getElementById('overlay').style.display='none', delay); }
            document.getElementById('overlay').style.display = 'flex';
        }
        function showToast(msg) {
            let tc = document.getElementById('toast-container'); let t = document.createElement('div');
            t.className = 'live-toast'; t.innerText = msg; tc.appendChild(t); setTimeout(()=>t.remove(), 3000);
        }

        document.getElementById('btnHome').onclick = () => { window.location.reload(); };

        // HOST RESTART
        async function performRestart() {
            document.getElementById('final-screen').style.display = 'none';
            let wl = [...allWords].sort(()=>Math.random()-0.5).slice(0,5);
            await updateDoc(docRef, { 
                level: 1, p1Score: 0, p2Score: 0, p1Lives: 4, p2Lives: 4,
                sparkClicks: 0, scramble: { wordList: wl, wordIdx: 0, jumbled: wl[0].split('').sort(()=>Math.random()-0.5).join(' '), solved: false },
                tttBoard: ['','','','','','','','',''], tttTurn: 'X', popHeart: null, sdTarget: null, canvasProg: 0, canvasObj: null, catchObj: null, align: {x: 0, dir: 1}
            });
        }
        document.getElementById('btnRestart').onclick = async () => { if(confirm("Restart entire journey?")) performRestart(); };

        // LEVEL FAIL LOGIC
        async function handleLevelFail() {
            playSound('bad');
            let lk = playerNum===1 ? 'p1Lives' : 'p2Lives';
            let nl = gState[lk] - 1;
            
            if(nl <= 0) {
                showOverlay("OUT OF LIVES!", "Ask your partner to share a life with you!", false, null, 5000);
                await updateDoc(docRef, { [lk]: 0 });
            } else {
                showOverlay("LEVEL FAILED", failQuotes[Math.floor(Math.random()*failQuotes.length)], true, async () => {
                    if(playerNum===1) {
                        let u = { [lk]: nl };
                        if(gState.level===1) u.sparkClicks=0; 
                        if(gState.level===2) { let wl = [...allWords].sort(()=>Math.random()-0.5).slice(0,5); u.scramble = { wordList: wl, wordIdx: 0, jumbled: wl[0].split('').sort(()=>Math.random()-0.5).join(' '), solved: false }; }
                        if(gState.level===3) { u.tttBoard=['','','','','','','','','']; u.tttTurn='X'; }

        async function handleTTTClick(i) {

            playSound('click'); let nb = [...gState.tttBoard]; nb[i] = mySym;

            if(win) { playSound('match'); let sc = playerNum===1?'p1Score':'p2Score'; await updateDoc(docRef, { tttBoard: nb, [sc]: gState[sc]+50, level: 4 }); }

        // --- LEVEL 5: COSMIC DODGE (SLOWER & CLEARER) ---
        let c = document.getElementById('game-canvas'); let ctx = c.getContext('2d');
        function res() { c.width = window.innerWidth; c.height = window.innerHeight; } window.addEventListener('resize', res); res();
        
        let tX = 0; 
        c.addEventListener('touchstart', e => tX = e.changedTouches[0].screenX);
        c.addEventListener('touchmove', async e => {
            if(gState.level !== 5 || playerNum === 0 || (playerNum===1?gState.p1Lives:gState.p2Lives)<=0) return;
            let nx = e.changedTouches[0].screenX; let pct = (nx / c.width) * 100;
            let lk = playerNum===1 ? 'cP1X' : 'cP2X'; await updateDoc(docRef, { [lk]: Math.max(10, Math.min(90, pct)) });
        });

        let canInt = null;
        function hostCanvas() {
            if(canInt) return;
            canInt = setInterval(async () => {
                if(gState.level !== 5) return;
                let p = gState.canvasProg + 1.5; // Slower progress
                if(p >= 100) { clearInterval(canInt); updateDoc(docRef, { level: 6 }); } 
                else {
                    let u = { canvasProg: p };
                    if(!gState.canvasObj && Math.random()>0.3) u.canvasObj = { x: Math.random()*80+10, y: -10, type: Math.random()>0.6?'heart':'rock', id: Date.now() };
                    await updateDoc(docRef, u);
                }
            }, 800);
        }

        let p1X_smooth = 50, p2X_smooth = 50, objY = -10;
        function startCanvasEngine() {
            let stars = []; for(let i=0; i<30; i++) stars.push({x:Math.random()*c.width, y:Math.random()*c.height, s:Math.random()*3+1});
            
            function render() {
                if(gState.level !== 5 || (playerNum===1?gState.p1Lives:gState.p2Lives)<=0) return;
                
                ctx.fillStyle = "rgba(0,10,30,0.5)"; ctx.fillRect(0,0,c.width,c.height);
                ctx.fillStyle = "#fff"; stars.forEach(st => { st.y += st.s * 1.5; if(st.y > c.height) st.y = -10; ctx.beginPath(); ctx.arc(st.x, st.y, st.s, 0, Math.PI*2); ctx.fill(); });

                p1X_smooth += (gState.cP1X - p1X_smooth) * 0.2; p2X_smooth += (gState.cP2X - p2X_smooth) * 0.2;
                let px1 = (p1X_smooth/100) * c.width; let px2 = (p2X_smooth/100) * c.width; let py = c.height - 120;

                ctx.shadowBlur = 20; ctx.shadowColor = "#00f2fe"; ctx.fillStyle = "#00f2fe"; ctx.beginPath(); ctx.arc(px1, py, 30, 0, Math.PI*2); ctx.fill();
                ctx.shadowColor = "#ff007f"; ctx.fillStyle = "#ff007f"; ctx.beginPath(); ctx.arc(px2, py, 30, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;

                if(gState.canvasObj) {
                    objY += 4; // REDUCED SPEED
                    let ox = (gState.canvasObj.x/100) * c.width;
                    ctx.font = "70px Arial"; // BIGGER EMOJIS
                    ctx.fillText(gState.canvasObj.type==='heart'?'❤️‍🩹':'🧨', ox-35, objY);

                    if(playerNum === 1 && objY > py - 40 && objY < py + 40) {
                        let hitP1 = Math.abs(ox - px1) < 50; let hitP2 = Math.abs(ox - px2) < 50;
                        if(hitP1 || hitP2) {
                            if(gState.canvasObj.type === 'heart') { playSound('match'); updateDoc(docRef, { p1Score: gState.p1Score+20, p2Score: gState.p2Score+20, canvasObj: null }); }
                            else { handleLevelFail(); updateDoc(docRef, {canvasObj: null}); }
                        }
                    }
                    if(objY > c.height) { if(playerNum===1) updateDoc(docRef, { canvasObj: null }); objY = -10; }
                } else { objY = -10; }

                requestAnimationFrame(render);
            }
            render();
        }

        // --- WEBRTC VOICE ---
        let localStream, peerConn, isMuted = false;
        document.getElementById('btnMic').onclick = async () => {
            if(!localStream) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    peerConn = new RTCPeerConnection({ iceServers: [{ urls: ['stun:stun1.l.google.com:19302'] }] });
                    localStream.getTracks().forEach(t => peerConn.addTrack(t, localStream));
                    peerConn.ontrack = (e) => { let audio = new Audio(); audio.srcObject = e.streams[0]; audio.play(); };
                    
                    const callDoc = doc(db, "calls", gameId); const offerC = collection(callDoc, "offerC"); const answerC = collection(callDoc, "answerC");
                    peerConn.onicecandidate = e => { e.candidate && addDoc(playerNum===1 ? offerC : answerC, e.candidate.toJSON()); };

                    if(playerNum === 1) {
                        let offer = await peerConn.createOffer(); await peerConn.setLocalDescription(offer); await setDoc(callDoc, { offer: { type: offer.type, sdp: offer.sdp }});
                        onSnapshot(callDoc, (snap) => { let data = snap.data(); if(data?.answer && !peerConn.currentRemoteDescription) peerConn.setRemoteDescription(new RTCSessionDescription(data.answer)); });
                        onSnapshot(answerC, snap => snap.docChanges().forEach(c => { if(c.type === 'added') peerConn.addIceCandidate(new RTCIceCandidate(c.doc.data())); }));
                    } else {
                        onSnapshot(callDoc, async (snap) => { let data = snap.data(); if(data?.offer && !peerConn.currentRemoteDescription) { await peerConn.setRemoteDescription(new RTCSessionDescription(data.offer)); let ans = await peerConn.createAnswer(); await peerConn.setLocalDescription(ans); await updateDoc(callDoc, { answer: { type: ans.type, sdp: ans.sdp }}); } });
                        onSnapshot(offerC, snap => snap.docChanges().forEach(c => { if(c.type === 'added') peerConn.addIceCandidate(new RTCIceCandidate(c.doc.data())); }));
                    }
                    showToast("Mic Connected!");
                } catch(e) { alert("Mic permission denied!"); return; }
            }
            isMuted = !isMuted; localStream.getAudioTracks()[0].enabled = !isMuted;
            document.getElementById('btnMic').classList.toggle('muted'); document.getElementById('btnMic').innerText = isMuted ? '🔇' : '🎤';
        };

        // --- EPIC FINALE (CONCENTRIC HEARTS) ---
        async function triggerFinale() {
            playSound('levelUp');
            document.getElementById('game-area').style.display = 'none'; document.getElementById('top-nav').style.display = 'none'; document.getElementById('emoji-bar').style.display = 'none';
            let fScreen = document.getElementById('final-screen'); fScreen.style.display = 'flex';
            
            for(let i=0; i<15; i++) {
                let h = document.createElement('div'); h.className = 'concentric-heart';
                h.innerHTML = `<svg viewBox="0 0 32 29.6"><path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,16,21.2,16,21.2s16-11.8,16-21.2C32,3.8,28.2,0,23.6,0z" fill="none" stroke="#ff007f" stroke-width="2"/></svg>`;
                h.style.animationDelay = (i * 0.3) + 's'; fScreen.appendChild(h);
            }
            
            if(playerNum === 1) { let msgs = await getDocs(messagesRef); msgs.forEach(m => deleteDoc(m.ref)); } // Cleanup Chat
        }
    </script>
</body>
</html>
