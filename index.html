<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Together We Run 💖</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');
        
        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden;
            touch-action: none; /* Prevents zooming on mobile */
        }
        .screen { display: none; text-align: center; width: 95%; max-width: 400px; }
        .active { display: flex; flex-direction: column; align-items: center; }
        
        h2 { margin: 10px 0; color: #f1c40f; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        input, button {
            width: 90%; padding: 15px; margin: 10px 0; border-radius: 30px; border: none; outline: none; font-size: 16px; font-family: 'Poppins', sans-serif;
        }
        input { text-align: center; color: #333; font-weight: bold; }
        button { background: #e74c3c; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4); transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        
        /* Game Area UI */
        #game-container { position: relative; width: 320px; height: 480px; }
        canvas {
            background: #2ecc71; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 4px solid #fff;
        }
        
        /* Instructions Overlay */
        #instruction-banner {
            position: absolute; top: 10px; left: 10px; right: 10px; background: rgba(0, 0, 0, 0.7);
            color: #fff; padding: 10px; border-radius: 10px; font-weight: bold; font-size: 14px; text-align: center;
            border: 2px solid #f1c40f; z-index: 10; animation: pulse 1s infinite alternate;
        }

        /* Controls */
        .controls { display: flex; justify-content: space-between; width: 320px; margin-top: 15px; }
        .ctrl-btn { width: 30%; background: #3498db; font-size: 20px; padding: 15px 0; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.5); }

        /* Final Heart Animation */
        #final-screen { position: relative; height: 100vh; width: 100vw; display: none; justify-content: center; align-items: center; flex-direction: column; background: #1a1a1a; }
        .heart {
            color: #ff4757; font-size: 60px; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0); opacity: 0;
            animation: zoomOutHeart 3s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .true-love-text {
            font-size: 40px; font-weight: bold; color: #ff4757; margin-top: 150px; opacity: 0;
            animation: fadeIn 2s 2s forwards; text-shadow: 0 0 20px #ff4757;
        }
        .names-text {
            font-size: 28px; color: #fff; margin-top: 10px; opacity: 0; font-weight: bold;
            animation: fadeIn 2s 3s forwards; text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        @keyframes zoomOutHeart {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(4); opacity: 1; }
        }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
    </style>
</head>
<body>

    <!-- SCREEN 1: Name Entry -->
    <div id="login-screen" class="screen active">
        <h2>Run Together 👦❤️👧</h2>
        <p>Enter your name to start the journey</p>
        <select id="playerGender" style="width: 90%; padding: 15px; border-radius: 30px; margin-bottom: 10px; font-family: 'Poppins';">
            <option value="boy">I am the Boy 👦</option>
            <option value="girl">I am the Girl 👧</option>
        </select>
        <input type="text" id="playerName" placeholder="Your Name" required>
        <button onclick="joinOrCreateGame()">Start Game</button>
    </div>

    <!-- SCREEN 2: Lobby -->
    <div id="lobby-screen" class="screen">
        <h2>Waiting for Partner ⏳</h2>
        <div style="background: rgba(0,0,0,0.5); padding: 20px; border-radius: 15px; width: 100%;">
            <p>Share this link with your partner:</p>
            <button onclick="shareWhatsApp()" style="background: #25D366;">Invite via WhatsApp 💬</button>
        </div>
    </div>

    <!-- SCREEN 3: Game Area -->
    <div id="game-screen" class="screen">
        <h3 id="level-text" style="margin: 5px;">Level 1 / 5</h3>
        <div id="game-container">
            <div id="instruction-banner">Waiting to meet...</div>
            <canvas id="gameCanvas" width="320" height="400"></canvas>
        </div>
        <div class="controls">
            <button class="ctrl-btn" onclick="moveLeft()">⬅️ Left</button>
            <button class="ctrl-btn" onclick="jump()">⬆️ Jump</button>
            <button class="ctrl-btn" onclick="moveRight()">Right ➡️</button>
        </div>
    </div>

    <!-- SCREEN 4: Paused -->
    <div id="pause-screen" class="screen">
        <h2>Game Paused ⏸️</h2>
        <p>Your partner is away or minimized the app.</p>
        <p>Hold on till they come back...</p>
    </div>

    <!-- SCREEN 5: Final -->
    <div id="final-screen" class="screen">
        <div class="heart">❤️</div>
        <div class="true-love-text">TRUE LOVE</div>
        <div class="names-text" id="final-names">Boy & Girl</div>
    </div>

    <script>
        // ==========================================
        // 1. FIREBASE CONFIGURATION (PASTE YOURS HERE)
        // ==========================================
        // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyCZmqyLmyWesuoj6djTbyfrOJ1v7_FCWcQ",
  authDomain: "game-bf78a.firebaseapp.com",
  projectId: "game-bf78a",
  storageBucket: "game-bf78a.firebasestorage.app",
  messagingSenderId: "860717231489",
  appId: "1:860717231489:web:f53331a96570be04cacc80"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);

        // ==========================================
        // 2. GAME VARIABLES
        // ==========================================
        let gameId = new URLSearchParams(window.location.search).get("game");
        let playerNum = 0; // 1 = Host, 2 = Joiner
        let myName = "", myGender = "";
        let p1Data = {}, p2Data = {};
        let gameRef = null;
        
        // Canvas Setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const lanes = [60, 160, 260]; // X positions for 3 lanes
        
        let gameState = {
            status: 'waiting',
            level: 1,
            progress: 0, // Out of 100 per level
            sharedLane: 1, // 0 = Left, 1 = Center, 2 = Right
            isJumping: false,
            obstacle: null // { type: '🐍', lane: 1, y: 0, speed: 3, id: 1 }
        };

        const obstacleTypes = [
            { emoji: '🐍', name: 'Snake', msg: 'A Snake! Move to another lane!', type: 'dodge' },
            { emoji: '👹', name: 'Monster', msg: 'Monster ahead! Dodge it!', type: 'dodge' },
            { emoji: '👮', name: 'Police', msg: 'Police checking! Escape sideways!', type: 'dodge' },
            { emoji: '🌳', name: 'Roots', msg: 'Tree Roots! JUMP over them!', type: 'jump' }
        ];

        let localObstacleY = -50;
        let animationFrameId;
        let roadOffset = 0;

        // ==========================================
        // 3. UI & LOBBY LOGIC
        // ==========================================
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active');
                s.style.display = 'none';
            });
            let el = document.getElementById(screenId);
            el.classList.add('active');
            if(screenId === 'final-screen') el.style.display = 'flex';
            else el.style.display = 'flex';
        }

        function joinOrCreateGame() {
            myName = document.getElementById('playerName').value.trim();
            myGender = document.getElementById('playerGender').value;
            if(!myName) return alert("Please enter your name!");

            if (gameId) {
                // Joiner
                playerNum = 2;
                gameRef = db.ref('games/' + gameId);
                gameRef.update({ 
                    p2Name: myName, p2Gender: myGender, p2Active: true, status: 'playing' 
                });
            } else {
                // Host
                playerNum = 1;
                gameId = Math.random().toString(36).substring(2, 9);
                gameRef = db.ref('games/' + gameId);
                gameRef.set({
                    p1Name: myName, p1Gender: myGender, p1Active: true, 
                    p2Name: "", p2Gender: "", p2Active: false,
                    state: gameState
                });
                const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?game=' + gameId;
                window.history.pushState({path:newUrl}, '', newUrl);
            }
            setupListeners();
        }

        function shareWhatsApp() {
            const text = `Hey! Join me in this game! Let's hold hands and run together: ${window.location.href}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
        }

        // ==========================================
        // 4. FIREBASE SYNC & MULTIPLAYER LOGIC
        // ==========================================
        function setupListeners() {
            if(playerNum === 1) switchScreen('lobby-screen');

            gameRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if(!data) return;

                p1Data = { name: data.p1Name, gender: data.p1Gender };
                p2Data = { name: data.p2Name, gender: data.p2Gender };

                if(data.status === 'paused' && data.state.level <= 5) {
                    switchScreen('pause-screen');
                    cancelAnimationFrame(animationFrameId);
                    return;
                }

                if(data.status === 'finished') {
                    switchScreen('final-screen');
                    document.getElementById('final-names').innerText = `${p1Data.name} & ${p2Data.name}`;
                    cancelAnimationFrame(animationFrameId);
                    return;
                }

                if(data.status === 'playing' && data.state) {
                    if(document.getElementById('game-screen').style.display === 'none' || document.getElementById('game-screen').classList.contains('active') == false) {
                        switchScreen('game-screen');
                        startGameLoop();
                        if(playerNum === 1) hostObstacleSpawner(); // Host manages obstacles
                    }
                    
                    // Sync state
                    let prevState = gameState;
                    gameState = data.state;
                    document.getElementById('level-text').innerText = `Level ${gameState.level} / 5`;
                    
                    // Instruction update
                    let banner = document.getElementById('instruction-banner');
                    if(gameState.progress === 0 && gameState.level === 1) {
                        banner.innerText = "Meeting in the center... Hold Hands!";
                    } else if (gameState.obstacle) {
                        banner.innerText = gameState.obstacle.msg;
                        // If new obstacle came, reset local Y
                        if(!prevState.obstacle || prevState.obstacle.id !== gameState.obstacle.id) {
                            localObstacleY = -50;
                        }
                    } else {
                        banner.innerText = "Running safely... Get ready!";
                    }
                }
            });

            // Disconnect/Pause rules
            gameRef.child(`p${playerNum}Active`).onDisconnect().set(false);
            gameRef.child('status').onDisconnect().set('paused');
            
            document.addEventListener("visibilitychange", () => {
                if (document.visibilityState === "hidden") {
                    gameRef.update({ status: 'paused', [`p${playerNum}Active`]: false });
                } else {
                    gameRef.update({ [`p${playerNum}Active`]: true });
                    gameRef.once('value').then(snap => {
                        if(snap.val().p1Active && snap.val().p2Active) {
                            gameRef.update({ status: 'playing' });
                        }
                    });
                }
            });
        }

        // ==========================================
        // 5. CONTROLS (Shared via DB)
        // ==========================================
        function moveLeft() {
            if(gameState.sharedLane > 0) {
                gameRef.child('state').update({ sharedLane: gameState.sharedLane - 1 });
            }
        }
        function moveRight() {
            if(gameState.sharedLane < 2) {
                gameRef.child('state').update({ sharedLane: gameState.sharedLane + 1 });
            }
        }
        function jump() {
            if(!gameState.isJumping) {
                gameRef.child('state').update({ isJumping: true });
                setTimeout(() => {
                    gameRef.child('state').update({ isJumping: false });
                }, 1000); // 1 second jump duration
            }
        }

        // ==========================================
        // 6. HOST LOGIC (Spawning & Leveling up)
        // ==========================================
        function hostObstacleSpawner() {
            setInterval(() => {
                gameRef.once('value').then(snap => {
                    let st = snap.val().state;
                    if(snap.val().status !== 'playing') return;

                    // Level Up Check
                    if(st.progress >= 100) {
                        if(st.level < 5) {
                            gameRef.child('state').update({ level: st.level + 1, progress: 0, obstacle: null });
                        } else {
                            gameRef.update({ status: 'finished' });
                        }
                        return;
                    }

                    // Spawn Obstacle if none exists
                    if(!st.obstacle) {
                        let randType = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
                        let randLane = Math.floor(Math.random() * 3);
                        let speed = 3 + (st.level * 0.5); // Gets faster each level

                        gameRef.child('state').update({
                            obstacle: {
                                emoji: randType.emoji, msg: randType.msg, type: randType.type,
                                lane: randLane, speed: speed, id: Date.now()
                            }
                        });
                    }
                });
            }, 2000);
        }

        // ==========================================
        // 7. GAME RENDERER (Canvas)
        // ==========================================
        function startGameLoop() {
            function update() {
                if(document.getElementById('game-screen').classList.contains('active')) {
                    drawGame();
                    
                    // Local Obstacle Logic
                    if(gameState.obstacle) {
                        localObstacleY += gameState.obstacle.speed;

                        // Collision Detection
                        let playerY = 320;
                        if(localObstacleY > playerY - 30 && localObstacleY < playerY + 30) {
                            let inSameLane = (gameState.sharedLane === gameState.obstacle.lane);
                            let isHit = false;

                            if(gameState.obstacle.type === 'dodge' && inSameLane && !gameState.isJumping) isHit = true;
                            if(gameState.obstacle.type === 'jump' && inSameLane && !gameState.isJumping) isHit = true;

                            if(isHit) {
                                // Flashing Red effect
                                ctx.fillStyle = "rgba(255, 0, 0, 0.5)";
                                ctx.fillRect(0, 0, canvas.width, canvas.height);
                            }
                        }

                        // Obstacle Passed
                        if(localObstacleY > canvas.height) {
                            if(playerNum === 1) { // Host gives points
                                gameRef.child('state').update({ obstacle: null, progress: gameState.progress + 20 });
                            }
                            localObstacleY = -50;
                        }
                    }
                }
                animationFrameId = requestAnimationFrame(update);
            }
            update();
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Road & Lanes
            roadOffset += 2 + (gameState.level * 0.5); // Scrolling speed
            if(roadOffset > 40) roadOffset = 0;

            ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
            ctx.lineWidth = 4;
            ctx.setLineDash([20, 20]);
            
            // Draw lane dividers
            ctx.beginPath(); ctx.moveTo(106, -40 + roadOffset); ctx.lineTo(106, 400); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(213, -40 + roadOffset); ctx.lineTo(213, 400); ctx.stroke();
            ctx.setLineDash([]);

            // Draw Players (Holding hands side-by-side)
            let playerY = 320;
            let jumpOffset = gameState.isJumping ? -40 : 0;
            let centerX = lanes[gameState.sharedLane];

            ctx.font = "35px Arial";
            ctx.textAlign = "center";
            
            // Get emojis based on gender
            let p1Emoji = p1Data.gender === 'boy' ? '👦' : '👧';
            let p2Emoji = p2Data.gender === 'boy' ? '👦' : '👧';
            
            // Draw Hand holding (Line between them)
            ctx.strokeStyle = "#ff7675"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(centerX - 15, playerY + jumpOffset + 10); ctx.lineTo(centerX + 15, playerY + jumpOffset + 10); ctx.stroke();

            // Draw Characters
            ctx.fillText(p1Emoji, centerX - 20, playerY + jumpOffset);
            ctx.fillText(p2Emoji, centerX + 20, playerY + jumpOffset);

            // Draw Names below them
            ctx.font = "12px Poppins"; ctx.fillStyle = "white";
            ctx.fillText(p1Data.name || "P1", centerX - 25, playerY + jumpOffset + 30);
            ctx.fillText(p2Data.name || "P2", centerX + 25, playerY + jumpOffset + 30);

            // Draw Obstacle
            if(gameState.obstacle) {
                let obsX = lanes[gameState.obstacle.lane];
                ctx.font = "40px Arial";
                ctx.fillText(gameState.obstacle.emoji, obsX, localObstacleY);
            }

            // Draw Progress Bar
            ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(10, 370, 300, 10);
            ctx.fillStyle = "#f1c40f"; ctx.fillRect(10, 370, (gameState.progress / 100) * 300, 10);
        }
    </script>
</body>
</html>
