<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Find You & Run 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@500;700&display=swap');
        
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: #050505; color: white; display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; touch-action: none; }
        
        .screen { display: none; position: absolute; width: 100%; height: 100%; top: 0; left: 0; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a2e, #0f0f1a); z-index: 10; }
        .active { display: flex; }
        
        h1 { font-family: 'Orbitron', sans-serif; font-size: 40px; color: #00f2fe; text-transform: uppercase; text-shadow: 0 0 15px #00f2fe; margin-bottom: 20px; text-align: center;}
        
        .card { background: rgba(0, 0, 0, 0.8); padding: 30px; border-radius: 15px; border: 2px solid #4facfe; width: 90%; max-width: 400px; box-shadow: 0 0 25px rgba(79, 172, 254, 0.5); backdrop-filter: blur(10px); text-align: center; }

        input, select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; font-family: 'Poppins', sans-serif; text-align: center; outline: none; font-weight: bold; }
        input, select { background: #fff; color: #000; }
        
        .btn-primary { background: linear-gradient(90deg, #4facfe, #00f2fe); color: #000; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }
        .btn-whatsapp { background: linear-gradient(90deg, #1D976C, #93F9B9); color: #000; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; box-shadow: 0 0 15px #1D976C; margin-top: 15px; }
        .btn-danger { background: linear-gradient(90deg, #ff416c, #ff4b2b); color: white; margin-top: 20px; }
        
        /* Game Area & HUD */
        #game-screen { background: #000; z-index: 5; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #hud { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 20; pointer-events: none; }
        .life-container { width: 40%; background: rgba(0,0,0,0.7); border: 2px solid #fff; border-radius: 8px; padding: 5px; }
        .life-bar { height: 12px; border-radius: 4px; transition: width 0.3s; }
        #p1-life { background: #00f2fe; box-shadow: 0 0 10px #00f2fe; width: 100%; }
        #p2-life { background: #ff0844; box-shadow: 0 0 10px #ff0844; width: 100%; }
        .name-tag { font-family: 'Orbitron'; font-size: 11px; margin-bottom: 5px; text-transform: uppercase; }

        /* Route Map */
        #route-map { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 20; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; border: 1px solid #4facfe; }
        .map-dot { width: 12px; height: 12px; border-radius: 50%; background: #333; border: 1px solid #fff; }
        .map-dot.active { background: #00f2fe; box-shadow: 0 0 10px #00f2fe; }

        #instruction-banner { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.85); color: #fff; padding: 10px 20px; border-radius: 20px; font-family: 'Poppins'; font-size: 13px; text-align: center; border: 1px solid #fff; z-index: 20; width: 80%; }
        
        /* Overlays */
        #level-overlay { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 50; flex-direction: column; align-items: center; justify-content: center; }
        #level-title { font-family: 'Orbitron'; font-size: 40px; color: #00f2fe; text-shadow: 0 0 20px #00f2fe; margin-bottom: 10px; }
        #level-task { font-size: 18px; color: #fff; text-align: center; width: 80%; }

        #game-over-screen { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 60; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1>Find You</h1>
        <div class="card">
            <input type="text" id="playerName" placeholder="Enter Your Name" required>
            <select id="playerGender">
                <option value="boy">I am the Boy</option>
                <option value="girl">I am the Girl</option>
            </select>
            <button id="btnCreateGame" class="btn-primary">Host Game</button>
            <div style="margin: 15px 0; color: #aaa;">OR</div>
            <input type="text" id="joinCode" placeholder="Enter Room Code" style="text-transform: uppercase;">
            <button id="btnJoinGame" class="btn-primary" style="background: transparent; border: 2px solid #00f2fe; color: #00f2fe;">Join Game</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <h2 style="color: #fff; font-family: 'Orbitron';">Waiting for Partner</h2>
        <div class="card">
            <p style="color: #aaa; margin: 0;">Room Code:</p>
            <h1 id="displayCode" style="font-size: 45px; color: #00f2fe; margin: 10px 0;">XXXXX</h1>
            <button id="btnShare" class="btn-whatsapp">📱 Invite via WhatsApp</button>
        </div>
    </div>

    <div id="level-overlay">
        <div id="level-title">LEVEL 1</div>
        <div id="level-task">Find your partner! Survive your route and meet in the center.</div>
    </div>

    <div id="game-over-screen">
        <h1 style="color: #ff416c; text-shadow: 0 0 20px #ff416c;">GAME OVER</h1>
        <p style="color: #fff; font-size: 18px;">You ran out of life!</p>
        <button id="btnRestart" class="btn-danger" style="width: 200px;">Restart Journey</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="hud">
            <div class="life-container">
                <div class="name-tag" id="name1" style="color:#00f2fe;">P1</div>
                <div class="life-bar" id="p1-life"></div>
            </div>
            <div class="life-container" style="text-align: right;">
                <div class="name-tag" id="name2" style="color:#ff0844;">P2</div>
                <div class="life-bar" id="p2-life" style="float: right;"></div>
            </div>
        </div>
        
        <div id="route-map">
            <div class="map-dot" id="dot1"></div><div class="map-dot" id="dot2"></div>
            <div class="map-dot" id="dot3"></div><div class="map-dot" id="dot4"></div><div class="map-dot" id="dot5"></div>
        </div>

        <div id="instruction-banner">Swipe Left/Right/Up.</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZmqyLmyWesuoj6djTbyfrOJ1v7_FCWcQ",
            authDomain: "game-bf78a.firebaseapp.com",
            projectId: "game-bf78a",
            storageBucket: "game-bf78a.firebasestorage.app",
            messagingSenderId: "860717231489",
            appId: "1:860717231489:web:f53331a96570be04cacc80"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- FULL SCREEN MAGIC ---
        function enterFullScreen() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen().catch(e => {});
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        }

        // --- NATURAL SOUND ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        let bgNoiseNode;

        function startAmbientSound() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            if(bgNoiseNode) return;
            // Create rushing wind/running ambient sound
            const bufferSize = audioCtx.sampleRate * 2; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            
            bgNoiseNode = audioCtx.createBufferSource();
            bgNoiseNode.buffer = buffer; bgNoiseNode.loop = true;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.value = 400; // Muffled wind
            
            const gainNode = audioCtx.createGain(); gainNode.gain.value = 0.5;
            
            bgNoiseNode.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
            bgNoiseNode.start();
        }

        function playSFX(type) {
            const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            if(type === 'jump') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if(type === 'hit') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        // --- GITHUB IMAGE INTEGRATION ---
        const imgBoy = new Image(); imgBoy.src = '103503-removebg-preview.png'; 
        const imgGirl = new Image(); imgGirl.src = '103511-removebg-preview.png'; 
        const imgMonster = new Image(); imgMonster.src = '103516-removebg-preview.png'; 
        const imgJeep = new Image(); imgJeep.src = 'Police-Car-PNG-Photo.png'; 

        // --- GAME STATE ---
        let gameId = "", playerNum = 0, gameDocRef = null;
        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
        let horizonY = 0;
        
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; horizonY = canvas.height * 0.4; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        let gameState = { 
            status: 'waiting', level: 1, progress: 0, p1Name: "", p1Gender: "", p2Name: "", p2Gender: "",
            p1Lane: 0, p2Lane: 2, p1Jump: false, p2Jump: false, p1Life: 100, p2Life: 100, obstacle: null
        };

        const levelData = {
            1: { title: "LEVEL 1: THE SEARCH", task: "You are separated! Dodge obstacles on your route. Meet in the center to advance." },
            2: { title: "LEVEL 2: MONSTER CHASE", task: "You found each other! Now dodge the Monsters together." },
            3: { title: "LEVEL 3: POLICE BARRICADE", task: "Police Jeeps are blocking the road! Jump or change lanes quickly." },
            4: { title: "LEVEL 4: NARROW ESCAPE", task: "Speed increased! Share life if your partner gets hit (Double Tap)." },
            5: { title: "LEVEL 5: TRUE LOVE RUN", task: "Maximum speed! Survive this to win the game." }
        };

        let isLevelTransitioning = false;

        // --- SWIPE CONTROLS ---
        let touchStartX = 0, touchStartY = 0, lastTap = 0;
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY;
            let now = new Date().getTime();
            if (now - lastTap < 300 && gameState.status === 'playing') shareLife();
            lastTap = now;
        });

        document.addEventListener('touchend', async e => {
            if(gameState.status !== 'playing' || isLevelTransitioning) return;
            let dx = e.changedTouches[0].screenX - touchStartX; let dy = e.changedTouches[0].screenY - touchStartY;
            let myLaneKey = playerNum === 1 ? 'p1Lane' : 'p2Lane'; let myJumpKey = playerNum === 1 ? 'p1Jump' : 'p2Jump';

            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
                // In Level 1, P1 is locked to left (0,1), P2 is locked to right (1,2). Cannot cross middle wall until end.
                let minL = gameState.level === 1 && playerNum === 2 ? 1 : 0;
                let maxL = gameState.level === 1 && playerNum === 1 ? 1 : 2;
                
                if (dx > 0 && gameState[myLaneKey] < maxL) await updateDoc(gameDocRef, { [myLaneKey]: gameState[myLaneKey] + 1 });
                else if (dx < 0 && gameState[myLaneKey] > minL) await updateDoc(gameDocRef, { [myLaneKey]: gameState[myLaneKey] - 1 });
            } else if (Math.abs(dy) > Math.abs(dx) && dy < -40) {
                if(!gameState[myJumpKey]) {
                    playSFX('jump'); await updateDoc(gameDocRef, { [myJumpKey]: true });
                    setTimeout(async () => await updateDoc(gameDocRef, { [myJumpKey]: false }), 800);
                }
            }
        });

        async function shareLife() {
            let myLife = playerNum === 1 ? 'p1Life' : 'p2Life';
            let ptLife = playerNum === 1 ? 'p2Life' : 'p1Life';
            if(gameState[myLife] > 20 && gameState[ptLife] < 100) {
                await updateDoc(gameDocRef, { [myLife]: gameState[myLife] - 20, [ptLife]: Math.min(100, gameState[ptLife] + 20) });
            }
        }

        // --- BUTTONS ---
        document.getElementById('btnCreateGame').addEventListener('click', async () => {
            enterFullScreen(); startAmbientSound();
            const name = document.getElementById('playerName').value.trim();
            if(!name) return; playerNum = 1; gameId = Math.random().toString(36).substring(2, 7).toUpperCase();
            gameDocRef = doc(db, "games", gameId);
            await setDoc(gameDocRef, { ...gameState, p1Name: name, p1Gender: document.getElementById('playerGender').value });
            document.getElementById('displayCode').innerText = gameId;
            switchScreen('lobby-screen'); setupListeners();
        });

        document.getElementById('btnJoinGame').addEventListener('click', async () => {
            enterFullScreen(); startAmbientSound();
            const name = document.getElementById('playerName').value.trim();
            gameId = document.getElementById('joinCode').value.trim().toUpperCase();
            if(!name || gameId.length !== 5) return; playerNum = 2;
            gameDocRef = doc(db, "games", gameId);
            const snap = await getDoc(gameDocRef);
            if(snap.exists()) {
                await updateDoc(gameDocRef, { p2Name: name, p2Gender: document.getElementById('playerGender').value, status: 'playing' });
                setupListeners();
            }
        });

        // WHATSAPP INVITE LINK RE-ADDED
        document.getElementById('btnShare').addEventListener('click', () => {
            const url = window.location.origin + window.location.pathname + '?game=' + gameId;
            const text = `I'm waiting for you! Enter Room Code: *${gameId}* or click here to join: ${url}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
        });

        document.getElementById('btnRestart').addEventListener('click', async () => {
            document.getElementById('game-over-screen').style.display = 'none';
            if(playerNum === 1) {
                await updateDoc(gameDocRef, { level: 1, progress: 0, p1Life: 100, p2Life: 100, status: 'playing', obstacle: null, p1Lane: 0, p2Lane: 2 });
            }
        });

        // --- SYNC ENGINE ---
        function setupListeners() {
            onSnapshot(gameDocRef, (docSnap) => {
                if(!docSnap.exists()) return;
                let oldLevel = gameState.level;
                gameState = docSnap.data();

                if(gameState.status === 'playing' && !document.getElementById('game-screen').classList.contains('active')) {
                    switchScreen('game-screen');
                    document.getElementById('name1').innerText = gameState.p1Name; document.getElementById('name2').innerText = gameState.p2Name;
                    startGameLoop(); if(playerNum === 1) hostEngine();
                }

                if(gameState.status === 'playing') {
                    document.getElementById('p1-life').style.width = gameState.p1Life + "%";
                    document.getElementById('p2-life').style.width = gameState.p2Life + "%";
                    
                    // Route Map Update
                    for(let i=1; i<=5; i++) {
                        let dot = document.getElementById('dot'+i);
                        if(i <= gameState.level) dot.classList.add('active'); else dot.classList.remove('active');
                    }

                    // Level Up Detection
                    if(gameState.level > oldLevel && gameState.level <= 5) showLevelOverlay(gameState.level);

                    if(gameState.p1Life <= 0 || gameState.p2Life <= 0) {
                        document.getElementById('game-over-screen').style.display = 'flex';
                    }
                }
            });
        }

        function showLevelOverlay(lvl) {
            isLevelTransitioning = true;
            document.getElementById('level-title').innerText = levelData[lvl].title;
            document.getElementById('level-task').innerText = levelData[lvl].task;
            document.getElementById('level-overlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('level-overlay').style.display = 'none';
                isLevelTransitioning = false;
            }, 3000);
        }

        // --- HOST LOGIC ---
        function hostEngine() {
            setInterval(async () => {
                if(gameState.status !== 'playing' || isLevelTransitioning || gameState.p1Life <= 0 || gameState.p2Life <= 0) return;

                let spd = 1 + (gameState.level * 0.2);
                let newProg = gameState.progress + (10 * spd);

                if(newProg >= 100) {
                    // Level Complete Check
                    if(gameState.level === 1) {
                        // Must meet in center to pass Level 1
                        if(gameState.p1Lane === 1 && gameState.p2Lane === 1) {
                            await updateDoc(gameDocRef, { level: 2, progress: 0, obstacle: null });
                        }
                    } else if (gameState.level < 5) {
                        await updateDoc(gameDocRef, { level: gameState.level + 1, progress: 0, obstacle: null });
                    }
                } else {
                    await updateDoc(gameDocRef, { progress: newProg });
                    
                    // Spawn Obstacles
                    if(!gameState.obstacle) {
                        let type = gameState.level === 2 ? 'monster' : (gameState.level === 3 ? 'jeep' : (Math.random() > 0.5 ? 'monster' : 'jeep'));
                        let targetLane = gameState.level === 1 ? (Math.random() > 0.5 ? 0 : 2) : Math.floor(Math.random() * 3);
                        await updateDoc(gameDocRef, { obstacle: { lane: targetLane, type: type, id: Date.now() } });
                    }
                }
            }, 1000);
        }

        // --- RENDERER (3D Illusion) ---
        function project3D(x, y, z) {
            let scale = 400 / (400 + z);
            return { x: (x * scale) + (canvas.width / 2), y: (y * scale) + horizonY, scale: scale };
        }

        let localObsZ = 2000;
        let roadOffset = 0, tick = 0;

        function drawEntity(img, x, y, size, z, isJump) {
            // Bobbing effect for realistic run feel
            let bobY = isJump ? -100 * (400/(400+z)) : Math.sin(tick * 0.5) * 10 * (400/(400+z)); 
            
            // Draw Shadow
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.beginPath(); ctx.ellipse(x, y + size/2, size*0.4, size*0.1, 0, 0, Math.PI*2); ctx.fill();
            
            // Draw Image
            try { ctx.drawImage(img, x - size/2, y - size/2 + bobY, size, size); } 
            catch(e) { ctx.fillStyle = "gray"; ctx.fillRect(x - size/2, y - size/2 + bobY, size, size); }
        }

        function startGameLoop() {
            if(gameState.level === 1) showLevelOverlay(1); // Show initially

            function render() {
                if(gameState.status !== 'playing' || isLevelTransitioning) {
                    animationFrameId = requestAnimationFrame(render); return;
                }
                tick++;
                
                // Clear & Draw BG
                let grad = ctx.createLinearGradient(0, 0, 0, horizonY);
                grad.addColorStop(0, "#050510"); grad.addColorStop(1, "#2a1b40");
                ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, horizonY);
                
                // Ground
                ctx.fillStyle = "#111"; ctx.fillRect(0, horizonY, canvas.width, canvas.height);

                let speed = 8 + (gameState.level * 2);
                roadOffset = (roadOffset + speed) % 150;

                // 3D Lanes
                ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 2;
                for(let z = 2000; z > 0; z -= 150) {
                    let actualZ = z - roadOffset;
                    let pL = project3D(-300, 100, actualZ); let pR = project3D(300, 100, actualZ);
                    ctx.beginPath(); ctx.moveTo(pL.x, pL.y); ctx.lineTo(pR.x, pR.y); ctx.stroke();
                }

                // Level 1: Draw Center Wall Separator
                if(gameState.level === 1) {
                    ctx.fillStyle = "rgba(0, 242, 254, 0.3)";
                    let wallTop = project3D(0, -100, 2000); let wallBot = project3D(0, 100, 0);
                    ctx.beginPath(); ctx.moveTo(wallTop.x - 5, wallTop.y); ctx.lineTo(wallTop.x + 5, wallTop.y);
                    ctx.lineTo(wallBot.x + 20, wallBot.y); ctx.lineTo(wallBot.x - 20, wallBot.y); ctx.fill();
                }

                // Render Obstacle
                if(gameState.obstacle) {
                    localObsZ -= (speed * 4);
                    let lX = (gameState.obstacle.lane - 1) * 200;
                    let obsPos = project3D(lX, 50, localObsZ);
                    
                    if(localObsZ > 50) {
                        let size = 200 * obsPos.scale;
                        let obsImg = gameState.obstacle.type === 'jeep' ? imgJeep : imgMonster;
                        drawEntity(obsImg, obsPos.x, obsPos.y, size, localObsZ, false);
                    } else if (localObsZ > -50) {
                        // Collision Check
                        let myLane = playerNum === 1 ? gameState.p1Lane : gameState.p2Lane;
                        let isJump = playerNum === 1 ? gameState.p1Jump : gameState.p2Jump;
                        if(myLane === gameState.obstacle.lane && !isJump && playerNum === 1) {
                            playSFX('hit');
                            updateDoc(gameDocRef, { p1Life: gameState.p1Life - 20, p2Life: gameState.p2Life - 20, obstacle: null });
                            localObsZ = 2000;
                        }
                    } else {
                        localObsZ = 2000;
                        if(playerNum === 1) updateDoc(gameDocRef, { obstacle: null });
                    }
                }

                // Render Players
                let p1X = (gameState.p1Lane - 1) * 200; let p2X = (gameState.p2Lane - 1) * 200;
                let p1Pos = project3D(p1X, 50, 150); let p2Pos = project3D(p2X, 50, 150);
                
                // Hide partner slightly in level 1 if not in center
                let p1Alpha = (gameState.level === 1 && playerNum === 2 && gameState.p1Lane !== 1) ? 0.3 : 1;
                let p2Alpha = (gameState.level === 1 && playerNum === 1 && gameState.p2Lane !== 1) ? 0.3 : 1;

                ctx.globalAlpha = p1Alpha;
                drawEntity(gameState.p1Gender === 'boy' ? imgBoy : imgGirl, p1Pos.x, p1Pos.y, 160 * p1Pos.scale, 150, gameState.p1Jump);
                ctx.globalAlpha = p2Alpha;
                drawEntity(gameState.p2Gender === 'boy' ? imgBoy : imgGirl, p2Pos.x, p2Pos.y, 160 * p2Pos.scale, 150, gameState.p2Jump);
                ctx.globalAlpha = 1;

                animationFrameId = requestAnimationFrame(render);
            }
            render();
        }
    </script>
</body>
</html>
