<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Ludo Pro | Nani Creations</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-color: #0f0c29;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --neon-blue: #00f2fe;
            --neon-pink: #fe0979;
            --neon-green: #00ff87;
            --gold: #ffd700;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; }

        body { background: linear-gradient(to right, #0f0c29, #302b63, #24243e); color: white; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }

        .screen { display: none; padding: 15px; flex-direction: column; align-items: center; justify-content: center; flex: 1; }
        .screen.active { display: flex; }

        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; width: 100%; max-width: 400px; text-align: center; }

        button { background: transparent; border: 2px solid var(--neon-blue); color: white; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px 0; width: 100%; transition: 0.3s; }
        button.btn-primary { background: var(--neon-blue); color: black; }
        button.btn-whatsapp { background: #25D366; border-color: #25D366; color: black; width: auto; margin: 0; padding: 5px 10px; font-size: 12px;}
        button.btn-small { width: auto; padding: 5px 10px; font-size: 12px; border-color: var(--neon-pink); }
        
        .top-bar { display: flex; justify-content: space-between; flex-wrap: wrap; margin-bottom: 20px; gap: 10px; }

        /* Video Chat */
        .video-container { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 10px; position: relative; }
        video { width: 48%; border-radius: 8px; border: 2px solid var(--neon-pink); background: #000; aspect-ratio: 4/3; object-fit: cover; }
        .media-controls { display: flex; justify-content: space-around; width: 100%; max-width: 400px; margin-bottom: 10px; }

        /* Emoji Bar */
        .emoji-bar { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 20px; width: 100%; max-width: 400px; margin-bottom: 10px; }
        .emoji-btn { font-size: 24px; cursor: pointer; transition: transform 0.2s; }
        .emoji-btn:active { transform: scale(1.5); }
        .emoji-popup { position: absolute; font-size: 50px; top: 40%; left: 40%; animation: pop 1s ease-out forwards; pointer-events: none; z-index: 100; display: none; }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2) translateY(-50px); opacity: 0; } }

        /* Ludo Board Framework (15x15 Grid) */
        .ludo-board {
            width: 90vw; height: 90vw; max-width: 360px; max-height: 360px;
            background: white; border: 3px solid var(--neon-blue); border-radius: 8px;
            display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr);
            margin-bottom: 15px; position: relative; padding: 2px;
        }

        .cell { border: 1px solid rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; position: relative; }
        .home { border: 2px solid black; }
        .red { background-color: #ff4d4d; } .green { background-color: #4dff4d; }
        .yellow { background-color: #ffff4d; } .blue { background-color: #4d4dff; }
        .center { background-color: #333; grid-area: 7 / 7 / 10 / 10; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 10px; }

        /* Pucks (Tokens) */
        .puck {
            width: 70%; height: 70%; border-radius: 50%; box-shadow: inset 0 0 5px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.8);
            position: absolute; border: 2px solid white; transition: all 0.3s ease; z-index: 10;
        }

        /* Dice Animation */
        .dice-container { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 400px; padding: 10px; }
        .dice { font-size: 45px; text-shadow: 0 0 10px var(--neon-blue); cursor: pointer; display: inline-block; transition: 0.2s; }
        .rolling { animation: roll 0.5s infinite linear; pointer-events: none; }
        @keyframes roll { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.2); } 100% { transform: rotate(360deg) scale(1); } }
    </style>
</head>
<body>

    <div id="login-page" class="screen active">
        <div class="glass-panel">
            <h1 style="color: var(--neon-blue); margin-bottom: 10px;">Neon Ludo♡</h1>
            <button id="btn-login" onclick="login()">Enter Game Studio♡</button>
        </div>
    </div>

    <div id="lobby-page" class="screen">
        <div class="glass-panel top-bar">
            <div>Streak: <span id="ui-streak" class="highlight">0</span></div>
            <div>Coins: <span id="ui-coins" class="highlight">0</span></div>
        </div>
        <div class="glass-panel">
            <button onclick="createMultiplayerRoom()" class="btn-primary">Create Room (-500)</button>
            <input type="text" id="join-code" placeholder="Enter Code">
            <button onclick="joinRoom()" class="btn-primary">Join Room (-500)</button>
        </div>
    </div>

    <div id="game-page" class="screen">
        <div class="glass-panel" style="display: flex; justify-content: space-between; padding: 10px; margin-bottom: 10px;">
            <span id="room-id-display">Room: --</span>
            <button onclick="shareWhatsApp()" class="btn-whatsapp">Share</button>
        </div>

        <div class="video-container">
            <video id="local-video" autoplay muted playsinline></video>
            <video id="remote-video" autoplay playsinline></video>
            <div id="emoji-display" class="emoji-popup">😂</div>
        </div>

        <div class="media-controls">
            <button id="btn-cam" class="btn-small" onclick="toggleCam()">📷 Cam On</button>
            <button id="btn-mic" class="btn-small" onclick="toggleMic()">🎤 Mic On</button>
        </div>

        <div class="emoji-bar">
            <span class="emoji-btn" onclick="sendEmoji('😂')">😂</span>
            <span class="emoji-btn" onclick="sendEmoji('😡')">😡</span>
            <span class="emoji-btn" onclick="sendEmoji('❤️')">❤️</span>
            <span class="emoji-btn" onclick="sendEmoji('👍')">👍</span>
            <span class="emoji-btn" onclick="sendEmoji('😭')">😭</span>
        </div>

        <div class="ludo-board" id="board">
            </div>

        <div class="dice-container glass-panel">
            <div id="turn-indicator" style="flex: 1; text-align: left;">Waiting...</div>
            <div id="dice-result" class="dice" onclick="rollDice()">🎲</div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
          apiKey: "AIzaSyCZmqyLmyWesuoj6djTbyfrOJ1v7_FCWcQ",
          authDomain: "game-bf78a.firebaseapp.com",
          databaseURL: "https://game-bf78a-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "game-bf78a",
          storageBucket: "game-bf78a.firebasestorage.app",
          messagingSenderId: "860717231489",
          appId: "1:860717231489:web:f53331a96570be04cacc80"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const auth = firebase.auth();

        let currentUser = null; let currentRoom = null; let isPlayer1 = false;
        let peerConnection; let localStream;
        let pendingCandidates = []; // WebRTC Fix
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        const diceFaces = ['🎲', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- AUTH ---
        function login() {
            auth.signInAnonymously().then((cred) => {
                currentUser = cred.user; checkAndInitUser(currentUser.uid);
            });
        }
        function checkAndInitUser(uid) {
            db.ref(`users/${uid}`).once('value', snap => {
                if (!snap.exists()) { db.ref(`users/${uid}`).set({ coins: 5000, streak: 0, matches: 0 }); }
                db.ref(`users/${uid}`).on('value', updateLobbyUI);
                showScreen('lobby-page');
            });
        }
        function updateLobbyUI(snap) {
            const data = snap.val(); if(!data) return;
            document.getElementById('ui-coins').innerText = data.coins;
            document.getElementById('ui-streak').innerText = data.streak;
        }

        // --- MULTIPLAYER ---
        async function createMultiplayerRoom() {
            currentRoom = Math.random().toString(36).substring(2, 8).toUpperCase(); isPlayer1 = true;
            db.ref(`rooms/${currentRoom}`).set({ player1: currentUser.uid, state: 'waiting', board: { turn: currentUser.uid, dice: 0 }});
            startGameRoom(); initWebRTC(true); listenForGameSync(); generateBoard();
        }

        async function joinRoom() {
            const code = document.getElementById('join-code').value.toUpperCase();
            db.ref(`rooms/${code}`).once('value', snap => {
                if (!snap.exists()) return alert("Room not found!");
                currentRoom = code; isPlayer1 = false;
                db.ref(`rooms/${code}`).update({ player2: currentUser.uid, state: 'playing' });
                startGameRoom(); initWebRTC(false); listenForGameSync(); generateBoard();
            });
        }

        function startGameRoom() {
            document.getElementById('room-id-display').innerText = `Code: ${currentRoom}`;
            showScreen('game-page');
        }
        function shareWhatsApp() {
            window.open(`https://wa.me/?text=Play Neon Ludo with me! Code: ${currentRoom}`);
        }

        // --- BOARD GENERATION ---
        function generateBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for(let r=1; r<=15; r++) {
                for(let c=1; c<=15; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    
                    // Home areas
                    if(r<=6 && c<=6) cell.classList.add('red', 'home');
                    else if(r<=6 && c>=10) cell.classList.add('green', 'home');
                    else if(r>=10 && c<=6) cell.classList.add('blue', 'home');
                    else if(r>=10 && c>=10) cell.classList.add('yellow', 'home');
                    // Paths (Basic coloring)
                    else if(c==8 && r!=8) cell.style.background = '#eee';
                    else if(r==8 && c!=8) cell.style.background = '#eee';
                    
                    board.appendChild(cell);
                }
            }
            // Add center
            const center = document.createElement('div');
            center.className = 'center'; center.innerText = 'HOME';
            board.appendChild(center);

            // Add Pucks (Tokens) - Visual representation only
            addPuck(2, 2, 'red'); addPuck(2, 5, 'red'); addPuck(5, 2, 'red'); addPuck(5, 5, 'red');
            addPuck(2, 11, 'green'); addPuck(2, 14, 'green'); addPuck(5, 11, 'green'); addPuck(5, 14, 'green');
            addPuck(11, 2, 'blue'); addPuck(11, 5, 'blue'); addPuck(14, 2, 'blue'); addPuck(14, 5, 'blue');
            addPuck(11, 11, 'yellow'); addPuck(11, 14, 'yellow'); addPuck(14, 11, 'yellow'); addPuck(14, 14, 'yellow');
        }

        function addPuck(r, c, color) {
            const cell = document.getElementById(`cell-${r}-${c}`);
            if(cell) {
                const puck = document.createElement('div');
                puck.className = `puck ${color}`;
                cell.appendChild(puck);
            }
        }

        // --- GAME LOGIC & ANIMATION ---
        function rollDice() {
            if(!currentRoom) return;
            const diceRef = db.ref(`rooms/${currentRoom}/board`);
            diceRef.once('value', snap => {
                const data = snap.val();
                if(data.turn !== currentUser.uid) return;

                const diceEl = document.getElementById('dice-result');
                diceEl.classList.add('rolling'); // Start animation
                
                setTimeout(() => {
                    diceEl.classList.remove('rolling'); // Stop animation
                    const result = Math.floor(Math.random() * 6) + 1;
                    db.ref(`rooms/${currentRoom}`).once('value', roomSnap => {
                        const rData = roomSnap.val();
                        const nextTurn = (rData.player1 === currentUser.uid) ? rData.player2 : rData.player1;
                        diceRef.update({ dice: result, turn: result === 6 ? currentUser.uid : nextTurn });
                    });
                }, 600); // 0.6 seconds animation delay
            });
        }

        function listenForGameSync() {
            // Dice Sync
            db.ref(`rooms/${currentRoom}/board`).on('value', snapshot => {
                const data = snapshot.val(); if(!data) return;
                if(data.dice > 0) document.getElementById('dice-result').innerText = diceFaces[data.dice];
                document.getElementById('turn-indicator').innerText = (data.turn === currentUser.uid) ? "Your Turn! 🎲" : "Opponent's Turn";
            });

            // Emoji Sync
            db.ref(`rooms/${currentRoom}/emoji`).on('value', snap => {
                const data = snap.val();
                if(data && data.sender !== currentUser.uid) showEmojiPopup(data.emoji);
            });
        }

        // --- MEDIA CONTROLS & EMOJIS ---
        let camEnabled = true; let micEnabled = true;
        function toggleCam() {
            camEnabled = !camEnabled;
            localStream.getVideoTracks()[0].enabled = camEnabled;
            document.getElementById('btn-cam').innerText = camEnabled ? '📷 Cam On' : '📷 Cam Off';
            document.getElementById('btn-cam').style.borderColor = camEnabled ? 'var(--neon-pink)' : 'gray';
        }
        function toggleMic() {
            micEnabled = !micEnabled;
            localStream.getAudioTracks()[0].enabled = micEnabled;
            document.getElementById('btn-mic').innerText = micEnabled ? '🎤 Mic On' : '🎤 Mic Off';
            document.getElementById('btn-mic').style.borderColor = micEnabled ? 'var(--neon-pink)' : 'gray';
        }
        function sendEmoji(emoji) {
            if(currentRoom) {
                db.ref(`rooms/${currentRoom}/emoji`).set({ sender: currentUser.uid, emoji: emoji, time: Date.now() });
                showEmojiPopup(emoji);
            }
        }
        function showEmojiPopup(emoji) {
            const el = document.getElementById('emoji-display');
            el.innerText = emoji; el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 1000);
        }

        // --- WEBRTC FIXED LOGIC ---
        async function initWebRTC(isInitiator) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;
            } catch (e) { console.error("Media error:", e); }

            peerConnection = new RTCPeerConnection(servers);
            if(localStream) localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));

            peerConnection.ontrack = e => { document.getElementById('remote-video').srcObject = e.streams[0]; };

            const roomRef = db.ref(`rooms/${currentRoom}`);

            peerConnection.onicecandidate = e => {
                if (e.candidate) roomRef.child(isInitiator ? 'callerCandidates' : 'calleeCandidates').push(e.candidate.toJSON());
            };

            function processCandidates() {
                pendingCandidates.forEach(c => peerConnection.addIceCandidate(new RTCIceCandidate(c)));
                pendingCandidates = [];
            }

            if (isInitiator) {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                roomRef.update({ offer: { type: offer.type, sdp: offer.sdp } });

                roomRef.on('value', async snap => {
                    const data = snap.val();
                    if (!peerConnection.currentRemoteDescription && data && data.answer) {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                        processCandidates();
                    }
                });

                roomRef.child('calleeCandidates').on('child_added', snap => {
                    if (peerConnection.remoteDescription) peerConnection.addIceCandidate(new RTCIceCandidate(snap.val()));
                    else pendingCandidates.push(snap.val());
                });
            } else {
                roomRef.once('value', async snap => {
                    const data = snap.val();
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    roomRef.update({ answer: { type: answer.type, sdp: answer.sdp } });
                    processCandidates();
                });

                roomRef.child('callerCandidates').on('child_added', snap => {
                    if (peerConnection.remoteDescription) peerConnection.addIceCandidate(new RTCIceCandidate(snap.val()));
                    else pendingCandidates.push(snap.val());
                });
            }
        }
    </script>
</body>
</html>
