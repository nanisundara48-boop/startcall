<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Love Games 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;600;800&display=swap');
        
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: #050505; color: white; height: 100vh; width: 100vw; overflow: hidden; touch-action: none; }
        
        .screen { display: none; position: absolute; width: 100%; height: 100%; top: 0; left: 0; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #110022, #000); z-index: 10; }
        .active { display: flex; }
        
        h1 { font-family: 'Orbitron', sans-serif; font-size: 32px; color: #ff00ff; text-transform: uppercase; text-shadow: 0 0 15px #ff00ff; text-align: center; margin-bottom: 20px;}
        
        .card { background: rgba(20, 0, 40, 0.8); padding: 25px; border-radius: 20px; border: 2px solid #00f2fe; width: 90%; max-width: 400px; box-shadow: 0 0 25px rgba(0, 242, 254, 0.3); text-align: center; backdrop-filter: blur(10px);}

        input, select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-size: 16px; font-family: 'Poppins', sans-serif; text-align: center; font-weight: bold; transition: 0.2s;}
        input, select { background: #fff; color: #000; }
        
        .btn-primary { background: linear-gradient(90deg, #00f2fe, #ff00ff); color: #fff; text-transform: uppercase; cursor: pointer; box-shadow: 0 5px 15px rgba(255,0,255,0.4);}
        .btn-game { background: transparent; border: 2px solid #00f2fe; color: #00f2fe; margin: 15px 0; }
        .btn-whatsapp { background: #25D366; color: #fff; }

        /* Game specific UI */
        #game-canvas { display: none; position: absolute; top:0; left:0; width: 100vw; height: 100vh; z-index: 5; }
        
        /* Tic Tac Toe UI */
        .ttt-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 300px; margin: 20px auto; }
        .ttt-cell { width: 90px; height: 90px; background: rgba(255,255,255,0.1); border: 2px solid #00f2fe; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 50px; font-family: 'Orbitron'; cursor: pointer; box-shadow: inset 0 0 15px rgba(0,242,254,0.2); }
        .ttt-x { color: #00f2fe; text-shadow: 0 0 15px #00f2fe; }
        .ttt-o { color: #ff00ff; text-shadow: 0 0 15px #ff00ff; }

        /* HUD & Overlays */
        #hud { position: absolute; top: 15px; width: 100%; padding: 0 20px; display: flex; justify-content: space-between; z-index: 20; pointer-events: none; }
        .life-bar-bg { width: 40%; height: 15px; background: rgba(0,0,0,0.5); border: 1px solid #fff; border-radius: 8px; overflow: hidden; }
        .life-fill { height: 100%; transition: width 0.3s; }
        #p1-life { background: #00f2fe; box-shadow: 0 0 10px #00f2fe; width: 100%; }
        #p2-life { background: #ff00ff; box-shadow: 0 0 10px #ff00ff; width: 100%; }
        
        #instruction { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); border: 1px solid #ffeb3b; color: #ffeb3b; padding: 10px 20px; border-radius: 20px; z-index: 20; text-align: center; display: none;}
        
        #overlay { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 50; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .quote { font-size: 18px; color: #ff9a9e; font-style: italic; margin: 20px; font-family: 'Georgia', serif; }
        
        /* Final Love Particles */
        .particle { position: absolute; animation: explode 2s forwards; }
        @keyframes explode { 0% { transform: scale(0) translate(0,0); opacity: 1; } 100% { transform: scale(5) translate(var(--tx), var(--ty)); opacity: 0; } }
    </style>
</head>
<body>

    <div id="join-screen" class="screen">
        <h1>Join Partner 💖</h1>
        <div class="card">
            <p>You've been invited!</p>
            <input type="text" id="joinName" placeholder="Your Name" required>
            <select id="joinGender">
                <option value="boy">I am the Boy</option>
                <option value="girl">I am the Girl</option>
            </select>
            <button id="btnAutoJoin" class="btn-primary">Enter Game</button>
        </div>
    </div>

    <div id="menu-screen" class="screen active">
        <h1>Nani Creations</h1>
        <div class="card">
            <p>Select your experience:</p>
            <button onclick="startGameSetup('ttt')" class="btn-primary btn-game">Tic Tac Toe (Find Partner)</button>
            <button onclick="startGameSetup('journey')" class="btn-primary btn-game">Magical Journey (Duo Surf)</button>
        </div>
    </div>

    <div id="setup-screen" class="screen">
        <h1 id="setupTitle">Setup Game</h1>
        <div class="card">
            <input type="text" id="hostName" placeholder="Your Name" required>
            <select id="hostGender">
                <option value="boy">I am the Boy</option>
                <option value="girl">I am the Girl</option>
            </select>
            <button id="btnHost" class="btn-primary">Create Game</button>
        </div>
    </div>

    <div id="ttt-screen" class="screen">
        <h2 id="ttt-status" style="color:#00f2fe; margin-bottom: 20px;">Level 1: Defeat the System</h2>
        <div class="ttt-board" id="board">
            </div>
        <div id="ttt-invite" style="display: none; margin-top: 20px; text-align: center;">
            <p style="color:#00ff00; margin-bottom:10px;">System Defeated! You proved your love.</p>
            <button id="btnTTTInvite" class="btn-whatsapp">Invite Partner via WhatsApp</button>
        </div>
    </div>

    <div id="journey-hud" style="display:none;">
        <canvas id="game-canvas"></canvas>
        <div id="hud">
            <div class="life-bar-bg"><div id="p1-life" class="life-fill"></div><div style="font-size:10px; padding-left:5px;">P1</div></div>
            <div class="life-bar-bg"><div id="p2-life" class="life-fill" style="float:right;"></div><div style="font-size:10px; text-align:right; padding-right:5px;">P2</div></div>
        </div>
        <div id="instruction">SWIPE TO MOVE!</div>
    </div>

    <div id="overlay">
        <h1 id="ov-title" style="color: #ff00ff;">MESSAGE</h1>
        <div id="ov-quote" class="quote"></div>
        <button id="ov-btn" class="btn-primary" style="display:none; width: 200px;">Continue</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyCZmqyLmyWesuoj6djTbyfrOJ1v7_FCWcQ",
            authDomain: "game-bf78a.firebaseapp.com",
            projectId: "game-bf78a",
            storageBucket: "game-bf78a.firebasestorage.app",
            messagingSenderId: "860717231489",
            appId: "1:860717231489:web:f53331a96570be04cacc80"
        };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        // GLOBAL VARS
        let gameMode = ""; // 'ttt' or 'journey'
        let gameId = ""; let playerNum = 0; let docRef = null;
        let isOnline = true; // Connection status tracking

        // SOUND ENGINE (BGM & SFX)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctxAudio = new AudioContext();
        let bgmOsc;

        function playBGM() {
            if(ctxAudio.state === 'suspended') ctxAudio.resume();
            if(bgmOsc) return;
            bgmOsc = ctxAudio.createOscillator();
            let gain = ctxAudio.createGain();
            bgmOsc.type = 'sine';
            bgmOsc.frequency.setValueAtTime(200, ctxAudio.currentTime);
            gain.gain.value = 0.05; // Very soft background hum
            bgmOsc.connect(gain); gain.connect(ctxAudio.destination);
            bgmOsc.start();
        }

        function playSFX(type) {
            let osc = ctxAudio.createOscillator(); let g = ctxAudio.createGain();
            osc.connect(g); g.connect(ctxAudio.destination);
            if(type === 'win') { osc.type='square'; osc.frequency.setValueAtTime(400, ctxAudio.currentTime); osc.frequency.exponentialRampToValueAtTime(800, ctxAudio.currentTime+0.5); g.gain.setValueAtTime(0.3, ctxAudio.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ctxAudio.currentTime+0.5); osc.start(); osc.stop(ctxAudio.currentTime+0.5); }
            if(type === 'hit') { osc.type='sawtooth'; osc.frequency.setValueAtTime(100, ctxAudio.currentTime); g.gain.setValueAtTime(0.5, ctxAudio.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ctxAudio.currentTime+0.3); osc.start(); osc.stop(ctxAudio.currentTime+0.3); }
            if(type === 'magic') { osc.type='triangle'; osc.frequency.setValueAtTime(600, ctxAudio.currentTime); osc.frequency.linearRampToValueAtTime(1200, ctxAudio.currentTime+0.3); g.gain.setValueAtTime(0.3, ctxAudio.currentTime); g.gain.linearRampToValueAtTime(0.01, ctxAudio.currentTime+0.3); osc.start(); osc.stop(ctxAudio.currentTime+0.3); }
        }

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        
        function showOverlay(title, quote, showBtn = false, btnAction = null) {
            document.getElementById('ov-title').innerText = title;
            document.getElementById('ov-quote').innerText = quote;
            let btn = document.getElementById('ov-btn');
            if(showBtn) { btn.style.display = 'block'; btn.onclick = () => { document.getElementById('overlay').style.display='none'; if(btnAction) btnAction(); }; }
            else { btn.style.display = 'none'; setTimeout(() => document.getElementById('overlay').style.display='none', 5000); }
            document.getElementById('overlay').style.display = 'flex';
        }

        // --- URL INTERCEPTOR (Auto Join) ---
        const urlParams = new URLSearchParams(window.location.search);
        const urlGameId = urlParams.get('game');
        const urlMode = urlParams.get('mode');

        if(urlGameId && urlMode) {
            gameMode = urlMode; gameId = urlGameId.toUpperCase();
            showScreen('join-screen');
        }

        document.getElementById('btnAutoJoin').addEventListener('click', async () => {
            let name = document.getElementById('joinName').value.trim();
            if(!name) return; playerNum = 2; playBGM();
            docRef = doc(db, "games", gameId);
            let snap = await getDoc(docRef);
            if(snap.exists()) {
                await updateDoc(docRef, { p2Name: name, status: 'playing', p2Active: true });
                initMultiplayerListeners();
            } else alert("Room closed or invalid.");
        });

        // --- MENU LOGIC ---
        window.startGameSetup = function(mode) {
            gameMode = mode;
            document.getElementById('setupTitle').innerText = mode === 'ttt' ? 'Tic Tac Toe' : 'Magical Journey';
            showScreen('setup-screen');
        }

        document.getElementById('btnHost').addEventListener('click', async () => {
            let name = document.getElementById('hostName').value.trim();
            if(!name) return; playerNum = 1; playBGM();
            
            if(gameMode === 'ttt') {
                // TTT Level 1 is against BOT. No Firebase yet.
                initTicTacToeBot(name);
            } else {
                // Host Journey
                gameId = Math.random().toString(36).substring(2, 7).toUpperCase();
                docRef = doc(db, "games", gameId);
                await setDoc(docRef, { mode: 'journey', status: 'waiting', p1Name: name, p1Active: true, level: 1, p1Life: 100, p2Life: 100, progress: 0, p1Lane: 1, p2Lane: 1, obstacle: null, turnData: null });
                shareWhatsApp(gameId, 'journey');
                showOverlay("WAITING", "Invite sent. Waiting for partner...", false);
                initMultiplayerListeners();
            }
        });

        function shareWhatsApp(id, mode) {
            const url = `${window.location.origin}${window.location.pathname}?game=${id}&mode=${mode}`;
            const text = `Join my game! Click here to play immediately: ${url}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
        }

        // --- TIC TAC TOE (BOT & MULTIPLAYER) ---
        let tttBoard = ['', '', '', '', '', '', '', '', ''];
        let tttActive = true;
        
        function drawTTTBoard(onCellClick) {
            let b = document.getElementById('board'); b.innerHTML = '';
            for(let i=0; i<9; i++) {
                let cell = document.createElement('div'); cell.className = 'ttt-cell';
                cell.onclick = () => onCellClick(i);
                cell.innerText = tttBoard[i];
                if(tttBoard[i] === 'X') cell.classList.add('ttt-x'); else if(tttBoard[i]==='O') cell.classList.add('ttt-o');
                b.appendChild(cell);
            }
        }

        function checkWin(board) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let l of lines) { if(board[l[0]] && board[l[0]] === board[l[1]] && board[l[0]] === board[l[2]]) return board[l[0]]; }
            if(!board.includes('')) return 'Tie';
            return null;
        }

        // Level 1: Find Partner (vs Bot)
        function initTicTacToeBot(playerName) {
            showScreen('ttt-screen');
            tttBoard = ['', '', '', '', '', '', '', '', '']; tttActive = true;
            document.getElementById('ttt-status').innerText = "Level 1: Defeat the System to find love.";
            
            drawTTTBoard((i) => {
                if(!tttActive || tttBoard[i] !== '') return;
                tttBoard[i] = 'X'; playSFX('magic'); drawTTTBoard();
                
                let win = checkWin(tttBoard);
                if(win) { handleBotWin(win, playerName); return; }
                
                // Bot Move (Medium logic: block or random)
                setTimeout(() => {
                    let empty = tttBoard.map((v, i) => v === '' ? i : null).filter(v => v !== null);
                    if(empty.length > 0) {
                        let move = empty[Math.floor(Math.random() * empty.length)]; // Simple bot
                        tttBoard[move] = 'O'; playSFX('hit'); drawTTTBoard();
                        let bWin = checkWin(tttBoard);
                        if(bWin) handleBotWin(bWin, playerName);
                    }
                }, 500);
            });
        }

        async function handleBotWin(winner, pName) {
            tttActive = false;
            if(winner === 'X') {
                playSFX('win');
                document.getElementById('ttt-invite').style.display = 'block';
                showOverlay("SYSTEM DEFEATED", `"Love requires patience and skill. You are ready."`, true, () => {});
                
                document.getElementById('btnTTTInvite').onclick = async () => {
                    gameId = Math.random().toString(36).substring(2, 7).toUpperCase(); docRef = doc(db, "games", gameId);
                    await setDoc(docRef, { mode: 'ttt', status: 'waiting', p1Name: pName, p1Active: true, board: ['', '', '', '', '', '', '', '', ''], turn: 'X', level: 2 });
                    shareWhatsApp(gameId, 'ttt'); initMultiplayerListeners();
                };
            } else {
                showOverlay("FAILED", `"The system won. Try again."`, true, () => initTicTacToeBot(pName));
            }
        }

        // --- MULTIPLAYER ENGINE (Sync) ---
        function initMultiplayerListeners() {
            // Heartbeat / Disconnect logic
            document.addEventListener("visibilitychange", async () => {
                if(!docRef) return;
                if (document.visibilityState === "hidden") await updateDoc(docRef, { [`p${playerNum}Active`]: false });
                else await updateDoc(docRef, { [`p${playerNum}Active`]: true });
            });

            onSnapshot(docRef, (docSnap) => {
                if(!docSnap.exists()) return;
                let data = docSnap.data();

                // Pause if someone leaves
                if(data.status === 'playing' && (!data.p1Active || !data.p2Active)) {
                    document.getElementById('instruction').innerText = "Partner disconnected! Paused.";
                    document.getElementById('instruction').style.display = 'block'; return;
                } else document.getElementById('instruction').style.display = 'none';

                if(data.mode === 'ttt' && data.status === 'playing') {
                    showScreen('ttt-screen'); document.getElementById('ttt-invite').style.display = 'none';
                    document.getElementById('ttt-status').innerText = `Level ${data.level}: ${data.turn}'s Turn`;
                    tttBoard = data.board;
                    
                    drawTTTBoard(async (i) => {
                        let mySymbol = playerNum === 1 ? 'X' : 'O';
                        if(data.turn !== mySymbol || tttBoard[i] !== '') return;
                        
                        let newBoard = [...tttBoard]; newBoard[i] = mySymbol; playSFX('magic');
                        let nextTurn = mySymbol === 'X' ? 'O' : 'X';
                        
                        let winner = checkWin(newBoard);
                        if(winner) {
                            playSFX('win');
                            let msg = winner === 'Tie' ? "It's a Tie!" : `${winner === 'X' ? data.p1Name : data.p2Name} Wins!`;
                            let q = `"Every battle brings us closer."`;
                            await updateDoc(docRef, { board: newBoard, status: 'paused' });
                            showOverlay(msg, q, true, async () => {
                                if(playerNum === 1) await updateDoc(docRef, { board: ['', '', '', '', '', '', '', '', ''], turn: 'X', level: data.level+1, status: 'playing' });
                            });
                        } else { await updateDoc(docRef, { board: newBoard, turn: nextTurn }); }
                    });
                }

                if(data.mode === 'journey' && data.status === 'playing') {
                    if(!document.getElementById('journey-hud').style.display || document.getElementById('journey-hud').style.display === 'none') {
                        showScreen('menu-screen'); document.getElementById('menu-screen').classList.remove('active');
                        document.getElementById('journey-hud').style.display = 'block'; document.getElementById('game-canvas').style.display = 'block';
                        startJourneyEngine(); if(playerNum === 1) startJourneyHost();
                    }
                    syncJourneyState(data);
                }
            });
        }

        // --- THE JOURNEY V8 (Magical Surf Pseudo-3D) ---
        let jState = null;
        let c = document.getElementById('game-canvas'); let ctx = c.getContext('2d');
        let hY = 0; function res() { c.width = window.innerWidth; c.height = window.innerHeight; hY = c.height * 0.4; } window.addEventListener('resize', res); res();

        // Journey Controls
        let tX = 0;
        document.addEventListener('touchstart', e => tX = e.changedTouches[0].screenX );
        document.addEventListener('touchend', async e => {
            if(!jState || jState.status !== 'playing') return;
            let dx = e.changedTouches[0].screenX - tX;
            let myLane = playerNum === 1 ? 'p1Lane' : 'p2Lane';
            
            // Handle Forks/Turns visually
            if(jState.turnData && playerNum === 1) {
                if((jState.turnData === 'LEFT' && dx < -40) || (jState.turnData === 'RIGHT' && dx > 40)) {
                    playSFX('win'); await updateDoc(docRef, { turnData: null }); return;
                }
            }
            if (dx > 40 && jState[myLane] < 2) await updateDoc(docRef, { [myLane]: jState[myLane] + 1 });
            else if (dx < -40 && jState[myLane] > 0) await updateDoc(docRef, { [myLane]: jState[myLane] - 1 });
        });

        function syncJourneyState(data) {
            let oldLvl = jState ? jState.level : 1; jState = data;
            document.getElementById('p1-life').style.width = Math.max(0, data.p1Life) + "%";
            document.getElementById('p2-life').style.width = Math.max(0, data.p2Life) + "%";

            if(jState.level > oldLvl) {
                let quotes = ["The journey of a thousand miles begins with you.", "Through the shadows, we find our light.", "Together, there are no dead ends.", "Love is the only path."];
                showOverlay(`LEVEL ${jState.level}`, quotes[(jState.level-1)%4]);
            }
            
            let ins = document.getElementById('instruction');
            if(jState.turnData) { ins.innerText = `FORK AHEAD: GO ${jState.turnData}!`; ins.style.display = 'block'; }
            else ins.style.display = 'none';

            if(jState.p1Life <= 0 || jState.p2Life <= 0) showOverlay("JOURNEY ENDED", "You lost your light. Reload to try again.");
        }

        function startJourneyHost() {
            setInterval(async () => {
                if(!jState || jState.status !== 'playing' || jState.p1Life <= 0 || jState.p2Life <= 0) return;
                let prog = jState.progress + 2;
                if(prog >= 100) { await updateDoc(docRef, { level: jState.level + 1, progress: 0, obstacle: null, turnData: null }); } 
                else {
                    let update = { progress: prog };
                    if(prog % 30 === 0 && jState.level > 1 && !jState.turnData) update.turnData = Math.random() > 0.5 ? 'LEFT' : 'RIGHT';
                    if(jState.turnData && prog % 30 === 10) { update.p1Life = jState.p1Life - 20; update.p2Life = jState.p2Life - 20; update.turnData = null; } // Failed turn
                    
                    if(!jState.obstacle && Math.random() > 0.6 && !jState.turnData) update.obstacle = { lane: Math.floor(Math.random()*3), z: 2000, type: Math.random()>0.7?'heart':'rock' };
                    await updateDoc(docRef, update);
                }
            }, 500);
        }

        let oZ = 2000, rOff = 0, p1Rx = 1, p2Rx = 1, curve = 0, tCurve = 0;
        let stars = []; for(let i=0; i<50; i++) stars.push({x:Math.random()*2000, y:Math.random()*hY, s:Math.random()*2});
        let scenery = []; for(let i=0; i<15; i++) scenery.push({side:Math.random()>0.5?1:-1, z:Math.random()*2000});

        function proj(x,y,z) { let s = 300/(300+z); return { x: (c.width/2)+(x*s), y: hY+((c.height-hY)*s), s:s }; }

        function drawOrb(x, y, s, color) {
            ctx.beginPath(); ctx.arc(x, y, 20*s, 0, Math.PI*2); ctx.fillStyle = color; ctx.shadowBlur = 30*s; ctx.shadowColor = color; ctx.fill(); ctx.shadowBlur = 0;
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(x, y, 8*s, 0, Math.PI*2); ctx.fill(); // Core
        }

        function startJourneyEngine() {
            function render() {
                if(!jState || jState.status !== 'playing') { requestAnimationFrame(render); return; }
                
                // Magical Sky
                let g = ctx.createLinearGradient(0,0,0,hY); g.addColorStop(0,"#020011"); g.addColorStop(1,"#2a0044");
                ctx.fillStyle = g; ctx.fillRect(0,0,c.width,hY);
                ctx.fillStyle = "#fff"; stars.forEach(st => { st.x -= 0.5; if(st.x<0) st.x=c.width; ctx.beginPath(); ctx.arc(st.x, st.y, st.s, 0, Math.PI*2); ctx.fill(); });

                // Ground & Path
                ctx.fillStyle = "#0a0a1a"; ctx.fillRect(0,hY,c.width,c.height);
                let spd = 10 + jState.level; rOff = (rOff+spd)%100;
                
                tCurve = jState.turnData ? (jState.turnData==='LEFT'?-50:50) : Math.sin(jState.progress*0.1)*20;
                curve += (tCurve - curve)*0.05;

                let dx = 0;
                for(let y=c.height; y>hY; y-=5) {
                    let z = (c.height-hY)/(y-hY); dx += curve*0.05*z;
                    let pX = (c.width/2)+dx; let rW = 400/z;
                    
                    // Starlight Path (Not road lines, glowing edges)
                    ctx.fillStyle = (y+rOff)%40 > 20 ? "rgba(0, 242, 254, 0.1)" : "rgba(255, 0, 255, 0.1)";
                    ctx.fillRect(pX-rW, y, rW*2, 5);
                    ctx.fillStyle = "#fff"; ctx.globalAlpha = 0.5; ctx.fillRect(pX-rW, y, 3, 5); ctx.fillRect(pX+rW, y, 3, 5); ctx.globalAlpha = 1;
                }

                // Scenery (Glowing crystals on side, strictly offset)
                scenery.forEach(s => {
                    s.z -= spd*2; if(s.z<0) s.z=2000;
                    let sP = proj(s.side * 500 + (curve*s.z*0.05), 0, s.z);
                    ctx.fillStyle = s.side === 1 ? "rgba(0,255,255,0.4)" : "rgba(255,0,255,0.4)";
                    ctx.beginPath(); ctx.moveTo(sP.x, sP.y); ctx.lineTo(sP.x-15*sP.s, sP.y-(100*sP.s)); ctx.lineTo(sP.x+15*sP.s, sP.y-(80*sP.s)); ctx.fill();
                });

                // Fork Visuals
                if(jState.turnData) {
                    let fP = proj(0, 0, 1000);
                    ctx.fillStyle = "#ffeb3b"; ctx.font = `${30*fP.s}px Orbitron`; ctx.fillText(jState.turnData, fP.x-20, fP.y-50);
                }

                // Obstacles
                if(jState.obstacle) {
                    oZ -= spd*3; let lX = (jState.obstacle.lane - 1)*150;
                    let oP = proj(lX + (curve*oZ*0.05), 0, oZ);
                    
                    if(oZ > 20) {
                        if(jState.obstacle.type === 'heart') { ctx.fillStyle="#ff0844"; ctx.font=`${40*oP.s}px Arial`; ctx.fillText("❤️", oP.x-10, oP.y); }
                        else { ctx.fillStyle="#333"; ctx.beginPath(); ctx.moveTo(oP.x,oP.y); ctx.lineTo(oP.x-30*oP.s, oP.y-40*oP.s); ctx.lineTo(oP.x+30*oP.s, oP.y-40*oP.s); ctx.fill(); }
                    } else if(oZ > -50) {
                        let myLane = playerNum === 1 ? jState.p1Lane : jState.p2Lane;
                        if(myLane === jState.obstacle.lane && playerNum === 1) {
                            if(jState.obstacle.type === 'heart') { playSFX('magic'); updateDoc(docRef, { p1Life: Math.min(100, jState.p1Life+15), p2Life: Math.min(100, jState.p2Life+15), obstacle: null }); }
                            else { playSFX('hit'); updateDoc(docRef, { p1Life: jState.p1Life-15, p2Life: jState.p2Life-15, obstacle: null }); }
                            oZ = 2000;
                        }
                    } else { oZ = 2000; if(playerNum===1) updateDoc(docRef, { obstacle:null }); }
                }

                // Players
                p1Rx += (((jState.p1Lane-1)*150) - p1Rx)*0.2; p2Rx += (((jState.p2Lane-1)*150) - p2Rx)*0.2;
                let cY = c.height - 120;
                let p1P = proj(p1Rx, 0, 150); let p2P = proj(p2Rx, 0, 150);
                p1P.y = cY; p2P.y = cY;

                // Level 1: Only draw self. Level 2+: Draw both & connect line
                if(jState.level === 1) {
                    if(playerNum === 1) drawOrb(p1P.x, p1P.y, p1P.s, '#00f2fe'); else drawOrb(p2P.x, p2P.y, p2P.s, '#ff0844');
                } else {
                    ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(p1P.x, p1P.y); ctx.lineTo(p2P.x, p2P.y); ctx.stroke();
                    drawOrb(p1P.x, p1P.y, p1P.s, '#00f2fe'); drawOrb(p2P.x, p2P.y, p2P.s, '#ff0844');
                }

                requestAnimationFrame(render);
            }
            render();
        }
    </script>
</body>
</html>
