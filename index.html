<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Journey of Love 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600;800&family=Orbitron:wght@700;900&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            color: white; height: 100vh; width: 100vw; overflow: hidden; touch-action: none;
            background: linear-gradient(-45deg, #2b0018, #0a000a, #4a0024, #1a0011);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .bg-hearts { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .bg-heart { position: absolute; color: rgba(255, 0, 127, 0.15); font-size: 20px; animation: floatUp 10s linear infinite; bottom: -50px; }
        @keyframes floatUp { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; } }

        .screen { display: none; position: absolute; width: 100%; height: 100%; top: 0; left: 0; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .active { display: flex; }
        
        h1 { font-family: 'Dancing Script', cursive; font-size: 60px; color: #ff4d85; text-shadow: 0 0 20px rgba(255, 77, 133, 0.8); text-align: center; margin-bottom: 5px;}
        .subtitle { font-family: 'Orbitron', sans-serif; font-size: 14px; color: #ffb3c6; margin-bottom: 30px; letter-spacing: 3px; text-shadow: 0 0 10px rgba(255, 179, 198, 0.5);}
        
        .card { background: rgba(20, 5, 15, 0.6); padding: 30px; border-radius: 25px; border: 1px solid rgba(255, 77, 133, 0.4); width: 90%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 20px rgba(255, 77, 133, 0.1); text-align: center; backdrop-filter: blur(15px);}

        input, select, button { width: 100%; padding: 15px; margin: 12px 0; border-radius: 15px; border: none; font-size: 16px; font-family: 'Poppins', sans-serif; text-align: center; font-weight: bold; transition: all 0.3s ease;}
        input, select { background: rgba(255,255,255,0.9); color: #333; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); }
        input:focus { border: 2px solid #ff4d85; outline: none; transform: scale(1.02); }
        
        .btn-primary { background: linear-gradient(90deg, #ff0055, #ff4d85); color: #fff; text-transform: uppercase; cursor: pointer; box-shadow: 0 8px 20px rgba(255, 0, 85, 0.4); letter-spacing: 1px;}
        .btn-primary:active { transform: scale(0.95); box-shadow: 0 4px 10px rgba(255, 0, 85, 0.4); }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); border: 1px solid #ffb3c6; color: #ffb3c6; }
        .btn-success { background: linear-gradient(90deg, #1D976C, #25D366); color: white; box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);}

        /* Floating Nav & Comm HUD */
        #top-nav { display: none; position: absolute; top: 15px; left: 15px; right: 15px; justify-content: space-between; z-index: 1000; pointer-events: none;}
        .glass-btn { pointer-events: auto; width: 45px; height: 45px; border-radius: 50%; background: rgba(255, 77, 133, 0.15); border: 1px solid rgba(255, 77, 133, 0.4); color: #fff; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 20px; backdrop-filter: blur(10px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.3s; }
        .glass-btn:active { transform: scale(0.9); }
        .muted { background: rgba(255, 0, 0, 0.2); border-color: #ff0000; color: #ff5555;}
        
        /* Chat Panel */
        #chat-panel { display: none; position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 300px; background: rgba(15, 5, 15, 0.95); border: 1px solid #ff4d85; border-radius: 20px; z-index: 2000; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.8); backdrop-filter: blur(15px);}
        #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 80%; word-wrap: break-word; box-shadow: 0 2px 5px rgba(0,0,0,0.2);}
        .msg.me { background: linear-gradient(135deg, #ff0055, #ff4d85); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.them { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        #chat-input-area { display: flex; padding: 10px; gap: 10px; border-top: 1px solid rgba(255,77,133,0.3); background: rgba(0,0,0,0.3); border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;}
        #chat-input-area input { margin: 0; padding: 12px 15px; border-radius: 20px; font-size: 14px; background: rgba(255,255,255,0.1); color: white; border: none;}
        #chat-input-area button { width: 50px; margin: 0; border-radius: 50%; display: flex; justify-content: center; align-items: center;}

        /* Quick Emojis */
        #emoji-bar { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 1500; }
        .emoji-btn { background: rgba(255,255,255,0.1); border: 1px solid #ff4d85; border-radius: 50%; width: 45px; height: 45px; font-size: 22px; cursor: pointer; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(5px); transition: 0.2s;}
        .emoji-btn:active { transform: scale(0.8); }
        .floating-emoji { position: absolute; font-size: 45px; animation: floatUpEmoji 2s forwards ease-out; z-index: 2500; pointer-events: none; }
        @keyframes floatUpEmoji { 0% { opacity: 1; transform: translate(-50%, 0) scale(1); } 100% { opacity: 0; transform: translate(-50%, -200px) scale(1.5); } }

        /* Game Area Base */
        #game-area { display: none; position: absolute; top:0; left:0; width: 100vw; height: 100vh; z-index: 5; flex-direction: column; align-items: center; justify-content: center;}
        canvas { display: none; position: absolute; top:0; left:0; width: 100vw; height: 100vh; z-index: 1; }
        
        #score-hud { position: absolute; top: 75px; width: 100%; padding: 0 20px; display: flex; justify-content: space-between; z-index: 20; pointer-events: none; }
        .score-box { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,77,133,0.5); border-radius: 15px; padding: 8px 25px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.4); backdrop-filter: blur(5px);}
        .score-box h3 { font-family: 'Orbitron'; font-size: 11px; color: #ffb3c6; text-transform: uppercase; letter-spacing: 1px;}
        .score-box p { font-size: 24px; font-weight: bold; color: #fff; margin:0; font-family: 'Orbitron'; text-shadow: 0 0 10px #ff0055;}
        
        #level-title-hud { font-family: 'Orbitron'; font-size: 24px; color: #fff; text-shadow: 0 0 15px #ff0055; margin-top: 15px; z-index: 20; letter-spacing: 2px;}

        /* Mini Games Layouts */
        .grid-game { display: grid; gap: 12px; z-index: 10; margin-top: 30px; }
        
        .match-card { width: 75px; height: 75px; background: rgba(255,77,133,0.1); border: 2px solid rgba(255,77,133,0.5); border-radius: 18px; display: flex; justify-content: center; align-items: center; font-size: 35px; cursor: pointer; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
        .match-card.flipped { background: rgba(255,255,255,0.95); transform: rotateY(180deg); border-color: #fff; box-shadow: 0 0 25px rgba(255,255,255,0.6);}
        
        .ttt-cell { width: 95px; height: 95px; background: rgba(255,77,133,0.05); border: 2px solid rgba(255,77,133,0.6); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 55px; font-family: 'Orbitron'; cursor: pointer; box-shadow: inset 0 0 20px rgba(255,77,133,0.1); transition: 0.2s;}
        
        #sudden-death-area { display: none; position: absolute; top: 150px; left: 15px; right: 15px; bottom: 20px; z-index: 10; border: 2px solid #ffeb3b; border-radius: 25px; background: rgba(0,0,0,0.3); box-shadow: inset 0 0 30px rgba(255,235,59,0.2);}
        .golden-heart { position: absolute; font-size: 60px; cursor: pointer; filter: drop-shadow(0 0 20px #ffeb3b); animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 25% { transform: translate(-1px, -2px) rotate(-1deg); } 50% { transform: translate(-3px, 0px) rotate(1deg); } 75% { transform: translate(3px, 2px) rotate(0deg); } 100% { transform: translate(1px, -1px) rotate(-1deg); } }

        #popper-area { display: none; position: absolute; top: 150px; left: 15px; right: 15px; bottom: 20px; z-index: 10; border: 2px dashed rgba(255,77,133,0.4); border-radius: 25px; background: rgba(0,0,0,0.2);}
        .pop-target { position: absolute; font-size: 55px; cursor: pointer; animation: pulseBeat 0.8s infinite alternate; filter: drop-shadow(0 0 15px rgba(255,0,85,0.8)); transition: transform 0.1s;}
        
        #scramble-area { display: none; z-index: 10; flex-direction: column; align-items: center; gap: 25px; margin-top: 60px; width: 90%; max-width: 400px;}
        #scramble-word { font-family: 'Orbitron'; font-size: 45px; color: #fff; text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055; letter-spacing: 12px; text-align: center;}

        /* Overlays */
        #overlay { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10,0,5,0.95); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 25px; backdrop-filter: blur(10px);}
        #ov-title { font-family: 'Orbitron'; font-size: 45px; color: #ff4d85; margin-bottom: 20px; text-shadow: 0 0 25px rgba(255,77,133,0.8); letter-spacing: 3px;}
        #ov-quote { font-size: 26px; color: #ffb3c6; font-family: 'Dancing Script', cursive; margin-bottom: 40px; line-height: 1.6; text-shadow: 0 2px 4px rgba(0,0,0,0.5);}
        
        #final-screen { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #3d001a, #000); z-index: 4000; overflow: hidden; flex-direction: column; align-items: center; justify-content: center; }
        .heart-particle { position: absolute; font-size: 35px; animation: zoomOutHeart 3.5s forwards cubic-bezier(0.1, 0.8, 0.3, 1); filter: drop-shadow(0 0 10px rgba(255,0,85,0.8));}
        #final-text { font-family: 'Dancing Script', cursive; font-size: 65px; z-index: 210; opacity: 0; animation: fadeInText 3s 1s forwards; text-align: center; color: #fff; text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055; line-height: 1.2;}
        .final-names { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 30px; letter-spacing: 2px; text-transform: uppercase; background: linear-gradient(90deg, #ffb3c6, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
        
        @keyframes pulseBeat { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }
        @keyframes zoomOutHeart { 0% { transform: scale(0) translate(0,0); opacity: 1; } 100% { transform: scale(25) translate(var(--tx), var(--ty)); opacity: 0; } }
        @keyframes fadeInText { to { opacity: 1; transform: scale(1.05); } }
    </style>
</head>
<body>

    <div class="bg-hearts" id="bgHearts"></div>

    <div id="top-nav">
        <div style="display: flex; gap: 15px;">
            <div class="glass-btn" id="btnHome" title="Main Menu">🏠</div>
            <div class="glass-btn" id="btnRestart" title="Restart Game" style="display:none; color: #ffeb3b; border-color: #ffeb3b;">🔄</div>
        </div>
        <div style="display: flex; gap: 15px;">
            <div class="glass-btn" id="btnMic">🎤</div>
            <div class="glass-btn" id="btnChat">💬</div>
        </div>
    </div>

    <div id="emoji-bar" style="display: none;">
        <button class="emoji-btn" onclick="sendEmoji('❤️')">❤️</button>
        <button class="emoji-btn" onclick="sendEmoji('😍')">😍</button>
        <button class="emoji-btn" onclick="sendEmoji('😂')">😂</button>
        <button class="emoji-btn" onclick="sendEmoji('😡')">😡</button>
    </div>

    <div id="chat-panel">
        <div id="chat-msgs"></div>
        <div id="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type a message...">
            <button id="btnSendChat" class="btn-primary" style="padding: 12px;">➤</button>
        </div>
    </div>

    <div id="home-screen" class="screen active">
        <h1>Love Hub</h1>
        <div class="subtitle">BY NANI CREATIONS</div>
        <div class="card">
            <input type="text" id="playerName" placeholder="Your Name" required>
            <button id="btnCreate" class="btn-primary">Start New Journey</button>
            <div style="margin: 25px 0; color: #ffb3c6; font-size: 14px; letter-spacing: 2px;">OR</div>
            <input type="text" id="joinCode" placeholder="Enter Partner's Code" style="text-transform: uppercase;">
            <button id="btnJoin" class="btn-secondary">Join Journey</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <h2 style="color: #ffb3c6; margin-bottom: 15px; font-family:'Poppins'; font-weight: 400;">Waiting for Partner...</h2>
        <div class="card">
            <h1 id="displayCode" style="font-size: 55px; color: #fff; margin: 15px 0; font-family:'Orbitron'; text-shadow: 0 0 20px #ff0055;">XXXXX</h1>
            <p style="color:rgba(255,255,255,0.6); font-size:14px; margin-bottom:25px;">Share this code to connect souls</p>
            <button id="btnShare" class="btn-success">Invite via WhatsApp</button>
            <button id="btnCopy" class="btn-secondary" style="margin-top:15px;">Copy Link</button>
        </div>
    </div>

    <div id="game-area">
        <h2 id="level-title-hud">LEVEL 1</h2>
        <div id="score-hud">
            <div class="score-box"><h3 id="name1">P1</h3><p id="score1">0</p></div>
            <div class="score-box"><h3 id="name2">P2</h3><p id="score2">0</p></div>
        </div>
        
        <div id="memory-board" class="grid-game" style="grid-template-columns: repeat(4, 1fr);"></div>
        <div id="ttt-board" class="grid-game" style="grid-template-columns: repeat(3, 1fr); display:none;"></div>
        <div id="sudden-death-area"></div>
        <div id="popper-area"></div>
        <div id="scramble-area">
            <div id="scramble-word"></div>
            <input type="text" id="scramble-input" placeholder="Type the true word..." style="text-transform:uppercase;">
            <button id="btnScramble" class="btn-primary">Guess</button>
        </div>
        <canvas id="game-canvas"></canvas>
    </div>

    <div id="overlay">
        <h1 id="ov-title">LEVEL 1</h1>
        <div id="ov-quote" class="quote"></div>
        <button id="ov-btn" class="btn-primary" style="display:none; width: 250px; margin-top: 20px;">Continue Journey</button>
    </div>

    <div id="final-screen">
        <div id="final-text">Our Love is Eternal<br><br><span id="finalNames" class="final-names"></span></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc, collection, addDoc, query, orderBy, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyCZmqyLmyWesuoj6djTbyfrOJ1v7_FCWcQ",
            authDomain: "game-bf78a.firebaseapp.com",
            projectId: "game-bf78a",
            storageBucket: "game-bf78a.firebasestorage.app",
            messagingSenderId: "860717231489",
            appId: "1:860717231489:web:f53331a96570be04cacc80"
        };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        // --- GLOBAL AUDIO ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            let osc = audioCtx.createOscillator(); let g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            
            if(type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
                g.gain.setValueAtTime(0.3, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if(type === 'match') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.3);
                g.gain.setValueAtTime(0.3, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if(type === 'levelUp') {
                osc.type = 'square'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.setValueAtTime(400, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(500, audioCtx.currentTime + 0.2);
                g.gain.setValueAtTime(0.2, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        const bgContainer = document.getElementById('bgHearts');
        for(let i=0; i<15; i++) {
            let h = document.createElement('div'); h.className = 'bg-heart'; h.innerText = '❤';
            h.style.left = Math.random() * 100 + 'vw'; h.style.animationDuration = (8 + Math.random() * 10) + 's';
            h.style.animationDelay = Math.random() * 5 + 's'; h.style.fontSize = (15 + Math.random() * 25) + 'px';
            bgContainer.appendChild(h);
        }

        let gameId = "", playerNum = 0, myName = "", docRef = null, messagesRef = null;
        let gState = { level: 1, p1Score: 0, p2Score: 0, status: 'waiting' };
        
        const quotes = [
            "“Distance means so little when someone means so much.”",
            "“Two souls but a single thought, two hearts that beat as one.”",
            "“Every heartbeat brings me closer to you.”",
            "“You are the missing piece to my puzzle.”",
            "“Love is a journey starting at forever and ending at never.”"
        ];

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); if(document.getElementById(id)) document.getElementById(id).classList.add('active'); }
        function showOverlay(title, quote, showBtn=false, btnAction=null) {
            playSound('levelUp');
            document.getElementById('ov-title').innerText = title; document.getElementById('ov-quote').innerText = quote;
            let btn = document.getElementById('ov-btn');
            if(showBtn) { btn.style.display='block'; btn.onclick=()=>{ document.getElementById('overlay').style.display='none'; if(btnAction) btnAction(); }; }
            else { btn.style.display='none'; setTimeout(()=>document.getElementById('overlay').style.display='none', 4500); }
            document.getElementById('overlay').style.display = 'flex';
        }

        document.getElementById('btnHome').onclick = () => { window.location.reload(); };

        // Host Restart Logic
        document.getElementById('btnRestart').onclick = async () => {
            if(confirm("Are you sure you want to restart the game?")) {
                await updateDoc(docRef, { 
                    level: 1, p1Score: 0, p2Score: 0, 
                    memBoard: generateMemoryBoard(), memTurn: 1, 
                    tttBoard: ['','','','','','','','',''], tttTurn: 'X',
                    popHeart: null, sdTarget: null,
                    scramble: { word: "FOREVER", jumbled: "R V O E F E R", solved: false },
                    surfProg: 0, surfP1Lane: 1, surfP2Lane: 1, surfObs: null
                });
            }
        };

        // EMOJI SYSTEM
        window.sendEmoji = async function(emoji) { 
            if(audioCtx.state === 'suspended') audioCtx.resume();
            if(gState && gState.status === 'playing') await updateDoc(docRef, { latestEmoji: { e: emoji, p: playerNum, id: Date.now() } }); 
        }

        document.getElementById('btnCreate').addEventListener('click', async () => {
            myName = document.getElementById('playerName').value.trim(); if(!myName) return;
            if(audioCtx.state === 'suspended') audioCtx.resume();
            playerNum = 1; gameId = Math.random().toString(36).substring(2, 7).toUpperCase();
            docRef = doc(db, "games", gameId); messagesRef = collection(db, "games", gameId, "messages");
            
            await setDoc(docRef, { 
                status: 'waiting', level: 1, p1Name: myName, p2Name: "", p1Score: 0, p2Score: 0, 
                memBoard: generateMemoryBoard(), memTurn: 1, 
                tttBoard: ['','','','','','','','',''], tttTurn: 'X',
                popHeart: null, sdTarget: null,
                scramble: { word: "FOREVER", jumbled: "R V O E F E R", solved: false },
                surfProg: 0, surfP1Lane: 1, surfP2Lane: 1, surfObs: null
            });
            
            document.getElementById('displayCode').innerText = gameId;
            document.getElementById('btnRestart').style.display = 'flex'; // Show restart to host
            showScreen('lobby-screen'); setupSync(); setupChat(); setupWebRTC();
        });

        document.getElementById('btnJoin').addEventListener('click', async () => {
            myName = document.getElementById('playerName').value.trim(); gameId = document.getElementById('joinCode').value.trim().toUpperCase();
            if(!myName || !gameId) return; playerNum = 2;
            if(audioCtx.state === 'suspended') audioCtx.resume();
            docRef = doc(db, "games", gameId); messagesRef = collection(db, "games", gameId, "messages");
            let snap = await getDoc(docRef);
            if(snap.exists()) {
                await updateDoc(docRef, { p2Name: myName, status: 'playing' });
                setupSync(); setupChat(); setupWebRTC();
            } else alert("Room closed or invalid.");
        });

        const getShareURL = () => `${window.location.origin}${window.location.pathname}?game=${gameId}`;
        document.getElementById('btnShare').onclick = () => window.location.href = `whatsapp://send?text=${encodeURIComponent('Join my Love Journey! ' + getShareURL())}`;
        document.getElementById('btnCopy').onclick = () => { navigator.clipboard.writeText(getShareURL()); alert("Link Copied!"); };
        window.onload = () => { if(new URLSearchParams(window.location.search).get('game')) { document.getElementById('joinCode').value = new URLSearchParams(window.location.search).get('game').toUpperCase(); }};

        // --- MAIN SYNC ENGINE ---
        let lastEmojiId = 0;
        function setupSync() {
            onSnapshot(docRef, (snap) => {
                if(!snap.exists()) return;
                let oldLvl = gState.level; gState = snap.data();
                
                if(gState.status === 'playing') {
                    if(document.getElementById('game-area').style.display !== 'flex') {
                        showScreen('none'); document.getElementById('game-area').style.display = 'flex';
                        document.getElementById('top-nav').style.display = 'flex';
                        document.getElementById('emoji-bar').style.display = 'flex'; // Show Quick Responses
                        document.getElementById('name1').innerText = gState.p1Name; document.getElementById('name2').innerText = gState.p2Name;
                    }
                    
                    document.getElementById('score1').innerText = gState.p1Score; document.getElementById('score2').innerText = gState.p2Score;
                    document.getElementById('level-title-hud').innerText = gState.level === 2.5 ? "SUDDEN DEATH!" : `LEVEL ${Math.floor(gState.level)}`;

                    if(gState.level > oldLvl) {
                        if(gState.level > 5) triggerFinale();
                        else {
                            let idx = Math.floor(gState.level) - 1;
                            if(gState.level === 2.5) showOverlay("TIE BREAKER", "React faster than your partner to win!");
                            else showOverlay(`LEVEL ${gState.level}`, quotes[idx]);
                        }
                    }

                    // Render Emojis
                    if(gState.latestEmoji && gState.latestEmoji.id !== lastEmojiId) {
                        lastEmojiId = gState.latestEmoji.id;
                        let div = document.createElement('div'); div.className = 'floating-emoji'; div.innerText = gState.latestEmoji.e;
                        div.style.left = gState.latestEmoji.p === 1 ? '20%' : '80%'; div.style.top = '60%';
                        document.body.appendChild(div); setTimeout(() => div.remove(), 2000);
                    }

                    hideAllLevels();
                    if(gState.level === 1) renderMemory();
                    else if(gState.level === 2) renderTTT();
                    else if(gState.level === 2.5) { document.getElementById('sudden-death-area').style.display='block'; renderSuddenDeath(); if(playerNum===1) hostSuddenDeath(); }
                    else if(gState.level === 3) { document.getElementById('popper-area').style.display='block'; renderPopper(); if(playerNum===1) hostPopper(); }
                    else if(gState.level === 4) { document.getElementById('scramble-area').style.display='flex'; renderScramble(); }
                    else if(gState.level === 5) { document.getElementById('game-canvas').style.display='block'; startSurfEngine(); if(playerNum===1) hostSurf(); }
                }
            });
        }

        function hideAllLevels() {
            document.getElementById('memory-board').style.display = 'none'; document.getElementById('ttt-board').style.display = 'none';
            document.getElementById('sudden-death-area').style.display = 'none'; document.getElementById('popper-area').style.display = 'none'; 
            document.getElementById('scramble-area').style.display = 'none'; document.getElementById('game-canvas').style.display = 'none';
        }

        // --- LEVEL 1: MEMORY MATCH ---
        function generateMemoryBoard() {
            let emojis = ['❤️','😍','💍','🌹','🧸','💌','🥂','🎁'];
            return [...emojis, ...emojis].sort(() => Math.random() - 0.5).map(e => ({ e: e, flipped: false, solved: false }));
        }

        let firstPick = null;
        function renderMemory() {
            document.getElementById('memory-board').style.display = 'grid';
            let board = document.getElementById('memory-board'); board.innerHTML = '';
            
            gState.memBoard.forEach((card, i) => {
                let el = document.createElement('div'); el.className = `match-card ${(card.flipped || card.solved) ? 'flipped' : ''}`;
                el.innerText = (card.flipped || card.solved) ? card.e : '❓';
                el.onclick = () => handleMemoryClick(i);
                board.appendChild(el);
            });
        }

        async function handleMemoryClick(i) {
            if(gState.memTurn !== playerNum || gState.memBoard[i].flipped || gState.memBoard[i].solved) return;
            playSound('click');
            let nb = [...gState.memBoard]; nb[i].flipped = true;
            
            if(firstPick === null) {
                firstPick = i; await updateDoc(docRef, { memBoard: nb });
            } else {
                await updateDoc(docRef, { memBoard: nb, memTurn: playerNum === 1 ? 2 : 1 });
                setTimeout(async () => {
                    let snap = await getDoc(docRef); let b = snap.data().memBoard;
                    if(b[firstPick].e === b[i].e) { 
                        playSound('match');
                        b[firstPick].solved = true; b[i].solved = true; 
                        let sc = playerNum===1?'p1Score':'p2Score';
                        
                        // FIX: Atomic level progression check to avoid freeze
                        let isDone = b.every(x => x.solved);
                        let updateData = { memBoard: b, [sc]: gState[sc]+10 };
                        if(isDone) updateData.level = 2; // Moves instantly
                        await updateDoc(docRef, updateData);
                    } 
                    else { b[firstPick].flipped = false; b[i].flipped = false; updateDoc(docRef, { memBoard: b }); }
                    firstPick = null;
                }, 800);
            }
        }

        // --- LEVEL 2: TIC TAC TOE ---
        function renderTTT() {
            document.getElementById('ttt-board').style.display = 'grid';
            let board = document.getElementById('ttt-board'); board.innerHTML = '';
            gState.tttBoard.forEach((cell, i) => {
                let el = document.createElement('div'); el.className = 'ttt-cell'; el.innerText = cell;
                if(cell==='X') el.classList.add('ttt-x'); else if(cell==='O') el.classList.add('ttt-o');
                el.onclick = () => handleTTTClick(i); board.appendChild(el);
            });
        }

        async function handleTTTClick(i) {
            let mySym = playerNum === 1 ? 'X' : 'O';
            if(gState.tttTurn !== mySym || gState.tttBoard[i] !== '') return;
            playSound('click');
            let nb = [...gState.tttBoard]; nb[i] = mySym;
            let lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            let win = lines.find(l => nb[l[0]] && nb[l[0]]===nb[l[1]] && nb[l[0]]===nb[l[2]]);
            
            if(win) {
                playSound('match');
                let sc = playerNum===1?'p1Score':'p2Score'; 
                await updateDoc(docRef, { tttBoard: nb, [sc]: gState[sc]+50, level: 3 });
            } else if(!nb.includes('')) { 
                // TIE BREAKER! Move to Sudden Death
                await updateDoc(docRef, { tttBoard: nb, level: 2.5 }); 
            } else { await updateDoc(docRef, { tttBoard: nb, tttTurn: mySym==='X'?'O':'X' }); }
        }

        // --- LEVEL 2.5: SUDDEN DEATH ---
        let sdInt = null;
        function hostSuddenDeath() {
            if(sdInt) return;
            sdInt = setInterval(() => {
                if(gState.level !== 2.5) { clearInterval(sdInt); sdInt = null; return; }
                updateDoc(docRef, { sdTarget: { x: Math.random()*80, y: Math.random()*80, id: Date.now() } });
            }, 800);
        }
        function renderSuddenDeath() {
            let area = document.getElementById('sudden-death-area'); area.innerHTML = '';
            if(gState.sdTarget) {
                let h = document.createElement('div'); h.className = 'golden-heart'; h.innerText = '💛';
                h.style.left = gState.sdTarget.x + '%'; h.style.top = gState.sdTarget.y + '%';
                h.onclick = () => {
                    playSound('match');
                    let sc = playerNum===1?'p1Score':'p2Score';
                    updateDoc(docRef, { sdTarget: null, [sc]: gState[sc]+50, level: 3 });
                };
                area.appendChild(h);
            }
        }

        // --- LEVEL 3: HEART POPPER ---
        let popInt = null;
        function hostPopper() {
            if(popInt) return;
            popInt = setInterval(() => {
                if(gState.level !== 3) { clearInterval(popInt); popInt = null; return; }
                if(gState.p1Score + gState.p2Score >= 300) { clearInterval(popInt); popInt = null; updateDoc(docRef, {level: 4}); return; }
                updateDoc(docRef, { popHeart: { x: Math.random()*80, y: Math.random()*80, id: Date.now() } });
            }, 1000);
        }
        function renderPopper() {
            let area = document.getElementById('popper-area'); area.innerHTML = '';
            if(gState.popHeart) {
                let h = document.createElement('div'); h.className = 'pop-target'; h.innerText = '❤️';
                h.style.left = gState.popHeart.x + '%'; h.style.top = gState.popHeart.y + '%';
                h.onclick = () => { playSound('click'); let sc = playerNum===1?'p1Score':'p2Score'; updateDoc(docRef, { popHeart: null, [sc]: gState[sc]+10 }); };
                area.appendChild(h);
            }
        }

        // --- LEVEL 4: SOULMATE SCRAMBLE ---
        function renderScramble() {
            document.getElementById('scramble-word').innerText = gState.scramble.jumbled;
            if(gState.scramble.solved && playerNum === 1) setTimeout(()=>updateDoc(docRef, {level: 5}), 1500);
        }
        document.getElementById('btnScramble').onclick = async () => {
            playSound('click');
            let val = document.getElementById('scramble-input').value.trim().toUpperCase();
            if(val === gState.scramble.word) {
                playSound('match');
                let sc = playerNum===1?'p1Score':'p2Score';
                await updateDoc(docRef, { scramble: { ...gState.scramble, solved: true, jumbled: "PERFECT!" }, [sc]: gState[sc]+50 });
            } else { document.getElementById('scramble-input').value = ''; alert("Try again!"); }
        };

        // --- LEVEL 5: MAGICAL SURF ---
        let c = document.getElementById('game-canvas'); let ctx = c.getContext('2d');
        function res() { c.width = window.innerWidth; c.height = window.innerHeight; } window.addEventListener('resize', res); res();
        let tX = 0; document.addEventListener('touchstart', e => tX = e.changedTouches[0].screenX);
        document.addEventListener('touchend', async e => {
            if(gState.level !== 5) return;
            let dx = e.changedTouches[0].screenX - tX; let lk = playerNum===1 ? 'surfP1Lane' : 'surfP2Lane';
            if(dx > 40 && gState[lk] < 2) await updateDoc(docRef, { [lk]: gState[lk]+1 }); else if(dx < -40 && gState[lk] > 0) await updateDoc(docRef, { [lk]: gState[lk]-1 });
        });

        let surfInt = null;
        function hostSurf() {
            if(surfInt) return;
            surfInt = setInterval(async () => {
                if(gState.level !== 5) return;
                let p = gState.surfProg + 3;
                if(p >= 100) { clearInterval(surfInt); updateDoc(docRef, { level: 6 }); } 
                else {
                    let u = { surfProg: p };
                    if(!gState.surfObs && Math.random()>0.4) u.surfObs = { lane: Math.floor(Math.random()*3), z: 2000, t: 'heart' };
                    await updateDoc(docRef, u);
                }
            }, 500);
        }

        let oZ = 2000, rOff = 0;
        let rP1X = 1, rP2X = 1;
        function startSurfEngine() {
            function render() {
                if(gState.level !== 5) return;
                ctx.fillStyle = "rgba(5, 5, 8, 0.4)"; ctx.fillRect(0,0,c.width,c.height);
                let hY = c.height*0.4; rOff = (rOff+15)%100;
                
                ctx.fillStyle = "#111";
                for(let y=c.height; y>hY; y-=5) {
                    let z = (c.height-hY)/(y-hY); let rW = 600/z; let pX = c.width/2;
                    ctx.fillRect(pX-rW, y, rW*2, 4);
                    if((y+rOff)%40>20) { ctx.fillStyle="#ff007f"; ctx.fillRect(pX-rW/3, y, 4,4); ctx.fillRect(pX+rW/3, y, 4,4); ctx.fillStyle="#111";}
                }

                if(gState.surfObs) {
                    oZ -= 60; let oS = 400/(400+oZ); let oX = (c.width/2) + ((gState.surfObs.lane-1)*200*oS); let oY = hY + ((c.height-hY)*oS);
                    if(oZ > 20) {
                        ctx.font=`${60*oS}px Arial`; ctx.fillText('❤️', oX-20*oS, oY);
                    } else if(oZ > -50) {
                        let myL = playerNum===1 ? gState.surfP1Lane : gState.surfP2Lane;
                        if(myL === gState.surfObs.lane && playerNum===1) {
                            playSound('match'); updateDoc(docRef, { p1Score: gState.p1Score+20, p2Score: gState.p2Score+20, surfObs: null }); oZ=2000;
                        }
                    } else { oZ=2000; if(playerNum===1) updateDoc(docRef, { surfObs:null }); }
                }

                rP1X += (((gState.surfP1Lane-1)*200) - rP1X)*0.2; rP2X += (((gState.surfP2Lane-1)*200) - rP2X)*0.2;
                let p1X = (c.width/2) + (rP1X * (400/550)); let p2X = (c.width/2) + (rP2X * (400/550));
                
                ctx.beginPath(); ctx.arc(p1X, c.height-120, 30, 0, Math.PI*2); ctx.fillStyle="#00f2fe"; ctx.fill(); ctx.shadowBlur = 20; ctx.shadowColor = "#00f2fe";
                ctx.beginPath(); ctx.arc(p2X, c.height-120, 30, 0, Math.PI*2); ctx.fillStyle="#ff007f"; ctx.fill(); ctx.shadowBlur = 20; ctx.shadowColor = "#ff007f"; ctx.shadowBlur = 0;

                requestAnimationFrame(render);
            }
            render();
        }

        // --- CHAT SYSTEM ---
        let chatOpen = false;
        document.getElementById('btnChat').onclick = () => { chatOpen = !chatOpen; document.getElementById('chat-panel').style.display = chatOpen ? 'flex' : 'none'; };
        
        function setupChat() {
            onSnapshot(query(messagesRef, orderBy("ts")), (snap) => {
                let box = document.getElementById('chat-msgs'); box.innerHTML = '';
                snap.forEach(d => { let m = d.data(); let el = document.createElement('div'); el.className = `msg ${m.sender === playerNum ? 'me' : 'them'}`; el.innerText = m.text; box.appendChild(el); });
                box.scrollTop = box.scrollHeight;
            });
        }
        
        document.getElementById('btnSendChat').onclick = async () => {
            let t = document.getElementById('chatInput').value.trim();
            if(t) { await addDoc(messagesRef, { text: t, sender: playerNum, ts: Date.now() }); document.getElementById('chatInput').value = ''; }
        };

        // --- WEBRTC VOICE ---
        let localStream, peerConn, isMuted = false;
        async function setupWebRTC() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                peerConn = new RTCPeerConnection({ iceServers: [{ urls: ['stun:stun1.l.google.com:19302'] }] });
                localStream.getTracks().forEach(t => peerConn.addTrack(t, localStream));
                peerConn.ontrack = (e) => { let audio = new Audio(); audio.srcObject = e.streams[0]; audio.play(); };
                
                const callDoc = doc(db, "calls", gameId); const offerC = collection(callDoc, "offerC"); const answerC = collection(callDoc, "answerC");
                peerConn.onicecandidate = e => { e.candidate && addDoc(playerNum===1 ? offerC : answerC, e.candidate.toJSON()); };

                if(playerNum === 1) {
                    let offer = await peerConn.createOffer(); await peerConn.setLocalDescription(offer); await setDoc(callDoc, { offer: { type: offer.type, sdp: offer.sdp }});
                    onSnapshot(callDoc, (snap) => { let data = snap.data(); if(data?.answer && !peerConn.currentRemoteDescription) peerConn.setRemoteDescription(new RTCSessionDescription(data.answer)); });
                    onSnapshot(answerC, snap => snap.docChanges().forEach(c => { if(c.type === 'added') peerConn.addIceCandidate(new RTCIceCandidate(c.doc.data())); }));
                } else {
                    onSnapshot(callDoc, async (snap) => {
                        let data = snap.data();
                        if(data?.offer && !peerConn.currentRemoteDescription) {
                            await peerConn.setRemoteDescription(new RTCSessionDescription(data.offer));
                            let ans = await peerConn.createAnswer(); await peerConn.setLocalDescription(ans); await updateDoc(callDoc, { answer: { type: ans.type, sdp: ans.sdp }});
                        }
                    });
                    onSnapshot(offerC, snap => snap.docChanges().forEach(c => { if(c.type === 'added') peerConn.addIceCandidate(new RTCIceCandidate(c.doc.data())); }));
                }

                document.getElementById('btnMic').onclick = () => {
                    isMuted = !isMuted; localStream.getAudioTracks()[0].enabled = !isMuted;
                    document.getElementById('btnMic').classList.toggle('muted'); document.getElementById('btnMic').innerText = isMuted ? '🔇' : '🎤';
                };
            } catch(e) { console.log("Mic error or denied"); }
        }

        // --- FINALE ---
        async function triggerFinale() {
            playSound('levelUp');
            document.getElementById('game-area').style.display = 'none'; document.getElementById('top-nav').style.display = 'none'; document.getElementById('emoji-bar').style.display = 'none';
            let fScreen = document.getElementById('final-screen'); fScreen.style.display = 'flex';
            document.getElementById('finalNames').innerText = `${gState.p1Name} & ${gState.p2Name}`;
            
            const colors = ['#ff007f', '#00f2fe', '#ff758c', '#ffeb3b', '#00ffcc'];
            for(let i=0; i<150; i++) {
                let h = document.createElement('div'); h.innerHTML = '❤️'; h.className = 'heart-particle';
                h.style.color = colors[Math.floor(Math.random() * colors.length)]; h.style.left = '50%'; h.style.top = '50%';
                let a = Math.random() * Math.PI * 2; let d = 100 + Math.random() * 500;
                h.style.setProperty('--tx', (Math.cos(a)*d)+'px'); h.style.setProperty('--ty', (Math.sin(a)*d)+'px');
                h.style.animationDelay = (Math.random() * 3) + 's'; fScreen.appendChild(h);
            }
            if(playerNum === 1) { let msgs = await getDocs(messagesRef); msgs.forEach(m => deleteDoc(m.ref)); } // Cleanup Chat
        }
    </script>
</body>
</html>
